apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bliss-game-api.fullname" . }}
  labels: {{- include "bliss-game-api.labels" . | nindent 4 }}
spec:
  # ADR-0018 §3: lobbies + GameSessions live in-memory in
  # :game:infrastructure (InMemoryLobbyRepository, per-lobby locks).
  # Scaling out shards state across pods — a player's WebSocket would
  # land on a replica that has no record of their lobby. Hard-coded to
  # 1 here (deliberately not exposed as a value) so a typo in an env
  # values file cannot accidentally double-schedule. Bumping this is
  # blocked until ADR-0018's "v2 — externalize state" follow-up lands.
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate): with in-memory state and replicas=1,
    # the rolling overlap window would briefly run two pods, but the new
    # pod has none of the old pod's lobbies. Recreate guarantees the old
    # pod is fully gone before the new one starts — every active session
    # gets a clean disconnect (vs a half-broken one mid-handshake).
    # Trade-off: ~30 s of downtime per deploy. Acceptable for v1
    # (dev-grade service, no SLO yet); revisit when ADR-0018 v2 lands.
    type: Recreate
  selector:
    matchLabels: {{- include "bliss-game-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "bliss-game-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "bliss-game-api.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Give in-flight WebSocket handshakes time to drain before SIGKILL.
      # Ktor's graceful shutdown closes WS sessions with a 1001 "Going
      # Away" frame; 30 s covers a slow client RTT + the application's
      # final write of any pending lobby state.
      terminationGracePeriodSeconds: 30
      {{- if .Values.database.enabled }}
      # Block the api container until the CNPG `-rw` Service accepts
      # connections. The Cluster CRD is owned by a sibling Helm release
      # (`bliss-game-api-pg`, chart `game/api/deploy/db-chart/`); the
      # deploy workflow installs it first. This init container handles
      # two failure modes:
      #   1) Cold-start race: on a fresh cluster, CNPG bootstrap lags
      #      the api pod by minutes; without this, the api hangs inside
      #      Flyway's TCP connect with no port bound, startup probe sees
      #      `connection refused`, Helm times out (observed 2026-05-12).
      #   2) Primary failover during rolling cnpg upgrades: the api pod
      #      must not start reading DATABASE_URL until the writer is back.
      # Reuses the pinned CNPG postgres image (already cached on every
      # node — it runs the CNPG cluster). `pg_isready` over the `-rw`
      # service is the canonical readiness check.
      #
      # `-U` / `-d` are NOT optional: the container runs as UID 1000
      # (`podSecurityContext.runAsNonRoot`) and the cnpg-postgres image
      # has no `/etc/passwd` entry for that UID. Without explicit user
      # + db, libpq calls `getpwuid(1000)`, gets NULL, and pg_isready
      # exits with "could not look up effective user" before any TCP
      # attempt — observed 2026-05-13 as a 5 m `until`-loop spinning
      # against a healthy cluster, Helm timing out at the api install.
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.database.waitImage | quote }}
          imagePullPolicy: IfNotPresent
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h {{ .Values.database.clusterName }}-rw -p 5432 -U game -d game; do
                echo "wait-for-postgres: not ready yet"
                sleep 2
              done
              echo "wait-for-postgres: ready"
      {{- end }}
      containers:
        - name: api
          image: {{ include "bliss-game-api.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - {name: http, containerPort: {{ .Values.service.port }}, protocol: TCP}
          env:
            {{- if .Values.database.enabled }}
            # DATABASE_URL from CNPG's auto-generated `<clusterName>-app` Secret
            # (key: `uri`). CNPG creates that Secret on initdb with the password
            # it generates itself. The Cluster lives in a sibling Helm release
            # (`bliss-game-api-pg`); this chart does not own the cluster's
            # lifecycle, but the Secret name is deterministic from `clusterName`.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.clusterName }}-app
                  key: uri
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFromSecret }}
          envFrom:
            # Operator-supplied envs (Matomo analytics — optional). DATABASE_URL
            # is sourced from the env block above when database.enabled=true;
            # explicit `env` wins over `envFrom` for the same name even if a
            # stale operator-managed DATABASE_URL is still present in this Secret.
            - secretRef: {name: {{ . }}}
          {{- end }}
          # Game has no DB cold-start, but parity with grid/api keeps the
          # 30 × 5 s = 150 s startup budget; trims later if pod boots
          # consistently faster.
          {{- with .Values.probes.startup }}
          startupProbe:
            httpGet: {path: {{ .path }}, port: http}
            periodSeconds: {{ .periodSeconds | default 5 }}
            timeoutSeconds: {{ .timeoutSeconds | default 3 }}
            failureThreshold: {{ .failureThreshold | default 30 }}
          {{- end }}
          livenessProbe:
            httpGet: {path: {{ .Values.probes.liveness.path }}, port: http}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds | default 15 }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet: {path: {{ .Values.probes.readiness.path }}, port: http}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 3 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 2 }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          # readOnlyRootFilesystem requires a writable /tmp (JVM PerfData etc).
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - {name: tmp, emptyDir: {}}
