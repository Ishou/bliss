{{- if .Values.alerts.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "bliss-nats.fullname" . }}-alerts
  labels: {{- include "bliss-nats.labels" . | nindent 4 }}
spec:
  groups:
    - name: bliss-nats.consumer-lag
      rules:
        - alert: BlissNatsConsumerLagWarning
          expr: nats_consumer_num_pending > {{ .Values.alerts.pendingWarn.threshold }}
          for: {{ .Values.alerts.pendingWarn.for }}
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "NATS consumer lag above warn threshold"
            description: "Consumer {{ "{{" }} $labels.consumer_name {{ "}}" }} on stream {{ "{{" }} $labels.stream_name {{ "}}" }} has > {{ .Values.alerts.pendingWarn.threshold }} pending for {{ .Values.alerts.pendingWarn.for }}."
        - alert: BlissNatsConsumerLagCritical
          expr: nats_consumer_num_pending > {{ .Values.alerts.pendingCritical.threshold }}
          for: {{ .Values.alerts.pendingCritical.for }}
          labels:
            severity: critical
            component: nats
          annotations:
            summary: "NATS consumer lag above critical threshold"
            description: "Consumer {{ "{{" }} $labels.consumer_name {{ "}}" }} on stream {{ "{{" }} $labels.stream_name {{ "}}" }} has > {{ .Values.alerts.pendingCritical.threshold }} pending for {{ .Values.alerts.pendingCritical.for }}."
    - name: bliss-nats.dlq
      rules:
        - alert: BlissNatsDlqNonEmpty
          # Any positive message count on the DLQ stream is a permanent consumer failure.
          expr: nats_stream_messages{stream_name="{{ .Values.dlq.name }}"} > {{ .Values.alerts.dlqWarn.threshold }}
          for: {{ .Values.alerts.dlqWarn.for }}
          labels:
            severity: warning
            component: nats
          annotations:
            summary: "Messages present in NATS DLQ stream"
            description: "DLQ stream {{ .Values.dlq.name }} has {{ "{{" }} $value {{ "}}" }} messages — investigate consumer failures."
{{- end }}
