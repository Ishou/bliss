name: Secret Scan

# Server-side backstop for the local pre-commit gitleaks hook
# (.githooks/pre-commit). Required by ADR-0004 §7 ("Secret management")
# and the manifesto rule "Git hooks prevent accidental commits"
# (CLAUDE.md, Security). Both layers ship together so a bypassed local
# hook does not leak a secret into main.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan every commit reachable
          # from the ref under test, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        # Pinned to the v2.3.9 commit SHA per the manifesto's
        # "Container images pinned to digest. Builds are deterministic."
        # rule applied to actions: a moving tag would let upstream change
        # what runs in CI without a repo change. Bump the SHA (and the
        # version comment) in a dedicated chore PR when upgrading.
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use the committed config so local hook and CI behave
          # identically.
          GITLEAKS_CONFIG: .gitleaks.toml
          # Disable the upload-to-gitleaks.io upsell; findings appear
          # in the GitHub Actions job summary, which is sufficient.
          GITLEAKS_NOTIFY_USER_LIST: ''
