# Production overrides — Hetzner k3s cluster (ADR-0009 / ADR-0027).
#
# Used by:
#   helm install observability infra/observability/ \
#     -n observability --create-namespace \
#     -f infra/observability/values-prod.yaml

signoz:
  # Tolerate + nodeSelect the observability worker so SigNoz doesn't share a
  # node with the apps. Matches the dedicated=observability:NoSchedule taint
  # and bliss.io/role=observability label set by the Terraform module.
  #
  # The SigNoz chart does NOT have a single `global.tolerations` /
  # `global.nodeSelector` fan-out — each subcomponent reads its own keys.
  # In 0.122 the pod set is:
  #   - signoz.signoz             (unified app StatefulSet: query + frontend
  #                                + alertmanager, merged in 0.120)
  #   - signoz.telemetryStoreMigrator (Job)
  #   - signoz.otelCollector      (Deployment)
  #   - signoz.clickhouse         (ClickHouseInstallation, via the operator)
  #   - signoz.clickhouse.clickhouseOperator (Deployment)
  #   - signoz.clickhouse.zookeeper          (StatefulSet, bitnami subchart)
  # So we set them all explicitly.

  signoz:
    tolerations:
      - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
    nodeSelector:
      bliss.io/role: observability

  telemetryStoreMigrator:
    tolerations:
      - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
    nodeSelector:
      bliss.io/role: observability

  otelCollector:
    tolerations:
      - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
    nodeSelector:
      bliss.io/role: observability

  clickhouse:
    tolerations:
      - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
    nodeSelector:
      bliss.io/role: observability
    persistence:
      # Hetzner Cloud Volume — same StorageClass the platform chart
      # registers (ADR-0009 §3, hcloud-csi). 20 GiB at ADR-0027's
      # default retention (7 d traces, 30 d metrics) leaves ample
      # headroom for the launch traffic profile; revisit on growth.
      storageClass: hcloud-volumes
    clickhouseOperator:
      tolerations:
        - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
      nodeSelector:
        bliss.io/role: observability
    zookeeper:
      tolerations:
        - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
      nodeSelector:
        bliss.io/role: observability

  # Preserved from the pre-isolation values: the 0.122 chart has merged
  # zookeeper under clickhouse.zookeeper (see above) so this top-level
  # `zookeeper:` may be a no-op for the upstream chart, but is kept to
  # signal intent in case the layout reverts. Safe — extra keys are
  # ignored.
  zookeeper:
    persistence:
      storageClass: hcloud-volumes

ingress:
  # Cert-manager + external-dns + ingress-nginx are all in the platform
  # chart already. Only the values-prod-specific knobs land here; the
  # template's annotations cover the rest.
  className: nginx

  # Public OTLP/HTTP ingest for browser-side spans (PR-F.2). ADR-0033.
  otlpPublic:
    enabled: true
    host: "otlp.wordsparrow.io"

# k8s-infra subchart: per-node otel-agent DaemonSet + cluster-state
# otel-deployment Deployment. Sends pod/node/cluster/log telemetry
# to the bundled SigNoz collector over OTLP/gRPC inside the cluster
# (no public ingress).
#
# What's collected once this lands (k8s-infra 0.15.1 defaults
# already enable all of these — no explicit toggles needed):
#
# | Layer       | Receiver / Source                  | Examples                                                   |
# |-------------|------------------------------------|------------------------------------------------------------|
# | Pod         | `kubeletstats` (DaemonSet)         | `k8s.pod.cpu.utilization`, `k8s.container.memory.working_set`, `k8s.container.cpu_limit_utilization` (the throttling metric) |
# | Node / host | `hostmetrics` (DaemonSet)          | `system.cpu.utilization`, `system.memory.usage`, `system.disk.io`, `system.filesystem.usage`, `system.network.io`           |
# | Cluster     | `k8s_cluster` (singleton)          | `k8s.deployment.available`, `k8s.pod.phase`, `k8s.node.condition`, `k8s.container.restarts`                                 |
# | Logs        | `filelog` via `logsCollection`     | every pod's stdout/stderr ingested as logs                                                                                  |
# | K8s events  | `k8sobjects` via `k8sEvents`       | scheduling failures, OOMKilled, NodeNotReady, etc. as logs                                                                  |
# | JVM        | OTel Java agent in app pods       | `process.runtime.jvm.memory.used`, GC pause time, thread count — flows via app's OTEL_EXPORTER_OTLP_ENDPOINT, NOT this chart |
# | HTTP RED   | OTel Java agent auto-instrumentation | requests / errors / latency per Ktor route, JDBC tracing — same OTLP path as JVM                                          |
# | Browser    | OTel browser SDK (PR-F.2)         | page loads, user actions, JS errors — public OTLP ingress at otlp.wordsparrow.io                                            |
#
# So this chart closes the cluster + node + pod + system-log gap;
# JVM / HTTP / browser are already in place via the OTel Java agent
# (backend) and browser SDK (frontend).
k8s-infra:
  enabled: true
  # Tags every metric so SigNoz can filter by cluster — there's only
  # one prod cluster today, but the field is standard OTel semantic
  # convention (`k8s.cluster.name`) and dashboards expect it.
  clusterName: "wordsparrow-prod"
  # Send OTLP to the in-cluster SigNoz collector Service (same target
  # the app pods push to via OTEL_EXPORTER_OTLP_ENDPOINT). gRPC port
  # 4317; cluster-internal, no TLS.
  otelCollectorEndpoint: "observability-signoz-otel-collector.observability.svc.cluster.local:4317"
  otelInsecure: true
  presets:
    # On by default; listed explicitly here so the policy is visible
    # without diving into the subchart's values.yaml.
    hostMetrics:        {enabled: true}
    kubeletMetrics:     {enabled: true}
    clusterMetrics:     {enabled: true}
    # Logs from observability/ (SigNoz self-logs), kube-system/ (k3s noise),
    # and platform/ (cert-manager, ingress-nginx, hcloud-csi, external-dns,
    # CNPG controller — all live in this single namespace in our cluster)
    # dwarf the app log volume and feed back into ClickHouse. Limit to
    # namespaces we actually own: wordsparrow + matomo.
    # The k8s-infra subchart's blacklist is a sub-object with a
    # `namespaces` list (and other sibling fields like `pods`,
    # `containers`, `signozLogs`); the chart's defaults already set
    # `enabled: true` so we only override `namespaces`.
    logsCollection:
      enabled: true
      blacklist:
        namespaces:
          - observability
          - kube-system
          - platform
    k8sEvents:          {enabled: true}
    kubernetesAttributes: {enabled: true}
    resourceDetection:  {enabled: true}
    otlpExporter:       {enabled: true}
    # selfTelemetry disabled 2026-05-12: ~5 MB/day per collector wasn't
    # worth the queue-depth/batch metrics for our scale. Re-enable if
    # silent OTLP export drops become a concern.
    selfTelemetry:      {enabled: false}
  # Sized for the cx33 worker pool. Per-node agent footprint is
  # modest (60 s scrape intervals); if metric volume bites, narrow
  # the receivers list in `presets` rather than starving the agent.
  otelAgent:
    # DaemonSet — tolerate the observability taint so we still get host
    # metrics from that node. No nodeSelector: must run everywhere.
    tolerations:
      - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
    resources:
      requests: {cpu: 50m, memory: 128Mi}
      limits: {cpu: 200m, memory: 256Mi}
  otelDeployment:
    # Singleton — pin to the observability worker.
    tolerations:
      - {key: dedicated, operator: Equal, value: observability, effect: NoSchedule}
    nodeSelector:
      bliss.io/role: observability
    resources:
      requests: {cpu: 50m, memory: 128Mi}
      limits: {cpu: 200m, memory: 256Mi}
