{{- if .Values.stream.name }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "bliss-nats.fullname" . }}-stream-init
  labels: {{- include "bliss-nats.labels" . | nindent 4 }}
  annotations:
    # Re-run when the chart upgrades — `nats stream add` is idempotent
    # against an existing stream with the same spec; differing spec
    # would error and surface in the helm output.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels: {{- include "bliss-nats.selectorLabels" . | nindent 8 }}
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      containers:
        - name: stream-init
          # `nats` CLI image (natsio/nats-box) — bundles the CLI we need.
          image: {{ include "bliss-nats.streamInitImage" . | quote }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - { name: NATS_URL, value: "nats://{{ include "bliss-nats.fullname" . }}:{{ .Values.config.port }}" }
            # /root is unwritable; HOME=/work satisfies the nats CLI's xdg lookups.
            - { name: HOME, value: "/work" }
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              cd /work
              # Wait until JetStream is ready. The NATS pod's readiness gate
              # requires JetStream; this loop covers the small delay between
              # the StatefulSet being Ready and JetStream listing as enabled.
              until nats account info > /dev/null 2>&1; do
                echo "waiting for NATS JetStream..."
                sleep 2
              done
              # --config is non-interactive; re-running against same spec is a no-op.
              nats stream add --config /specs/primary.json
              nats stream info {{ .Values.stream.name }}
              {{- if .Values.dlq.enabled }}
              nats stream add --config /specs/dlq.json
              nats stream info {{ .Values.dlq.name }}
              {{- end }}
          volumeMounts:
            - { name: specs, mountPath: /specs, readOnly: true }
            - { name: work,  mountPath: /work }
      volumes:
        - name: specs
          configMap:
            name: {{ include "bliss-nats.fullname" . }}-stream-specs
        - name: work
          emptyDir: {}
{{- end }}
