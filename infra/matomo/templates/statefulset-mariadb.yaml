apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "matomo.mariadb.fullname" . }}
  labels: {{- include "matomo.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  serviceName: {{ include "matomo.mariadb.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "matomo.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mariadb
  template:
    metadata:
      labels:
        {{- include "matomo.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mariadb
    spec:
      securityContext:
        # mariadb image runs as uid 999. fsGroup ensures the PV is group-writable.
        fsGroup: 999
        # K8s sets the volume's GID at mount time so the entrypoint never needs
        # chown. Cheaper than recursive chmod on every restart.
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: mariadb
          image: {{ include "matomo.mariadb.image" . | quote }}
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          # mariadb's entrypoint, when started as root, calls
          # `find /var/lib/mysql ! -user mysql -exec chown mysql {} +`. With
          # `capabilities: drop: [ALL]` from the shared containerSecurityContext,
          # CAP_CHOWN is gone and the entrypoint crashes (Operation not
          # permitted). Running as uid 999 directly skips the chown branch
          # entirely; fsGroup above ensures the volume is already writable.
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: false
          ports:
            - {name: mysql, containerPort: 3306, protocol: TCP}
          # Defaults to the chart-managed `<release>-credentials`
          # Secret (templates/secret-credentials.yaml) — single source
          # of truth for both the MariaDB and Matomo workloads. An
          # operator override via `mariadb.envFromSecret` still wins
          # for break-glass rotations outside Helm.
          envFrom:
            - secretRef:
                name: {{ default (printf "%s-credentials" (include "matomo.fullname" .)) .Values.mariadb.envFromSecret }}
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "mariadb-admin ping -uroot -p\"$MARIADB_ROOT_PASSWORD\""]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["/bin/sh", "-c", "mariadb-admin ping -uroot -p\"$MARIADB_ROOT_PASSWORD\""]
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.mariadb.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [{{ .Values.mariadb.persistence.accessMode }}]
        resources:
          requests:
            storage: {{ .Values.mariadb.persistence.size }}
        {{- if .Values.mariadb.persistence.storageClass }}
        storageClassName: {{ .Values.mariadb.persistence.storageClass | quote }}
        {{- end }}
