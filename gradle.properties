# Gradle build settings — shared across all modules.
org.gradle.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=512m
kotlin.daemon.jvmargs=-Xmx2g

# Configuration cache: skip re-evaluating build scripts when nothing in
# the build config changed. Biggest win during `make dev` (continuous
# compilation) where the same tasks fire repeatedly on source-only edits.
org.gradle.configuration-cache=true
