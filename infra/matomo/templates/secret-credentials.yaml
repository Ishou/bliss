{{/*
Chart-managed Matomo + MariaDB credentials.

Replaces the operator-supplied two-Secret pattern (`mariadb-env` +
`matomo-env`) documented in earlier README versions, where the
operator had to `kubectl create secret` both with shared values
that had to be kept in sync. That pattern was the same chicken-
and-egg shape as grid/api's pre-PR-#277 install: both Secrets had
to exist before `helm install` (envFrom resolves at pod-create);
the chart had no way to seed them; mismatched user-vs-mariadb
passwords corrupted the install silently.

This single Secret holds every credential both workloads need —
the StatefulSet (mariadb) reads `MARIADB_*` keys, the Deployment
(matomo) reads `MATOMO_DATABASE_*` keys — with the username,
password, and database name shared across both halves.
`statefulset-mariadb.yaml` and `deployment-matomo.yaml` both
default `envFromSecret` to this Secret's name.

**Password persistence.** `lookup` reads the existing in-cluster
Secret on every reconcile, so the same password is rendered on
every `helm upgrade`. Generated once on first install (the random
branch only fires when no existing Secret of either form is
found). Rotating: delete this Secret + the live mariadb PVC, then
re-install (CNIL audience-measurement re-enrols the new site).

**Migration from operator-supplied `mariadb-env`.** A first
`helm upgrade` against a cluster where mariadb-env / matomo-env
were operator-supplied: the lookup chain finds no chart-managed
credentials Secret, then finds the existing operator-supplied
`mariadb-env`, and copies its values into the new chart-managed
Secret. Mariadb keeps the same root + user passwords, the live
PVC's data continues to authenticate, the wizard state survives.
The operator's old `mariadb-env` / `matomo-env` Secrets become
orphan but harmless; clean them up via `kubectl delete secret`
once the migration is verified.

`helm.sh/resource-policy: keep` ensures `helm uninstall`
preserves this Secret while the persistent mariadb PVC still
encodes the password — re-installing the chart picks up the
existing credentials and the existing data without manual
intervention.
*/}}
{{- $secretName := printf "%s-credentials" (include "matomo.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $operatorMariadb := lookup "v1" "Secret" .Release.Namespace "mariadb-env" -}}

{{- $rootPassword := "" -}}
{{- $userPassword := "" -}}
{{- $user := "matomo" -}}
{{- $database := "matomo" -}}

{{- if and $existing $existing.data -}}
  {{/* Steady state: chart-managed Secret already exists. */}}
  {{- $rootPassword = index $existing.data "MARIADB_ROOT_PASSWORD" | b64dec -}}
  {{- $userPassword = index $existing.data "MARIADB_PASSWORD" | b64dec -}}
  {{- if hasKey $existing.data "MARIADB_USER" -}}
    {{- $user = index $existing.data "MARIADB_USER" | b64dec -}}
  {{- end -}}
  {{- if hasKey $existing.data "MARIADB_DATABASE" -}}
    {{- $database = index $existing.data "MARIADB_DATABASE" | b64dec -}}
  {{- end -}}
{{- else if and $operatorMariadb $operatorMariadb.data -}}
  {{/* First helm upgrade after the chart change against a cluster where
       the operator pre-supplied mariadb-env. Migrate values in. */}}
  {{- $rootPassword = index $operatorMariadb.data "MARIADB_ROOT_PASSWORD" | b64dec -}}
  {{- $userPassword = index $operatorMariadb.data "MARIADB_PASSWORD" | b64dec -}}
  {{- if hasKey $operatorMariadb.data "MARIADB_USER" -}}
    {{- $user = index $operatorMariadb.data "MARIADB_USER" | b64dec -}}
  {{- end -}}
  {{- if hasKey $operatorMariadb.data "MARIADB_DATABASE" -}}
    {{- $database = index $operatorMariadb.data "MARIADB_DATABASE" | b64dec -}}
  {{- end -}}
{{- else -}}
  {{/* Fresh install — no prior Secret in either shape. */}}
  {{- $rootPassword = randAlphaNum 32 -}}
  {{- $userPassword = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "matomo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  # MariaDB-side env keys — consumed by the StatefulSet's mariadb
  # entrypoint (config: /docker-entrypoint-initdb).
  MARIADB_ROOT_PASSWORD: {{ $rootPassword | quote }}
  MARIADB_USER: {{ $user | quote }}
  MARIADB_PASSWORD: {{ $userPassword | quote }}
  MARIADB_DATABASE: {{ $database | quote }}
  # Matomo-side env keys — consumed by the Deployment's app entrypoint
  # to populate config/config.ini.php on first wizard pass and to
  # reconnect on every restart. Mirror the MariaDB credentials so the
  # app uses the user role, not root.
  MATOMO_DATABASE_USERNAME: {{ $user | quote }}
  MATOMO_DATABASE_PASSWORD: {{ $userPassword | quote }}
  MATOMO_DATABASE_DBNAME: {{ $database | quote }}
