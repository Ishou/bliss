{{- if .Values.networkPolicy.enabled -}}
{{/*
Egress allow-list for survey-api pods. Defaults to the wordsparrow
namespace's internal services (NATS, identity-api, CNPG); plus DNS
in kube-system; plus the observability namespace's OTel collector.
Egress allow-list pre-staged for the survey bounded context. The chart owns
this concern (configure-in-cluster pattern) rather than a separate network-ops PR.

Ingress is left to the ingress-nginx controller's default policy
(allow from cluster) — survey-api accepts HTTP only via the Ingress,
which lands traffic through the controller's pod, so a pod-level
ingress allow-list would block legitimate calls.
*/}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "bliss-survey-api.fullname" . }}-egress
  labels: {{- include "bliss-survey-api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "bliss-survey-api.selectorLabels" . | nindent 6 }}
  policyTypes: [Egress]
  egress:
    # DNS (kube-system/kube-dns).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    # Same-namespace services: NATS, identity-api, CNPG -rw Service.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: wordsparrow
    # OTel collector in the observability namespace.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - {protocol: TCP, port: 4317}
{{- end }}
