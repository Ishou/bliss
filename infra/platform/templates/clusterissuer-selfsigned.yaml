{{/*
Self-signed ClusterIssuer for k3d local development only.

The WordSparrow chart's values-local.yaml references issuer "selfsigned"
(grid/api/deploy/chart/values-local.yaml). The name MUST match.

Gated on a flag so values-prod.yaml never accidentally renders this.
*/}}
{{- if .Values.clusterIssuer.selfsigned.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    # See clusterissuer-letsencrypt.yaml for the full rationale —
    # cert-manager CRDs from the subchart need to register before
    # any ClusterIssuer manifest can be applied.
    "helm.sh/hook": post-install,post-upgrade
    # See clusterissuer-letsencrypt.yaml — weight 10 runs after
    # cert-manager's startupapicheck (weight 1) so the validating
    # webhook is fully bootstrapped before this manifest is applied.
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  selfSigned: {}
{{- end }}
