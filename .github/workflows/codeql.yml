name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # CodeQL's autobuild knows how to invoke Gradle for Kotlin projects
      # without a setup-gradle action restoring caches that make `assemble`
      # a no-op (which is what defeated the previous manual-mode attempt:
      # cached classes meant zero compiler invocations for the tracer to
      # capture). Autobuild is GitHub's recommended path for Java/Kotlin
      # and runs the build under CodeQL's tracer end-to-end.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: autobuild

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
