# Production overrides — Hetzner FSN1 k3s cluster (ADR-0009 §2, PR52).
# Used by `helm install platform infra/platform/ -n platform \
#   --create-namespace -f infra/platform/values-prod.yaml`.

clusterIssuer:
  letsencrypt:
    enabled: true
    # Override at install time:
    #   --set clusterIssuer.letsencrypt.email="<your-email>"
    # The template uses `required` to fail-fast if missing.
    email: ""
  selfsigned:
    enabled: false

cert-manager:
  enabled: true
  # HTTP01 solver runs through ingress-nginx, so no DNS01 nameservers needed.
  # The ClusterIssuer in templates/clusterissuer-letsencrypt.yaml hard-wires
  # the http01 solver.

ingress-nginx:
  enabled: true
  controller:
    # See values.yaml rationale — hostNetwork on Hetzner without hccm.
    hostNetwork: true
    service:
      type: ClusterIP
    # publishService and publish-status-address are mutually exclusive
    # in ingress-nginx (controller crashes on startup with "flags
    # --publish-service and --publish-status-address are mutually
    # exclusive"). The chart enables publishService by default; we
    # disable it here because we want the controller to write the
    # floating IP — supplied via `extraArgs.publish-status-address` at
    # install time — into Ingress `.status.loadBalancer.ingress[0].ip`,
    # not the controller Service's ClusterIP.
    publishService:
      enabled: false
    # The Hetzner Floating IP is assigned (Terraform-side) to the
    # worker node — only the worker has the IP aliased on its public
    # interface (terraform/k8s/providers/hetzner/cloud-init/worker.yaml.tftpl).
    # ingress-nginx therefore MUST run on a worker; if the scheduler
    # places it on the control plane, traffic to the FIP arrives at
    # the worker and finds no listener. The label is applied by
    # cloud-init via k3s `node-label`.
    nodeSelector:
      bliss.io/role: worker
    # `publish-status-address` is the IP ingress-nginx writes back into
    # every Ingress's `.status.loadBalancer.ingress[0].ip`. external-dns
    # reads that field to decide which record to create, so pinning it
    # to the Hetzner Floating IP (terraform/k8s/ output
    # `ingress_floating_ip`) makes external-dns auto-publish the right
    # A record without per-Ingress `external-dns.alpha.kubernetes.io/target`
    # annotations. Value is provisioner-specific and not known until
    # `tofu apply` reserves the floating IP, so it is supplied at
    # `helm install/upgrade` time — see docs/deploy.md:
    #   --set ingress-nginx.controller.extraArgs.publish-status-address=$(tofu output -raw ingress_floating_ip)
    extraArgs: {}

external-dns:
  enabled: true
  # Restrict to the WordSparrow zone — guards against accidentally
  # touching other Cloudflare zones the same API token might cover.
  domainFilters:
    - "wordsparrow.io"
  txtOwnerId: "wordsparrow-prod"

cloudnative-pg:
  enabled: true

hcloud-csi:
  enabled: true
