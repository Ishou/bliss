{{/*
SigNoz UI ingresses — two hosts (`errors.` + `dashboard.wordsparrow.io`)
both pointing at the same SigNoz frontend Service. Auth: oauth2-proxy
session-cookie (ADR-0030) when `oauth2Proxy.enabled=true`; ingress-nginx
basic-auth (ADR-0028) otherwise.

Why two ingresses for the same backend instead of one with multiple
hosts:
- Cleaner annotations per host (a future move of `errors.` to a
  dedicated error-tracker product needs to retarget only one Ingress).
- external-dns publishes one A record per Ingress hostname; the rule
  in `docs/deploy.md` §"Floating IP / DNS records" expects each
  Ingress to carry its own `target` annotation, which makes
  per-Ingress declarations the sane atomic unit.

Both ingresses share:
- cert-manager letsencrypt-prod ClusterIssuer (issued out of the
  platform chart in PR-#274).
- external-dns target = the Hetzner floating IP.
- auth: oauth2-proxy session-cookie (ADR-0030) when
  `oauth2Proxy.enabled=true`; ingress-nginx basic-auth (ADR-0028)
  otherwise. The `/oauth2` Ingresses (Ingress 1/2 per host) carry
  no auth annotations — they ARE the auth provider endpoint.
*/}}
{{/*
Two Ingresses per host:

1. `/oauth2/*` → oauth2-proxy, NO auth-url annotations. This path
   IS the auth provider; if it were itself behind the auth check
   nginx would loop (`auth-signin` redirects to `/oauth2/sign_in`
   which is itself validated by `auth-url`, which redirects again
   … and 500s on cycle detection). Splitting it out is the canonical pattern.

2. `/` → SigNoz frontend, behind oauth2-proxy via auth-url. Every
   non-/oauth2 request is validated against the cookie / redirected
   to /oauth2/sign_in when missing.

Both Ingresses on the same host share the same TLS Secret and the
same external-dns target annotation. cert-manager issues one cert
for the host (whichever Ingress is reconciled first); ingress-nginx
merges them on the listening port.
*/}}
{{- if .Values.ingress.enabled }}
{{- range $host := .Values.ingress.hosts }}
{{- if $.Values.oauth2Proxy.enabled }}
---
{{/* Ingress 1/2: /oauth2/* — auth provider, no auth-url applied */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signoz-ui-{{ $host | replace "." "-" }}-oauth2
  labels: {{- include "observability.labels" $ | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: {{ $host | quote }}
    external-dns.alpha.kubernetes.io/target: {{ $.Values.ingress.floatingIp | quote }}
spec:
  ingressClassName: {{ $.Values.ingress.className | quote }}
  tls:
    - hosts: [{{ $host | quote }}]
      secretName: {{ $.Values.ingress.tlsSecretName }}-{{ $host | replace "." "-" }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 4180
{{- end }}
---
{{/* Ingress 2/2: / — SigNoz UI, behind auth */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signoz-ui-{{ $host | replace "." "-" }}
  labels: {{- include "observability.labels" $ | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: {{ $host | quote }}
    # Per `docs/deploy.md` §"Floating IP / DNS records": every Ingress
    # in this repo MUST carry the `target` annotation explicitly.
    external-dns.alpha.kubernetes.io/target: {{ $.Values.ingress.floatingIp | quote }}
    {{- if $.Values.oauth2Proxy.enabled }}
    # Auth flow (ADR-0028 + oauth2-proxy override):
    # - auth-url   : every request gets validated by oauth2-proxy
    #   first; 200 = pass cookie present, 401 = redirect to signin.
    # - auth-signin: where ingress-nginx sends unauthenticated
    #   visitors (relative path on the same host so the cookie domain
    #   `.wordsparrow.io` is set correctly on issuance).
    # - auth-response-headers: forwards oauth2-proxy's resolved user
    #   info to the upstream so SigNoz can log who triggered an
    #   action (X-Auth-Request-User / X-Auth-Request-Email).
    nginx.ingress.kubernetes.io/auth-url: "http://oauth2-proxy.{{ $.Release.Namespace }}.svc.cluster.local:4180/oauth2/auth"
    # `/oauth2/sign_in` is where the htpasswd form lives in v7;
    # `/oauth2/start` would still try to launch the OIDC flow
    # (redirect to the dummy keycloak issuer → 500). The
    # `rd=` query param tells oauth2-proxy where to send the
    # browser after a successful login.
    nginx.ingress.kubernetes.io/auth-signin: "https://{{ $host }}/oauth2/sign_in?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Preferred-Username"
    {{- else }}
    # Pure basic auth fallback when oauth2-proxy is disabled. Works
    # for terminal-based clients (`curl -u`) but causes browser-
    # spam on SPA XHR/WS calls — leave oauth2Proxy.enabled=true
    # except for break-glass debugging.
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ $.Values.ingress.authSecretName | quote }}
    nginx.ingress.kubernetes.io/auth-realm: "WordSparrow ops — observability"
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingress.className | quote }}
  tls:
    - hosts: [{{ $host | quote }}]
      secretName: {{ $.Values.ingress.tlsSecretName }}-{{ $host | replace "." "-" }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "observability.signozFrontendService" $ }}
                port:
                  number: {{ $.Values.ingress.servicePort | int }}
{{- end }}
{{- end }}
