# Production overrides — Hetzner k3s cluster (ADR-0009 §2).
cluster:
  # HA per ADR-0009 §3.
  instances: 3
  storage: {size: 20Gi, storageClass: "hcloud-volumes"}
backups:
  enabled: true
  # ADR-0010 §1 (bucket created one-time per ADR-0010 §4); FSN1 endpoint per §2.
  bucket: "bliss-cnpg-backups"
  endpoint: "https://fsn1.your-objectstorage.com"
