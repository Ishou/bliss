# Production overrides — Hetzner k3s cluster (ADR-0009 §2 / ADR-0025).
matomo:
  image:
    requireDigest: true
    digest: ""  # Set by deployment workflow; helm aborts if empty.
  resources:
    requests: {cpu: 100m, memory: 512Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  persistence:
    size: 10Gi
    storageClass: hcloud-volumes
  trustedHostname: "analytics.wordsparrow.io"
  envFromSecret: "matomo-env"

mariadb:
  image:
    requireDigest: true
    digest: ""
  resources:
    requests: {cpu: 100m, memory: 512Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  persistence:
    size: 10Gi
    storageClass: hcloud-volumes
  envFromSecret: "mariadb-env"

ingress:
  host: "analytics.wordsparrow.io"
  tlsSecretName: "matomo-tls"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "analytics.wordsparrow.io"
    # Per repo rule (`docs/deploy.md` §"Floating IP / DNS records"): every
    # Ingress sets the target annotation explicitly to the Hetzner floating IP.
    # Without it, external-dns reads the Ingress's
    # `.status.loadBalancer.ingress[0].ip` — which is the ingress-nginx Service
    # ClusterIP (10.43.x.x) on this cluster — and publishes that internal IP
    # to Cloudflare. The hostname then resolves to an unroutable IP.
    external-dns.alpha.kubernetes.io/target: "178.105.38.131"
