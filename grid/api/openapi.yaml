# Grid bounded-context HTTP contract.
#
# Hand-written OpenAPI 3.1 per ADR-0003 §1 (source of truth, not generated
# from controller annotations). Wire conventions per ADR-0003 §6: UUID v7 ids,
# ISO-8601 instants with offset, camelCase, RFC 7807 errors, string enums.
#
# v1 surface: a single read endpoint. List, search, create, and update land
# in subsequent workstreams.
openapi: 3.1.0
info:
  title: Bliss Grid API
  version: 1.0.0
  summary: Read access to mots-fléchés puzzles.
  description: |
    The Grid bounded context owns puzzle storage and retrieval for the Bliss
    mots-fléchés game. v1 exposes a single endpoint to fetch a puzzle by id.
    See `docs/adr/0003-cross-language-api-contract.md` for wire conventions.
  contact:
    name: Bliss maintainers
    url: https://github.com/Ishou/bliss
    email: noreply@bliss.example
  license:
    name: FSL-1.1-MIT
    url: https://github.com/Ishou/bliss/blob/main/LICENSE

servers:
  - url: https://api.bliss.example/grid
    description: Placeholder; the URL stabilizes when the first JVM endpoint
      workstream lands (hosting decision deferred per ADR-0003 §Notes).

tags:
  - name: hints
    description: |
      Per-puzzle hint mechanism. Spends one credit per cell to reveal the
      canonical letter at `(row, column)`. Capped by `Puzzle.hintsAllowed`
      to prevent draining the full solution.
  - name: puzzles
    description: Read access and validation for mots-fléchés puzzles.
  - name: sessions
    description: |
      Anonymous session lifecycle. Currently exposes only the right-to-erasure
      endpoint (RGPD Article 17, ADR-0025 §5).

paths:
  /v1/puzzles/{puzzleId}:
    get:
      operationId: getPuzzle
      summary: Fetch a puzzle by id.
      description: |
        Returns the full puzzle document — every cell and clue. The response
        is self-contained: a client with the document can render the grid and
        the clue list without further round-trips.

        When the optional `X-Session-Id` header is present, clue selection on
        cache miss is biased away from clues recently used by the same
        session (per ADR-0031 "per-session clue cooldown"). When absent,
        clue selection is unaffected — the cooldown machinery is bypassed
        end-to-end. Cache hits return the persisted grid as-is regardless of
        the header, so the same `puzzleId` always yields the same clues.

        `hintsRemaining` reflects the authenticated user's per-puzzle hint
        count when a `__Secure-ws_session` cookie is presented; anonymous
        callers receive `hintsRemaining` equal to `hintsAllowed`.
      tags: [puzzles]
      parameters:
        - $ref: '#/components/parameters/PuzzleId'
        - $ref: '#/components/parameters/PuzzleWidth'
        - $ref: '#/components/parameters/PuzzleHeight'
        - $ref: '#/components/parameters/OptionalSessionId'
      responses:
        '200':
          description: |
            Puzzle found. Canonical sample at
            `grid/api/examples/get-puzzle-200.json` is the contract-test
            fixture for both sides of the wire. The example is a 10×10
            grid (smaller than the daily default of 15×12) chosen to keep
            the file readable; the wire shape is identical at any size,
            and requesting `?width=7&height=7` produces an analogous 7×7
            document with the same fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Puzzle'
        '400':
          description: |
            Request is malformed. RFC 7807 body. Variants:
            - Path parameter `puzzleId` is not a valid UUID
              (`type` = `https://bliss.example/errors/invalid-puzzle-id`).
            - Query parameter `width` or `height` is not an integer or is
              outside the supported 5..15 range
              (`type` = `https://bliss.example/errors/invalid-puzzle-dimensions`).
            - Header `X-Session-Id` is present but not a valid UUID, or
              equals the reserved daily-bucket sentinel
              `00000000-0000-7000-8000-000000000000` (poisoning guard per
              ADR-0031)
              (`type` = `https://bliss.example/errors/invalid-session-id`).
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: |
            Puzzle generation failed. The requested constraints (grid size,
            word list, interlocking rules) are unsatisfiable within the
            attempt budget. RFC 7807 body;
            `type` is `https://bliss.example/errors/puzzle-generation-failed`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/puzzles/daily:
    get:
      operationId: getDailyPuzzle
      summary: Fetch the daily puzzle for a given date.
      description: |
        Returns the puzzle of the day for the supplied `date` (or today's
        UTC date when omitted). Two callers reach this endpoint: the
        Accueil card resolves "today's grid" without holding a UUID, and
        the Grille route navigates here when the player picks "Reprendre"
        / "Commencer".

        The server derives a deterministic UUID v7 from the date and
        performs a pure read against the persisted puzzle row populated
        ahead of time by the daily-puzzle worker (ADR-0042). Subsequent
        hint / validate calls keyed by the returned `id` resolve to the
        same canonical grid. When no row exists for the requested date —
        worker has not yet run, or persistently failed — the endpoint
        returns 404; clients SHOULD retry shortly or surface the
        "daily not yet available" message.

        `gridNumber` and `difficulty` on the response are populated from
        the date (sequence number from a launch-day anchor; difficulty
        is `facile` until heuristics land in a follow-up). Other fields
        match the `Puzzle` schema. The endpoint ignores any
        client-supplied `X-Session-Id` header — the daily bucket is
        global by design.
      tags: [puzzles]
      parameters:
        - in: query
          name: date
          required: false
          description: |
            ISO-8601 calendar date (`YYYY-MM-DD`) in UTC. When omitted the
            server uses today's UTC date. Future dates are accepted; the
            endpoint returns 404 if the daily worker has not yet produced a
            row for that date (see endpoint description).
          schema:
            type: string
            format: date
            example: '2026-05-09'
      responses:
        '200':
          description: Daily puzzle resolved for the requested date.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Puzzle'
        '400':
          description: |
            The `date` query parameter is not a valid ISO-8601 calendar
            date. RFC 7807 body;
            `type` is `https://bliss.example/errors/invalid-puzzle-date`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            No daily puzzle exists for the requested date. The worker job that
            pre-generates daily grids has not yet produced (or failed to produce)
            a puzzle for this date. Clients should retry shortly or surface a
            user-facing "daily not yet available" message.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: 'https://bliss.example/errors/no-daily-puzzle'
                title: Aucune grille du jour disponible
                status: 404
                detail: La grille du jour n'a pas encore été générée pour cette date.

  /v1/puzzles/daily/list:
    get:
      operationId: listDailyPuzzles
      summary: List past + current daily puzzles.
      description: |
        Returns thin summaries of dailies in the requested range, newest
        first. Always excludes future dates; clamps `from` to the launch
        anchor (2026-01-01 UTC) and `to` to today UTC. If `from` is later
        than `to` after clamping, the response is 200 with an empty `items`
        array. Per-user progress is NOT included — clients derive it locally
        from the solo-entries store keyed by `id`. The response is bounded
        at 100 items.
      tags: [puzzles]
      parameters:
        - in: query
          name: from
          required: false
          description: |
            ISO-8601 calendar date inclusive. Defaults to 31 days before
            `to` when omitted. Values earlier than the launch anchor are
            clamped to the anchor.
          schema:
            type: string
            format: date
            example: '2026-04-15'
        - in: query
          name: to
          required: false
          description: |
            ISO-8601 calendar date inclusive. Defaults to today UTC.
            Future values are clamped to today.
          schema:
            type: string
            format: date
            example: '2026-05-16'
      responses:
        '200':
          description: |
            List resolved. `items` is sorted DESC by `date`. May be empty
            (e.g. range entirely before launch anchor, or no row exists
            for any date in the range because the worker hasn't filled it
            yet).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDailyPuzzlesResponse'
        '400':
          description: |
            `from` or `to` is not a valid ISO-8601 date. RFC 7807;
            `type` is `https://bliss.example/errors/invalid-puzzle-date`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/puzzles/{puzzleId}/hints:
    post:
      operationId: revealCellHint
      summary: Spend a hint to reveal the canonical letter at a cell.
      description: |
        Per-puzzle hint mechanism. The client submits a `(row, column)`
        coordinate inside the puzzle; the server returns the canonical
        solution letter at that cell and decrements the puzzle's hint
        budget. Each answered call costs one hint; once the budget is
        exhausted the server responds with 429 and the client UI SHOULD
        disable the affordance.

        One letter per call, by design: `Puzzle.hintsAllowed` caps total
        reveals so unauthenticated clients cannot drain a grid in a single
        request. Brute-forcing the full solution still requires
        `hintsAllowed` calls and is bounded by edge rate limiting.

        Player identity on the wire is the `__Secure-ws_session` cookie
        verified against identity-api. The server keeps a per-(puzzle, user)
        hint counter; a missing or invalid cookie produces a 401 response.
        Coordinates that point at a non-letter cell (definition or block) or
        that fall outside the puzzle bounds produce a 400 `invalid-coord`
        and do NOT decrement the budget.
      tags: [hints]
      security:
        - sessionCookie: []
      parameters:
        - $ref: '#/components/parameters/PuzzleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevealCellHintRequest'
      responses:
        '200':
          description: |
            Hint consumed. Body reports the canonical letter at the
            requested cell and the remaining budget for this
            `(puzzle, player)`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevealCellHintResult'
        '400':
          description: |
            Request is malformed. RFC 7807. Variants:
            - Path parameter `puzzleId` is not a valid UUID
              (`type` = `https://bliss.example/errors/invalid-puzzle-id`).
            - Request body missing or unparseable
              (`type` = `https://bliss.example/errors/invalid-request-body`).
            - `(row, column)` is out of bounds or points at a non-letter
              cell (`type` = `https://bliss.example/errors/invalid-coord`).
              The hint budget is NOT decremented in this case.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          description: Session cookie missing or invalid.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            No puzzle with this id. RFC 7807;
            `type` is `https://bliss.example/errors/puzzle-not-found`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: |
            Hint budget exhausted for this `(puzzle, player)`. RFC 7807;
            `type` is `https://bliss.example/errors/hint-budget-exhausted`.
            The body's `detail` SHOULD echo `hintsRemaining: 0`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/puzzles/{puzzleId}/validate:
    post:
      operationId: validatePuzzle
      summary: Verify a filled grid against the canonical solution.
      description: |
        Compares submitted cells against the server's canonical solution.
        Returns whether the grid is solved and, if not, the positions of
        mismatched or unfilled cells — never the canonical letter. The
        response cannot be used to reconstruct the solution in a single
        call; brute-force letter extraction would require
        `O(width × height × 26)` legal calls and is mitigated by edge rate
        limiting (ops concern, out of scope for this schema).

        Stateless: any client holding a `puzzleId` may call. Cleared cells
        are absent from the request — do NOT send `letter: null`.
      tags: [puzzles]
      parameters:
        - $ref: '#/components/parameters/PuzzleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidatePuzzleRequest'
      responses:
        '200':
          description: |
            Validation completed. `incorrectCells` is empty iff `solved` is
            true. Cells the client did not fill appear in `incorrectCells`
            alongside cells whose submitted letter is wrong.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidatePuzzleResult'
        '400':
          description: |
            Request invalid: position out of range, position pointing at a
            non-letter cell, `letter` not a single uppercase A-Z, or
            duplicate `(row, column)`. RFC 7807;
            `type` is `https://bliss.example/errors/invalid-validate-request`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          description: |
            No puzzle with this id. RFC 7807;
            `type` is `https://bliss.example/errors/puzzle-not-found`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

  /v1/sessions/{sessionId}:
    delete:
      operationId: deleteSession
      summary: Erase server-side data for a session (RGPD Article 17).
      description: |
        Removes every server-side row attributable to `sessionId`. That
        covers `puzzle_hint_usage` always, and `clue_cooldown_session` /
        `clue_cooldown` when the clue-cooldown feature is wired
        (ADR-0031). Any future table keyed on a `session_id` extends
        this same call (ADR-0025 §5).

        Always idempotent and always returns `200`: a session id with no
        prior data returns `deleted: 0`. The endpoint never reveals whether
        a session had data, so a client probing other sessions cannot use
        it as an oracle.

        Matomo audience-measurement visits are NOT erased through this
        call — the daily-rotated salted hash (ADR-0025 §3) makes prior-day
        visits already non-attributable, and a fresh local sessionId after
        the call breaks linkage going forward. The privacy notice
        (`/confidentialite`, `/privacy`) discloses this trade-off.
      tags: [sessions]
      parameters:
        - name: sessionId
          in: path
          required: true
          description: UUID identifying the session to erase.
          schema:
            type: string
            format: uuid
            example: 019186c5-d702-7b3a-a3d4-b40dc2d6d871
      responses:
        '200':
          description: |
            Erasure completed. Body reports the number of rows deleted
            (across all server-side tables). A zero count is a valid
            success — it means the session had no server-side data
            (no hints used, no cooldown rows written).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteSessionResponse'
        '400':
          description: |
            Path parameter `sessionId` is not a valid UUID. RFC 7807;
            `type` is `https://bliss.example/errors/invalid-session-id`.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Secure-ws_session
      description: |
        Identity-api session cookie set by `/v1/auth/login`. Grid-api verifies
        it against identity-api `/v1/auth/whoami` to resolve the calling user.

  parameters:
    PuzzleId:
      name: puzzleId
      in: path
      required: true
      description: UUID v7 identifier of the puzzle.
      schema:
        $ref: '#/components/schemas/PuzzleId'

    OptionalSessionId:
      name: X-Session-Id
      in: header
      required: false
      description: |
        UUID v7 identifying the calling player's session. When present,
        the server biases clue selection on cache miss away from clues
        recently used by the same session (per ADR-0031 "per-session clue
        cooldown"). When absent, no cooldown is applied and clue
        selection is unaffected. Cache hits are unchanged regardless.

        Non-UUID values, or a UUID equal to the reserved daily-bucket
        sentinel `00000000-0000-7000-8000-000000000000`, produce a 400
        `invalid-session-id` response (poisoning guard per ADR-0031
        Threat model § Tampering).
      schema:
        type: string
        format: uuid
        example: 019186c5-d702-7b3a-a3d4-b40dc2d6d871

    PuzzleWidth:
      name: width
      in: query
      required: false
      description: |
        Number of columns to generate. Defaults to 15 when omitted, matching
        the daily landscape grid. Valid range is 5..15 inclusive; values
        outside that range — or non-integers — produce a 400 with problem
        type `https://bliss.example/errors/invalid-puzzle-dimensions`. The
        bounds keep the CSP solver's vocabulary needs and per-request time
        budget reasonable.
      schema:
        type: integer
        minimum: 5
        maximum: 15
        default: 15
        example: 7

    PuzzleHeight:
      name: height
      in: query
      required: false
      description: |
        Number of rows to generate. Defaults to 12 when omitted, matching
        the daily landscape grid. Valid range is 5..15 inclusive; values
        outside that range — or non-integers — produce a 400 with problem
        type `https://bliss.example/errors/invalid-puzzle-dimensions`.
      schema:
        type: integer
        minimum: 5
        maximum: 15
        default: 12
        example: 7

  schemas:
    PuzzleId:
      type: string
      format: uuid
      description: UUID v7 string. Per ADR-0003 §6, ids are never integers.
      example: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b

    Puzzle:
      type: object
      description: A complete mots-fléchés puzzle ready to render and play.
      required: [id, title, language, width, height, cells, clues, hintsAllowed, hintsRemaining, createdAt]
      properties:
        id:
          $ref: '#/components/schemas/PuzzleId'
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Human-facing puzzle title.
          example: Petite grille du mardi
        language:
          type: string
          description: |
            BCP-47 tag (e.g. `fr`, `fr-CA`). Drives clue language and casing
            rules. v1 targets French mots-fléchés; the wire shape is
            language-neutral.
          example: fr
          pattern: '^[A-Za-z]{2,3}(-[A-Za-z0-9]{2,8})*$'
        difficulty:
          type: string
          enum: [facile, moyen, difficile]
          x-enum-varnames: [FACILE, MOYEN, DIFFICILE]
          nullable: true
          description: |
            Puzzle difficulty level. Lowercase French enum values match the
            user-facing content language. Omitted when not yet assigned;
            clients must treat absence as "no difficulty set".
          example: facile
        gridNumber:
          type: integer
          minimum: 1
          nullable: true
          description: |
            Sequential daily-puzzle number (e.g. 142 for the 142nd daily
            grid). Omitted when not yet assigned; clients must treat
            absence as "no number assigned".
          example: 142
        width:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of columns.
          example: 5
        height:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of rows.
          example: 5
        cells:
          type: array
          description: |
            Cells in row-major order. Length is **at least** `width * height`;
            may exceed it when a cell position holds two stacked
            `DefinitionCell` entries (an across clue and a down clue at the
            same position). Clients should look up a cell by `position.row` /
            `position.column`, NOT by flat index `row * width + column` —
            that index is correct only when there are no stacked clue cells.
          items:
            $ref: '#/components/schemas/Cell'
        clues:
          type: array
          description: |
            All clues, listed once. Mots-fléchés renders clue text inside a
            `definition` cell, but `Clue` stays separate so consumers can
            build a side panel, search, or tally completion without walking
            the cell array.
          items:
            $ref: '#/components/schemas/Clue'
        hintsAllowed:
          type: integer
          minimum: 0
          description: |
            Hint budget for this puzzle. The client may call
            `POST /v1/puzzles/{puzzleId}/hints` up to this many times before
            the server returns 429. The budget scope (per puzzle, per player)
            is server-defined; the wire contract only carries the cap.
          example: 3
        hintsRemaining:
          type: integer
          minimum: 0
          description: |
            Hints still available for this puzzle for the current user;
            equals hintsAllowed for anonymous callers.
          example: 2
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant with timezone offset.
          example: '2026-04-24T15:30:00Z'

    ListDailyPuzzlesResponse:
      type: object
      description: |
        Envelope returned by `listDailyPuzzles`. The `items` array is
        capped at 100 entries; clients paginate by issuing successive
        requests with narrower `from`/`to` ranges.
      required: [items, hasMore]
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/PuzzleSummary'
        hasMore:
          type: boolean
          description: |
            `true` when the requested range contained more than 100 items
            and results were truncated to the newest 100. Clients may
            re-query with `to` set to one day before the oldest returned
            `date` to page further back.

    PuzzleSummary:
      type: object
      description: |
        Thin daily-puzzle summary returned by `listDailyPuzzles`. Carries
        only the fields the archive UI needs to render a row; the full
        `Puzzle` document is fetched lazily via `getDailyPuzzle` when the
        player opens a past grid. `id` is the deterministic UUID v7
        derived from `date`, matching what `getDailyPuzzle?date=` returns.
      required: [id, date, gridNumber, totalLetterCells]
      properties:
        id:
          $ref: '#/components/schemas/PuzzleId'
        date:
          type: string
          format: date
          example: '2026-05-05'
        gridNumber:
          type: integer
          minimum: 1
          description: |
            Sequence number from the launch anchor (day 1 = 2026-01-01
            UTC). Always present on daily summaries; see
            `Puzzle.gridNumber` for the optional/nullable shape on the
            full puzzle document.
          example: 125
        difficulty:
          type: string
          nullable: true
          enum: [facile, moyen, difficile]
          x-enum-varnames: [FACILE, MOYEN, DIFFICILE]
          description: |
            Difficulty tier for the daily. Mirrors `Puzzle.difficulty`
            for the same date; `null` means no tier was assigned (clients
            should render no badge).
          example: facile
        totalLetterCells:
          type: integer
          minimum: 1
          description: Count of letter cells in the puzzle (denominator for client-side progress bars).
          example: 28

    Cell:
      type: object
      description: |
        Grid cell variant. `kind` discriminates: `letter` (answer cell,
        optionally pre-filled), `definition` (clue cell with arrow direction),
        `block` (unfillable decorative cell).
      required: [kind, position]
      properties:
        kind:
          $ref: '#/components/schemas/CellKind'
        position:
          $ref: '#/components/schemas/Position'
      discriminator:
        propertyName: kind
        mapping:
          letter: '#/components/schemas/LetterCell'
          definition: '#/components/schemas/DefinitionCell'
          block: '#/components/schemas/BlockCell'
      oneOf:
        - $ref: '#/components/schemas/LetterCell'
        - $ref: '#/components/schemas/DefinitionCell'
        - $ref: '#/components/schemas/BlockCell'

    CellKind:
      type: string
      description: Discriminator for the `Cell` variants.
      enum: [letter, definition, block]
      x-enum-varnames: [LETTER, DEFINITION, BLOCK]

    LetterCell:
      type: object
      description: |
        Player-fillable answer cell. Geometry only — the canonical solution
        is server-private and never appears on the wire. Distinguished from
        `BlockCell` by `kind`. Clients submit filled cells to
        `POST /v1/puzzles/{puzzleId}/validate` for verification.
      required: [kind, position]
      properties:
        kind:
          type: string
          enum: [letter]
        position:
          $ref: '#/components/schemas/Position'

    DefinitionCell:
      type: object
      description: |
        Mots-fléchés definition cell. Holds the clue text and an arrow
        showing where the answer flows.
      required: [kind, position, clueId, text, arrow]
      properties:
        kind:
          type: string
          enum: [definition]
        position:
          $ref: '#/components/schemas/Position'
        clueId:
          $ref: '#/components/schemas/ClueId'
        text:
          type: string
          minLength: 1
          maxLength: 500
          description: Clue text rendered inside the cell.
          example: Capitale de la France
        arrow:
          $ref: '#/components/schemas/Arrow'

    BlockCell:
      type: object
      description: Unfillable decorative cell.
      required: [kind, position]
      properties:
        kind:
          type: string
          enum: [block]
        position:
          $ref: '#/components/schemas/Position'

    Arrow:
      type: string
      description: |
        Arrow direction on a definition cell. `right` and `down` are the
        standard mots-fléchés conventions. `down-right` (first-column clue,
        word starts below going right) and `right-down` (first-row clue,
        word starts right going down) enable edge-cell interlocking.
      enum: [right, down, down-right, right-down]
      x-enum-varnames: [RIGHT, DOWN, DOWN_RIGHT, RIGHT_DOWN]

    Direction:
      type: string
      description: Direction a clue's answer is written.
      enum: [across, down]
      x-enum-varnames: [ACROSS, DOWN]

    Position:
      type: object
      description: Zero-indexed grid coordinate.
      required: [row, column]
      properties:
        row:
          type: integer
          minimum: 0
          description: Zero-indexed row, top to bottom.
        column:
          type: integer
          minimum: 0
          description: Zero-indexed column, left to right.

    ClueId:
      type: string
      format: uuid
      description: UUID v7 identifier of a clue.
      example: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6c

    Clue:
      type: object
      description: |
        A single clue. Mots-fléchés shows the text inside a `DefinitionCell`,
        but the wire keeps `Clue` separate so consumers can list, search,
        and tally without walking the cell array.
      required: [id, direction, start, length, text]
      properties:
        id:
          $ref: '#/components/schemas/ClueId'
        direction:
          $ref: '#/components/schemas/Direction'
        start:
          $ref: '#/components/schemas/Position'
          description: |
            First answer cell (not the definition cell). The definition cell
            sits adjacent to `start` opposite `direction`.
        length:
          type: integer
          minimum: 1
          maximum: 50
          description: Number of letter cells in the answer.
        text:
          type: string
          minLength: 1
          maxLength: 500
          description: |
            Clue text. Duplicated from `DefinitionCell.text` on purpose —
            cheap on a 225-cell grid and spares clients a join.

    RevealCellHintRequest:
      type: object
      description: |
        Request body for `POST /v1/puzzles/{puzzleId}/hints`. Identifies
        the cell whose canonical letter the caller wants to reveal.
        `(row, column)` MUST point at a `letter`-kind cell within the
        puzzle bounds; pointing at a definition or block cell, or out of
        bounds, is a 400 `invalid-coord` and does NOT decrement the
        budget.
      required: [row, column]
      properties:
        row:
          type: integer
          minimum: 0
          description: Zero-indexed row of the cell to reveal.
          example: 3
        column:
          type: integer
          minimum: 0
          description: Zero-indexed column of the cell to reveal.
          example: 5

    DeleteSessionResponse:
      type: object
      description: |
        Response body for `DELETE /v1/sessions/{sessionId}` on a 200.
        Reports the number of rows the server actually deleted across all
        tables that reference the session. `0` is a valid success — the
        session had no server-side data (no hints used, no cooldown rows written).
      required: [deleted]
      properties:
        deleted:
          type: integer
          minimum: 0
          description: Total rows deleted (across all tables).
          example: 3

    RevealCellHintResult:
      type: object
      description: |
        Response body for `POST /v1/puzzles/{puzzleId}/hints` on a 200.
        Echoes the requested coordinate alongside the canonical letter so
        the client can correlate the response with the cell to update
        even if multiple reveals are in flight.
      required: [row, column, letter, hintsRemaining]
      properties:
        row:
          type: integer
          minimum: 0
          description: Echo of the request's `row`.
          example: 3
        column:
          type: integer
          minimum: 0
          description: Echo of the request's `column`.
          example: 5
        letter:
          type: string
          minLength: 1
          maxLength: 1
          pattern: '^[A-Z]$'
          description: |
            Canonical solution letter at `(row, column)`, single uppercase
            A-Z code point. Diacritics are normalized server-side.
          example: P
        hintsRemaining:
          type: integer
          minimum: 0
          description: |
            Hints left after this call. `0` means the next call will return
            a 429 with `type` `https://bliss.example/errors/hint-budget-exhausted`.
          example: 2

    ValidatePuzzleRequest:
      type: object
      description: |
        Request body for `POST /v1/puzzles/{puzzleId}/validate`. Carries the
        cells the client wants to verify. Cleared / unfilled letter cells are
        absent — do NOT send `letter: null`. Order is irrelevant; the server
        keys by `(row, column)`. Duplicate `(row, column)` entries are a 400.
      required: [filledCells]
      properties:
        filledCells:
          type: array
          maxItems: 2500
          description: |
            Submitted letters. `maxItems` matches the protocol-level upper
            bound on letter cells in a `Puzzle` (`width × height` with
            `width`, `height` ≤ 50).
          items:
            $ref: '#/components/schemas/FilledCell'
      example:
        filledCells:
          - { row: 0, column: 1, letter: P }
          - { row: 0, column: 3, letter: G }
          - { row: 0, column: 5, letter: S }

    FilledCell:
      type: object
      description: |
        A single client-submitted letter for a letter cell. `(row, column)`
        must point at a `letter`-kind cell in the puzzle; pointing at a
        definition or block cell is a 400.
      required: [row, column, letter]
      properties:
        row:
          type: integer
          minimum: 0
          example: 0
        column:
          type: integer
          minimum: 0
          example: 1
        letter:
          type: string
          minLength: 1
          maxLength: 1
          pattern: '^[A-Z]$'
          description: |
            Single uppercase A-Z code point. Diacritics are normalized
            client-side before submission.
          example: P

    ValidatePuzzleResult:
      type: object
      description: |
        Validation outcome. The server intentionally returns positions only,
        never the canonical letter, so the response cannot be used to
        reconstruct the solution in a single call.
      required: [solved, incorrectCells]
      properties:
        solved:
          type: boolean
          description: |
            True iff every letter cell is filled and matches the canonical
            solution.
          example: false
        incorrectCells:
          type: array
          description: |
            Positions where the submitted letter is wrong OR the letter cell
            was not filled by the client. Empty iff `solved` is true.
          items:
            $ref: '#/components/schemas/Position'
          example:
            - { row: 4, column: 1 }
            - { row: 6, column: 9 }

    Problem:
      type: object
      description: |
        RFC 7807 error envelope (ADR-0003 §6). Additional members per
        RFC 7807 §3.2 may appear; clients tolerate them.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          description: |
            Stable URI for the error class. Clients route on `type`, never on
            `title` or `detail`.
          example: https://bliss.example/errors/puzzle-not-found
        title:
          type: string
          description: Short, human-readable summary of the error class.
          example: Puzzle not found
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: HTTP status code, repeated for clients that lose it.
          example: 404
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: URI reference identifying the specific occurrence.
