# Smoke test for iter13 DPO. 5 iters, throwaway adapter. Confirms config
# loads, model loads, DPO loss compiles, gradient passes. Run before the
# 320-iter full run.
model: "mlx-community/c4ai-command-r-08-2024-4bit"
data: "data/lora_dpo_iter13_combined"
adapter_path: "models/lora-iter13-smoke"
train_type: lora
train_mode: dpo
num_layers: 16
batch_size: 2
iters: 5
learning_rate: 1e-6
steps_per_report: 1
steps_per_eval: 5
save_every: 5
seed: 20260505
train: true

beta: 0.1
dpo_cpo_loss_type: sigmoid

resume_adapter_file: "models/lora-clue-v3/adapters.safetensors"

lora_parameters:
  rank: 32
  dropout: 0.0
  scale: 20.0
