# Shared defaults for the observability umbrella chart.
# Per-env files override what differs (values-prod.yaml). Each subchart's
# values are nested under its dependency name (Helm convention).

signoz:
  enabled: true

  # Cluster identifier surfaced on every ingested span/metric/log. Lets
  # the SigNoz UI tag data by deployment when we eventually have multiple
  # (staging/prod). One value today.
  global:
    clusterName: "wordsparrow-prod"

  # Right-sized for the cx33 worker. SigNoz's defaults assume larger
  # nodes; we cut back where the workload tolerates it. Expect to revisit
  # once we have real telemetry to justify bumps.
  # ZooKeeper is nested under clickhouse (signoz.clickhouse.zookeeper),
  # not at the SigNoz top level — first-iteration override at
  # signoz.zookeeper.* was silently ignored.
  clickhouse:
    replicaCount: 1
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    zookeeper:
      replicaCount: 1
      # Bitnami flipped their public Docker Hub policy in 2024-08
      # to "latest only" and moved every older tag from `bitnami/*`
      # to `bitnamilegacy/*`. The SigNoz subchart's pin
      # (`bitnami/zookeeper:3.7.1`) now 404s. Override the
      # repository to `bitnamilegacy/zookeeper`; the tag is the
      # same and SigNoz documents 3.7.1 as the supported ZK
      # version (its own comment warns against changing it).
      # Revisit if/when SigNoz upstream bumps the pin.
      image:
        repository: bitnamilegacy/zookeeper
      # Initial 256Mi limit OOMKilled the pod during JVM startup
      # (Bitnami's ZK 3.7.1 image runs OpenJDK 17, baseline ~200 MB
      # before any ZNodes). 512Mi gives the JVM headroom for the
      # heap + non-heap (compressed class space, code cache,
      # metaspace) without paging.
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi

  queryService:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  frontend:
    # Disable the chart's default Ingress — we manage two aliased
    # ingresses (errors.wordsparrow.io + dashboard.wordsparrow.io) in
    # templates/ingress-signoz-ui.yaml so they share the htpasswd
    # auth-secret + cert-manager annotations consistently.
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  alertmanager:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  otelCollector:
    # PII scrubbing per ADR-0027 §8 — drop `?email=` / `?token=` /
    # `?session=` query parameters; redact Authorization + Cookie
    # request headers; never capture request bodies. Implemented as
    # OTel transform processors. The exact processor config lives
    # under .Values.signoz.otelCollector.config.processors and is
    # set by the SigNoz subchart's defaults; we override below to
    # add our scrubbing pipeline.
    #
    # Left empty in v1 — applied as a follow-up once we have real
    # telemetry to inform the redaction list. PR-E ships the agent;
    # PR-D ships the backend; PII config is small enough to land
    # inline once we know what's there to scrub.
    config: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# oauth2-proxy — cookie-issuing wrapper around `admin-htpasswd` so
# SigNoz's SPA XHR/WS don't trigger basic-auth re-prompts on every
# request. Standalone htpasswd mode (no OIDC). Single session cookie
# scoped to `.wordsparrow.io`, valid for 7 days. See
# templates/oauth2-proxy.yaml for the full deployment.
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.6.0

# Ingress hosts. Two ingresses target the same SigNoz frontend Service:
# `errors.wordsparrow.io` (Sentry-style "what blew up" entry point) and
# `dashboard.wordsparrow.io` (the same UI's metrics + traces views are
# the primary use). Both gated by the same `admin-htpasswd` Secret per
# ADR-0028.
ingress:
  enabled: true
  className: nginx
  hosts:
    - errors.wordsparrow.io
    - dashboard.wordsparrow.io
  tlsSecretName: signoz-tls
  # Hetzner floating IP — same value the rest of the charts use
  # (matomo, grid/api, game/api). When the FIP rotates, update every
  # chart's values-prod.yaml in the same PR.
  floatingIp: "116.202.180.82"
  # SigNoz UI Service backend. SigNoz 0.122 consolidated what used to
  # be a separate `<release>-signoz-frontend` Service (port 3301) into
  # the main `<release>-signoz` Service exposing port 8080. Empty
  # `serviceName` would default to the legacy name and 503 because
  # that Service no longer exists in 0.122. Pin explicitly.
  serviceName: observability-signoz
  servicePort: 8080
  # The htpasswd-gated Secret is bootstrapped out-of-band by
  # scripts/bootstrap-admin-htpasswd.sh (ADR-0028 §2). Name match
  # required; `admin-htpasswd` is the documented value.
  authSecretName: admin-htpasswd

  # Public OTLP/HTTP ingest endpoint at otlp.wordsparrow.io for the
  # browser OTel SDK (PR-F.2). Disabled in this defaults file; enable
  # in values-prod.yaml. ADR-0033 documents the trade-offs (public
  # endpoint risk, mitigations, alternatives).
  otlpPublic:
    enabled: false
    host: ""
    # Origins accepted as `Origin:` header (browser CORS + nginx
    # allow-list). Both apex and www included so visitors arriving via
    # either don't have their traces silently dropped.
    allowedOrigins:
      - https://wordsparrow.io
      - https://www.wordsparrow.io
    # Sustained per-IP request rate. nginx-ingress's default unit is
    # requests/second. With the browser sampler at 10% (PR-F.2), 5
    # rps/IP supports ~50 actual user requests/sec/IP without dropping.
    limitRps: 5
    # Burst headroom multiplier — final burst window is
    # `limitRps * limitBurstMultiplier`.
    limitBurstMultiplier: 10
    # Service name + port of the SigNoz-bundled OTel collector's HTTP
    # receiver (default config exposes 4318 via the collector Service).
    # Same release prefix the gRPC endpoint uses in app charts'
    # OTEL_EXPORTER_OTLP_ENDPOINT.
    collectorService: "observability-signoz-otel-collector"
    collectorPort: 4318
