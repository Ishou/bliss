# Shared defaults. Per-env files override what differs.
image:
  # GHCR image built by the sibling image-build pipeline.
  repository: ghcr.io/ishou/bliss/wordsparrow-api
  # Required by manifesto ("pin to digest"). Empty -> tag fallback. Format "sha256:...".
  digest: ""
  # Pull reference when digest is empty (local-only divergence).
  tag: "main"
  pullPolicy: IfNotPresent
  # Manifesto: container images pinned to digest. Local dev tolerates a
  # mutable tag; prod must not. Overridden to true in values-prod.yaml so
  # `helm install/upgrade` aborts when CD forgot to inject the digest.
  requireDigest: false
# Replica count. Override per env (prod=2, local=1).
replicaCount: 1
# Pod resources. Empty default — env files set requests/limits.
resources: {}
service:
  type: ClusterIP
  # Prod listens on 8080. Local-dev default in Main.kt is 7777; the chart
  # pins PORT=8080 explicitly via the `env:` block below so prod is stable
  # regardless of in-app default changes.
  port: 8080
ingress:
  enabled: true
  className: nginx
  # REQUIRED per env (api.wordsparrow.io prod, wordsparrow.local local).
  host: ""
  # TLS Secret name created by cert-manager from the ingress annotation.
  tlsSecretName: ""
  # Env files set cert-manager and external-dns annotations here.
  annotations: {}
postgres:
  cluster:
    # CNPG Cluster instances. Prod=3 (HA, ADR-0009 §3); local=1.
    instances: 1
    storage:
      size: 10Gi
      # Empty = cluster default. Prod "hcloud-volumes"; local "local-path".
      storageClass: ""
    bootstrap: {database: wordsparrow, owner: wordsparrow}
  backups:
    # Off by default. Prod turns this on; local stays off.
    enabled: false
    # S3-compatible bucket. ADR-0010 §1: "<project>-cnpg-backups".
    bucket: ""
    # S3 endpoint URL. Hetzner OS FSN1 in prod (ADR-0010 §2).
    endpoint: ""
    # Daily 02:00 UTC scheduled backup.
    schedule: "0 2 * * *"
    # CNPG retention policy notation (e.g. "30d").
    retentionPolicy: "30d"
serviceAccount:
  create: true
  # Empty -> templated as <fullname>.
  name: ""
podSecurityContext: {runAsNonRoot: true, fsGroup: 1000}
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: {drop: [ALL]}
probes:
  # Health endpoint — grid/api/src/main/kotlin/com/bliss/grid/api/routes/HealthRoute.kt:18.
  liveness: {path: "/v1/health"}
  readiness: {path: "/v1/health"}
  # 30 × 5 s = 150 s startup budget for CSV load + position-letter index build on 250m-CPU pod; default 35 s probe budget triggers false rollback
  startup:
    path: "/v1/health"
    periodSeconds: 5
    failureThreshold: 30
# Inline env vars. Prefer envFromSecret for anything sensitive.
# OpenJDK default MaxRAMPercentage=25 → ~256 MB on 1Gi; 75% → ~768 MB heap for position-letter index
env:
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxRAMPercentage=75.0"
  # Pin prod port. Main.kt's DEFAULT_PORT is 7777 (local-dev convenience);
  # this keeps prod on 8080 regardless of in-app default changes.
  - name: PORT
    value: "8080"
# Name of a Kubernetes Secret to envFrom into the pod. ADR-0009 §10:
# bootstrapped via `kubectl create secret`, never committed.
envFromSecret: ""
# Data-retention CronJobs (ADR-0025 §5, docs/privacy/retention-schedule.md).
retention:
  hintUsage:
    # Off by default — local-dev keeps everything. Prod enables.
    enabled: false
    # Cron expression. Daily 03:30 UTC, after the 02:00 CNPG backup.
    schedule: "30 3 * * *"
    # Days from `updated_at` to keep rows.
    days: 90
    # Tiny image with `psql` only. Pin to a digest in prod.
    image: "postgres:16-alpine"
