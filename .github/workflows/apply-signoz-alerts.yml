name: Apply SigNoz Alerts

# Required repo secrets: KUBECONFIG_PROD, SIGNOZ_API_KEY (see docs/secrets.md).
# SigNoz Ingress is gated by oauth2-proxy, so we reach the API cluster-internally
# via `kubectl port-forward` to observability-signoz.observability:8080.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref (branch / tag / SHA) to apply the alerts from.'
        required: false
        type: string
        default: main

concurrency:
  # cancel-in-progress: false — a mid-PUT cancel leaves a partial rule body in SigNoz.
  group: apply-signoz-alerts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  apply:
    name: apply signoz alerts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository at requested ref
        # actions/checkout v4.3.1 — same SHA as helm-lint.yml + deploy-api-k8s.yml.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_DATA:-}" ]; then
            echo "::error::KUBECONFIG_PROD repository secret is not set; see docs/deploy.md"
            exit 1
          fi
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply SigNoz rules via port-forward
        env:
          SIGNOZ_API_KEY: ${{ secrets.SIGNOZ_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SIGNOZ_API_KEY:-}" ]; then
            echo "::error::SIGNOZ_API_KEY repository secret is not set; see infra/observability/alerts/README.md"
            exit 1
          fi
          # Background port-forward; trap kills it on exit (success or failure).
          kubectl -n observability port-forward svc/observability-signoz 18080:8080 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID" 2>/dev/null || true; wait "$PF_PID" 2>/dev/null || true' EXIT
          # Wait up to 30s for the SigNoz rules endpoint to return valid JSON.
          for i in $(seq 1 30); do
            body=$(curl -fsS -m 2 http://localhost:18080/api/v1/rules 2>/dev/null || true)
            if [ -n "$body" ] && printf '%s' "$body" | jq -e . >/dev/null 2>&1; then
              echo "port-forward ready after ${i}s"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::port-forward did not become ready within 30s"
              cat /tmp/pf.log || true
              exit 1
            fi
            sleep 1
          done
          SIGNOZ_URL=http://localhost:18080 bash infra/observability/alerts/apply.sh
