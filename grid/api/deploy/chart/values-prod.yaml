# Production overrides — Hetzner k3s cluster (ADR-0009 §2).
replicaCount: 2
image:
  # Fail-fast guard: helm aborts if digest is empty (see _helpers.tpl).
  requireDigest: true
  # Set by the CD workflow per push (ADR-0009 §8 step 5). Format "sha256:...".
  digest: ""
resources:
  # CPU 1000m → 3000m, memory 1Gi → 2Gi (2026-05-10) — the 15×12
  # daily-grid default (PR #356) pushes the CSP solver from ~100-cell
  # to 180-cell grids, and PR #357 grew the in-memory corpus from ~46k
  # to ~76k rows. The per-attempt timeout (5s × 10 attempts = 50s) was
  # exhausting in prod under the prior 1-vCPU limit while the same
  # code succeeded locally on a 14-core box. The CPU bump gives the
  # backtracking solver headroom; the RAM bump keeps the JVM
  # (-XX:MaxRAMPercentage=75.0 = ~1.5Gi heap) comfortable with the
  # larger corpus + index footprint.
  requests: {cpu: 250m, memory: 512Mi}
  limits: {cpu: 3000m, memory: 2Gi}
ingress:
  host: "api.wordsparrow.io"
  tlsSecretName: "wordsparrow-api-tls"
  # Issuer + external-dns provider installed by cluster bring-up (ADR-0009 §3).
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "api.wordsparrow.io"
    # Per repo rule (`docs/deploy.md` §"Floating IP / DNS records"): every
    # Ingress in this repo sets `target` explicitly to the Hetzner floating
    # IP. Currently works without it because the platform chart was upgraded
    # with `--set ingress-nginx.controller.extraArgs.publish-status-address=...`,
    # but that's brittle — a future re-install without the override silently
    # publishes a ClusterIP. Pinning per-Ingress removes the dependency.
    external-dns.alpha.kubernetes.io/target: "116.202.180.82"
    # Per-IP rate limiting at the ingress (leaky-bucket). Puzzle generation
    # runs an expensive CSP solver, so first-line abuse protection sits at
    # the boundary rather than in-process. Tunable; raise/lower per
    # observed traffic. `limit-rps` is the average; burst is rps × multiplier.
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"
postgres:
  cluster:
    # HA per ADR-0009 §3 + docs/local-development.md divergence table.
    instances: 3
    storage: {size: 20Gi, storageClass: "hcloud-volumes"}
  backups:
    enabled: true
    # ADR-0010 §1 (bucket created one-time per ADR-0010 §4); FSN1 endpoint per §2.
    bucket: "bliss-cnpg-backups"
    endpoint: "https://fsn1.your-objectstorage.com"
# Bootstrapped via `kubectl create secret generic wordsparrow-api-env ...` (ADR-0009 §10).
envFromSecret: "wordsparrow-api-env"
retention:
  hintUsage:
    enabled: true
    image:
      requireDigest: true
      # postgres:16-alpine (see values.yaml). Third-party image, pinned in
      # this file rather than injected by CD: the CD workflow only resolves
      # the grid-api digest. Bump alongside the `tag` in values.yaml.
      digest: "sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50"
ensureDailies:
  enabled: true
  image:
    # Fail-fast guard: helm aborts if digest is empty (see _helpers.tpl).
    # CD workflow injects the worker image digest at deploy time once the
    # worker image-build matrix row lands (follow-up PR).
    requireDigest: true
    digest: ""
