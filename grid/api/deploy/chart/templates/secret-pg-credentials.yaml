{{/*
CNPG bootstrap credentials — chart-managed.

The CNPG `Cluster` CR (postgres-cluster.yaml) references this Secret as
`bootstrap.initdb.secret.name` so the chart owns the owner-role
password from initdb time. CNPG also surfaces the same credentials on
its auto-generated `<cluster>-app` Secret, which the api Deployment
reads via `valueFrom: secretKeyRef` for the runtime DATABASE_URL — see
deployment.yaml.

This eliminates the two-pass install dance documented previously
("install with placeholder DATABASE_URL → wait for cluster Ready →
swap real URI from <cluster>-app → restart api"). With the chart
owning the password from the start, `helm install --wait` never has to
wait on a value that only exists post-install: the credentials Secret
is part of the release manifest, the CNPG Cluster CR references it
directly, and CNPG fills `<cluster>-app` from the same source as soon
as initdb runs. The api pod blocks on `<cluster>-app` existing
(kubelet retries pod-create until secret resolves) but there is no
manual operator step in between.

**Password persistence across upgrades.** Helm `lookup` returns the
existing in-cluster Secret on every reconcile, so the same password
is rendered into every `helm upgrade` template pass — the password is
generated once on first install and never rotated automatically.
Rotation is an explicit operation: delete this Secret and run
`helm upgrade --force`. (Note also that `lookup` returns empty on
`helm template` and `--dry-run` runs, so those produce a fresh random
password each time. Real installs read the live cluster.)
*/}}
{{- $secretName := printf "%s-bootstrap" (include "wordsparrow-api.pgClusterName" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if and $existing $existing.data (index $existing.data "password") -}}
{{- $password = index $existing.data "password" | b64dec -}}
{{- else -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "wordsparrow-api.labels" . | nindent 4 }}
  annotations:
    # Detach this Secret from helm release ownership at lookup time —
    # without it, a `helm uninstall` would delete the Secret along
    # with the release, and a subsequent `helm install` would generate
    # a *new* random password while the persistent CNPG storage volume
    # still encodes the *old* owner password. The next pod start would
    # then fail authentication. `helm.sh/resource-policy: keep` makes
    # the Secret survive `helm uninstall`; the operator can delete it
    # explicitly when they intend to wipe DB state.
    "helm.sh/resource-policy": keep
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgres.cluster.bootstrap.owner | quote }}
  password: {{ $password | quote }}
