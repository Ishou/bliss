cluster:
  # CNPG Cluster instances. Prod=3 (HA, ADR-0009 §3); local=1.
  instances: 1
  # PostgreSQL image — pinned by tag AND digest, kept in lockstep with
  # game/api + identity/api db-charts so all contexts move major versions
  # in the same operator window.
  imageName: "ghcr.io/cloudnative-pg/postgresql:18.1-system-bookworm@sha256:61654dc3b1aa2191e083288caf332e60daa342817a64a285283e69e31f1c854d"
  storage:
    size: 5Gi
    # Empty = cluster default. Prod "hcloud-volumes"; local "local-path".
    storageClass: ""
  # Database + owner names. The api Deployment's wait-for-postgres init
  # container uses `pg_isready -U survey -d survey` — both names must
  # match here or the readiness check spins forever.
  bootstrap: {database: survey, owner: survey}
backups:
  # Off by default. Prod turns this on; local stays off.
  enabled: false
  # S3-compatible bucket. ADR-0010 §1: "<project>-cnpg-backups".
  bucket: ""
  # S3 endpoint URL. Hetzner OS FSN1 in prod (ADR-0010 §2).
  endpoint: ""
  # CNPG retention policy notation (e.g. "30d").
  retentionPolicy: "30d"
