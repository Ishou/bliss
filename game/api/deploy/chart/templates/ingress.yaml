{{- if .Values.ingress.enabled -}}
{{- if not .Values.ingress.host -}}
{{- fail "ingress.host must be set (see values-prod.yaml / values-local.yaml)" -}}
{{- end -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "bliss-game-api.fullname" . }}
  labels: {{- include "bliss-game-api.labels" . | nindent 4 }}
  annotations:
    # WebSocket-friendly nginx-ingress annotations (ADR-0018 §3 + §6).
    # Defaults to a 60 s upstream proxy timeout would silently close
    # idle game sessions mid-turn; bump both directions to 1 hour to
    # cover lobby-wait + slow-paced gameplay. HTTP/1.1 is required for
    # the `Upgrade: websocket` handshake (HTTP/2 multiplexing breaks
    # the upgrade). These three are NOT env-specific and live inline,
    # not in values.yaml — flipping them is a chart-shape change.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tlsSecretName }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # /game prefix mirrors grid's /grid pattern. Same host, two
          # services co-existing on a single ingress controller.
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "bliss-game-api.fullname" . }}
                port: {number: {{ .Values.service.port }}}
{{- end }}
