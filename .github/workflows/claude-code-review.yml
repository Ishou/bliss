name: Claude Code Review

# Implements ADR-0001 §6a: exactly one automated review-and-fix cycle per PR.
#
# Triggers fire on opened, ready_for_review, synchronize, and reopened so
# every PR head receives a definitive `claude-review` check status. The
# one-pass cap is enforced by the "Check for prior §6a review" step: it
# queries `gh pr view` for an existing review by claude[bot]; if one exists,
# all subsequent steps are skipped via `if:` and the job exits success
# without rerunning the reviewer or fixer.
#
# Why this matters: previously the workflow only fired on opened, so the
# fixer's commit-and-push (a synchronize event) left the original
# `claude-review` check pinned to a stale commit SHA — manifested as a
# perpetually "in_progress" status on the PR after force-pushes. Now every
# PR head has its own check that either runs the cycle (first time) or
# short-circuits to success (every time after).
#
# Concurrency keys on the PR number with cancel-in-progress=false (default):
# arrivals while the first cycle is running queue rather than restart, so
# by the time the second arrival runs the prior review exists and the cap
# fires deterministically.
#
# Job sequence (first run only):
#   1. Reviewer agent reads CLAUDE.md/MANIFESTO.md/ADRs and the PR diff,
#      then submits exactly one review via `gh pr review --comment`.
#   2. Detect step queries the just-posted review and sets `has_findings`.
#   3. Fixer agent (only when findings exist) reads the review, applies
#      fixes or writes rebuttals, runs the relevant verification, commits,
#      pushes to the PR branch, and posts one reply comment.
#
# Permissions: `contents: write` is required only for the fixer to push to
# PR branches. The reviewer's allowlist confines it to read + post-review;
# the fixer's allowlist is broader (Edit/Write/Bash) but capped at one push
# per PR by the prior-review check.

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity for fixer commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for prior §6a review (one-pass cap)
        id: cap
        # Enforces ADR-0001 §6a's "exactly one pass" rule across multiple
        # workflow triggers (synchronize, reopened) on the same PR. If the
        # bot has already reviewed, every subsequent step is skipped via
        # `if: steps.cap.outputs.skip != 'true'` and the job exits success
        # — keeping the GitHub PR UI honest without re-running the agents.
        run: |
          set -euo pipefail
          existing=$(gh pr view "$PR_NUMBER" --json reviews \
            --jq '[.reviews[] | select(.author.login | endswith("[bot]"))] | length' \
            || echo 0)
          if [ "${existing:-0}" -gt 0 ]; then
            echo "::notice::Prior §6a review by claude[bot] exists; skipping (ADR-0001 §6a one-pass cap)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No prior §6a review found; proceeding with reviewer + fixer."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run reviewer agent
        if: steps.cap.outputs.skip != 'true'
        id: reviewer
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # Read-only on the repo. The reviewer's only output is a markdown
          # file at /tmp/review.md — the workflow's "Submit review" step
          # below posts it via `gh pr review`. The agent has NO `gh pr review`
          # capability on its tool allowlist, which mechanically prevents the
          # multi-post behaviour observed on PR #31 (12 spurious reviews).
          claude_args: '--allowed-tools "Read,Glob,Grep,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(cat:*),Bash(test:*)"'
          prompt: |
            You are the §6a reviewer agent for PR #${{ github.event.pull_request.number }}
            on the bliss repository (${{ github.repository }}).

            ## Read first

            Before reviewing, read these files in the checked-out repo:
            - `CLAUDE.md` (engineering rules; the authoritative ruleset)
            - `MANIFESTO.md` (rationale)
            - All merged ADRs under `docs/adr/` (especially ADR-0001 §6a,
              which defines your role).
            - Any `<context>/api/openapi.yaml` or `asyncapi.yaml` relevant to
              the files changed in this PR.

            ## Your role

            You perform exactly **one** review pass on this PR. There is no
            second pass. Your output is the input to the §6a fixer agent
            that runs immediately after you in this same workflow; the fixer
            applies your findings (or writes rebuttals), pushes once, and
            stops. The human maintainer arbitrates at merge time.

            ## In scope (you must check)

            1. **Contract adherence.** If the PR touches a bounded context
               with an `api/openapi.yaml` or `api/asyncapi.yaml`, verify the
               implementation matches the merged spec. If this *is* a schema
               PR, verify ADR-0003 wire conventions: OpenAPI 3.1, UUID v7,
               ISO-8601, RFC 7807, cursor pagination, camelCase, explicit
               `required` and `nullable`, no numeric enums.

            2. **Manifesto adherence.** Verify:
               - Domain layer has no infrastructure, application, or api
                 imports.
               - No vendor SDK imports in `domain/` or `application/`.
               - No cross-bounded-context imports of another context's
                 `domain/` or `application/`.
               - Tests test behavior, not structure.
               - Mocks only at external boundaries.
               - Conventional-commit message scoping is correct.
               - Branch name matches
                 `^(feat|fix|chore|refactor|test|docs)/[A-Za-z0-9._-]+$`.
               - PR diff stays under 400 lines (generated code excluded).
               - Single bounded context, single workstream.

            3. **Test coverage of behavior.** New domain logic has tests for
               behavior including failure modes. Trivial code (getters,
               setters, simple delegation) should *not* have tests.

            4. **Obvious bugs.** Off-by-one, null deref, leaked secrets,
               race conditions visible at the surface, hard-coded
               credentials, missing validation at system boundaries.

            ## Out of scope (you must NOT comment on)

            - Formatting (the formatter is the authority).
            - Style preferences not grounded in the manifesto.
            - Unrelated improvements / scope creep.
            - Disagreements with the manifesto itself — those are separate
              ADR-amendment workstreams, not review comments.

            ## Output (you must actually post this — not just write it)

            Drafting the review is not enough. You must call the GitHub CLI
            to submit it; if you only write the text and exit, nothing
            reaches the PR.

            Steps, in order:

            1. `gh pr view "$PR_NUMBER" --json title,body,files,additions,deletions`
               and `gh pr diff "$PR_NUMBER"` to see the change.
            2. Read the rule files (Read tool).
            3. Compose the review body in markdown. **Begin with one of:**
               - `LGTM, no findings.`
               - `Findings — see comments below.`
               For each finding: cite the rule (`CLAUDE.md` "no SDK in
               domain", `ADR-0001 §6`, etc.), quote the file/line briefly,
               and propose a fix.
            4. **Write the body to `/tmp/review.md`** using a `cat <<'BODY' > /tmp/review.md` heredoc.
               That is your only output. **Do not** attempt to post the
               review yourself — you have no `gh pr review` capability.
               A separate workflow step submits the file. If `/tmp/review.md`
               doesn't exist when this agent step exits, the submit step
               posts a default `LGTM, no findings.` so the PR isn't left
               in a dangling state.

            ## Tone

            Direct, no sycophancy. State facts, cite rules, be brief.

            ## Cap

            This is your only pass. The fixer will run after you and push
            once. The workflow does fire again on subsequent `synchronize`
            and `reopened` events (so every PR head receives a definitive
            check status), but the pre-flight "Check for prior §6a review"
            step short-circuits all agent steps when this review already
            exists. You will not run twice on the same PR.

      - name: Submit review
        # The reviewer agent above writes its review to /tmp/review.md and
        # has no `gh pr review` capability. This step posts the file once,
        # bash-side, mechanically preventing the multi-post behaviour seen
        # on PR #31 where an in-prompt agent iterated 12 times to figure
        # out gh-CLI escaping. If the agent didn't write the file (it
        # crashed, the model timed out, etc.), default to a non-blocking
        # placeholder so the PR isn't left without a review.
        if: steps.cap.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/review.md ]; then
            echo "::warning::Reviewer agent did not produce /tmp/review.md; posting fallback notice."
            cat > /tmp/review.md <<'BODY'
          LGTM, no findings.

          (The §6a reviewer agent did not produce a review body. This is
          a workflow-level fallback so the PR isn't left without a check.
          Tracked via the action run logs.)
          BODY
          fi
          gh pr review "$PR_NUMBER" --comment --body-file /tmp/review.md

      - name: Detect findings
        if: steps.cap.outputs.skip != 'true'
        id: detect
        run: |
          set -euo pipefail
          # The reviewer just posted via `gh pr review --comment`. Pull the
          # latest review body and check whether it begins with the LGTM
          # sentinel from the prompt. Anything else (or empty) is treated
          # as findings to fix.
          body=$(gh pr view "$PR_NUMBER" \
            --json reviews \
            --jq 'last(.reviews[] | select(.author.login | endswith("[bot]") or . == "claude")).body // ""' \
            || true)
          if [ -z "$body" ]; then
            echo "Reviewer left no review body — skipping fixer."
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          first_line=$(echo "$body" | head -n 1)
          echo "First line of review: $first_line"
          # Match `LGTM` at the start, case-sensitive (per the prompt).
          if echo "$first_line" | grep -q '^LGTM'; then
            echo "Reviewer posted LGTM — skipping fixer."
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          else
            echo "Reviewer posted findings — running fixer."
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run fixer agent
        if: steps.cap.outputs.skip != 'true' && steps.detect.outputs.has_findings == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # The fixer needs Edit/Write to apply fixes, plus shell access to
          # run pnpm/gradle, commit, push, and post the reply comment. The
          # one-push cap is enforced by the trigger config (synchronize is
          # not a trigger), not by this allowlist.
          claude_args: >-
            --allowed-tools "Read,Glob,Grep,Edit,Write,Bash(git:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(pnpm:*),Bash(npm:*),Bash(npx:*),Bash(node:*),Bash(./gradlew:*),Bash(gradle:*),Bash(cat:*),Bash(ls:*),Bash(test:*),Bash(true)"
          prompt: |
            You are the §6a fixer agent for PR #${{ github.event.pull_request.number }}
            on the bliss repository (${{ github.repository }}).

            The §6a reviewer just posted a review with findings on this PR.
            Your job is to apply the fixes (or post rebuttals) and push the
            result, exactly once.

            ## Read first

            - `CLAUDE.md` (rules) and `MANIFESTO.md` (rationale).
            - All merged ADRs under `docs/adr/`.
            - The reviewer's most recent review on this PR. Get the body
              with:
              `gh pr view "$PR_NUMBER" --json reviews --jq 'last(.reviews[] | select(.author.login | endswith("[bot]") or . == "claude")).body'`

            ## Your role

            You perform exactly **one** fix pass on this PR. After you push,
            the workflow does not re-trigger; the human maintainer reviews
            and merges. No second review, no second fix, no agent
            ping-pong.

            ## Procedure

            1. Identify each finding from the review. The reviewer was
               instructed to format findings with rule citations and
               file/line refs. Treat each as a separate item.

            2. For each finding, do exactly one of:
               - **Apply the fix** with Edit/Write tools.
               - **Note as rebuttal** in your reply comment, with a brief
                 reason grounded in the manifesto / ADRs.
               - **Defer** with `out of scope, see follow-up workstream <id>`
                 (only when the fix would push the PR over the 400-line cap
                 or would require a separate context).

               Use judgment when the reviewer's literal instruction is
               technically wrong: fix the underlying issue, not the literal
               text. Explain non-trivial decisions in your reply comment.

            3. **Verify** based on what you changed:
               - If you touched `frontend/`:
                 `cd frontend && pnpm install --frozen-lockfile && pnpm typecheck && pnpm lint && pnpm test && pnpm build`
               - If you touched JVM (anything under `grid/`, `build.gradle.kts`,
                 `settings.gradle.kts`, etc.): `./gradlew build`
               - If you only touched docs/ADRs: read the diff with `git diff`
                 for coherence; no executable verification needed.
               - Run only what is relevant to the changed files.
               - If verification fails, fix the cause; do not work around.

            4. Read your diff: `git diff`. Sanity-check before committing.

            5. Commit with focused conventional-commit messages. One commit
               if changes are coupled; split when independent. Use
               `<type>(<scope>): ...` form, scope = bounded-context-layer
               or `adr-NNNN`. Examples:
               - `fix(frontend-ui): set document title for WCAG 2.4.2 compliance`
               - `docs(adr-0004): require IaC for Cloudflare Pages project`
               - `fix(grid-domain): handle zero-length word edge case`

               Do **not** modify `CLAUDE.md`, `MANIFESTO.md`, or any merged
               ADR.

            6. Push to the PR branch:
               `git push origin "$PR_HEAD_REF"`
               Do **not** force-push. Do **not** push to main. The branch
               is already checked out at HEAD.

            7. **Write your reply to `/tmp/reply.md`** using a heredoc:
               ```
               cat <<'REPLY' > /tmp/reply.md
               ... your bullet list ...
               REPLY
               ```
               That is your only output for this finding-mapping step.
               **Do not** post the comment yourself — you have no
               `gh pr comment` capability. A separate workflow step
               submits the file once, bash-side. If `/tmp/reply.md`
               doesn't exist when this agent step exits, no comment is
               posted (no-op).
               Format: short bullet list, each finding marked
               `fixed in <short-sha>` or with a brief rebuttal. Cite the
               rule and the lines you changed. Tight, no filler.

            ## Constraints

            - Do not force-push.
            - Do not modify CLAUDE.md, MANIFESTO.md, or any merged ADR.
            - Do not skip CI hooks (no `--no-verify`, no `--no-gpg-sign`).
            - Do not fix things not in the review (no scope creep).
            - Do not call `gh pr comment` more than once.
            - Do not open a new PR.
            - Do not push to any branch other than `$PR_HEAD_REF`.

            ## Cap

            This is your only pass. After your push, the workflow does not
            re-trigger.

      - name: Submit fixer reply
        # The fixer agent above writes its findings→fixes mapping to
        # /tmp/reply.md and has no `gh pr comment` capability. Same shape
        # as the "Submit review" step: bash-side post, called exactly once,
        # immune to in-prompt iteration loops. Skipped if the agent
        # didn't produce a file (e.g. no findings, or agent crashed).
        if: steps.cap.outputs.skip != 'true' && steps.detect.outputs.has_findings == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/reply.md ]; then
            echo "::warning::Fixer agent did not produce /tmp/reply.md; skipping reply comment."
            exit 0
          fi
          gh pr comment "$PR_NUMBER" --body-file /tmp/reply.md
