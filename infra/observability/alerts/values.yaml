signoz:
  # Cluster-internal Service URL. No Ingress, no oauth2-proxy — the Job
  # runs in the observability namespace and reaches the Service directly.
  url: "http://observability-signoz:8080"

apiKey:
  # Name of the k8s Secret holding the SigNoz API key. The Secret MUST
  # carry a data key named `apiKey` — envFrom maps it to env $apiKey.
  # One-time operator bootstrap; see README.
  secretName: signoz-alerts-apply-key

image:
  # natsio/nats-box bundles curl + jq + sh on Alpine — the same image
  # used by infra/nats/templates/stream-bootstrap-job.yaml. Reusing it
  # avoids pulling a second tiny image into the cluster.
  repository: natsio/nats-box
  tag: "0.19.5"
  digest: "sha256:5d513bf0bb82d6af3fe8363097eb14d2e4ca3242db24140db88df4a4ba082442"
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
