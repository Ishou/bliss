apiVersion: v2
name: observability
description: |
  WordSparrow observability backend (ADR-0027). Wraps the upstream SigNoz
  chart to ingest OTLP traces/metrics/logs/errors from grid/api, game/api,
  and the frontend, and exposes the SigNoz UI behind ingress-nginx with
  htpasswd auth (ADR-0028).

  Companion to:
    - PR-E: backend OTel Java agent on grid/api + game/api
    - PR-F: frontend OTel browser SDK + public OTLP ingest ingress
    - PR-H: SigNoz alert rule + Gmail SMTP relay

  Out of scope here: the apps emitting OTLP and the public OTLP receiver
  ingress. PR-D ships the backend and admin-side ingresses only.
type: application
version: 0.1.0
appVersion: "0.1.0"
# SigNoz subchart pin. 0.122.0 ships SigNoz app v0.122.0 — initial pin
# at 0.55.0 (app v0.57) shipped fine but was already 65 minor releases
# behind upstream by the time we deployed; bumped on first install.
# Bumps are deliberate in their own PR per MANIFESTO Reproducible
# Builds; no floating versions.
#
# The chart bundles ClickHouse + ZooKeeper + query-service + frontend +
# alertmanager + otel-collector. We override values to right-size for
# the cx33 worker (~8 GB RAM total, ~3 GB available after grid/game/
# matomo). Single ClickHouse replica (HA off in v1, same posture as
# CNPG cluster.instances=1 in `local`).
dependencies:
  - name: signoz
    version: "0.122.0"
    repository: "https://charts.signoz.io"
    condition: signoz.enabled
  # SigNoz k8s-infra: separate Helm chart that deploys the per-node
  # otel-agent DaemonSet (kubeletstats + hostmetrics + filelog
  # receivers, scraping kubelet's /stats/summary and host /proc on
  # each node) AND a singleton otel-deployment Deployment running the
  # k8s_cluster receiver. Together they fill the gap the main signoz
  # chart leaves: the bundled otel-collector is a Deployment that
  # only listens for pushed OTLP traffic, so per-pod CPU/memory and
  # node-level metrics aren't visible until k8s-infra is added.
  #
  # The OTel agents forward to `observability-signoz-otel-collector`
  # over OTLP/gRPC (same Service the apps push to), so no extra
  # ingress / Service is needed — see values-prod.yaml.
  #
  # Closes the "pod resource utilization" gap that surfaced during
  # the grid-api 422 investigation on 2026-05-10 (1 vCPU limit was
  # throttling the CSP solver; without kubeletstats the throttling
  # wasn't visible from SigNoz). Verify the chart version against
  # `helm search repo signoz/k8s-infra` before bumping — the chart
  # versions are independent of the main signoz chart.
  - name: k8s-infra
    version: "0.15.1"
    repository: "https://charts.signoz.io"
    condition: k8s-infra.enabled
