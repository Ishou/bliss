# Local overrides — k3d cluster (ADR-0009 §5, scripts/local-cluster.sh).
replicaCount: 1
image:
  digest: ""
  tag: "0.1.0"
  # Never so a locally-built `bliss-identity-api:0.1.0` (loaded into k3d
  # via `k3d image import`) wins over any GHCR pull attempt.
  pullPolicy: Never
# No limits locally — k3d node is small; JVM honours UseContainerSupport.
resources: {}
ingress:
  enabled: true
  host: "localhost"
  tlsSecretName: "bliss-identity-api-tls"
  annotations:
    cert-manager.io/cluster-issuer: "selfsigned"
# Carries OIDC client credentials + COOKIE_DOMAIN + ALLOWED_RETURN_ORIGINS.
envFromSecret: "bliss-identity-api-env"
