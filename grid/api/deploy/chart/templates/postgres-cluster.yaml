apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "wordsparrow-api.pgClusterName" . }}
  labels: {{- include "wordsparrow-api.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgres.cluster.instances }}
  # Explicit image pin — see values.yaml for the rationale (operator
  # default drift between cnpg minor releases would otherwise schedule a
  # PG-major upgrade on next reconcile).
  imageName: {{ .Values.postgres.cluster.imageName | quote }}
  bootstrap:
    initdb:
      database: {{ .Values.postgres.cluster.bootstrap.database }}
      owner: {{ .Values.postgres.cluster.bootstrap.owner }}
      # Owner credentials are NOT chart-supplied. cnpg generates the
      # owner password at initdb and surfaces it on its auto-managed
      # `<cluster>-app` Secret, which the api Deployment reads via
      # `valueFrom: secretKeyRef` for the runtime DATABASE_URL.
      #
      # Earlier this template set `bootstrap.initdb.secret` to a
      # chart-owned `<cluster>-bootstrap` Secret rendered by
      # `secret-pg-credentials.yaml` (now removed). The intent was to
      # eliminate the placeholder→swap two-pass install dance, and the
      # template used Helm `lookup` to keep the password stable across
      # `helm upgrade`s. The pattern broke in practice (operator-#352-
      # incident): on at least one upgrade the lookup hit its else
      # branch and regenerated the password while cnpg's `-app` Secret
      # stayed on the original value — api pods then crashed with
      # `password authentication failed`. cnpg's own credential
      # lifecycle (one Secret, owned by the operator, atomic rotation
      # via `kubectl cnpg` / Cluster spec) is the canonical solution
      # the chart was reinventing.
  storage:
    size: {{ .Values.postgres.cluster.storage.size }}
    {{- with .Values.postgres.cluster.storage.storageClass }}
    storageClass: {{ . }}
    {{- end }}
  {{- if .Values.postgres.backups.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ printf "s3://%s/%s" .Values.postgres.backups.bucket (include "wordsparrow-api.pgClusterName" .) | quote }}
      endpointURL: {{ .Values.postgres.backups.endpoint | quote }}
      # Bootstrapped via `kubectl create secret generic cnpg-backup-creds
      # --from-literal=ACCESS_KEY_ID=... --from-literal=ACCESS_SECRET_KEY=...`
      # per ADR-0009 §10. Object Lock retention lives with operator-config (ADR-0010 §3).
      s3Credentials:
        accessKeyId: {name: cnpg-backup-creds, key: ACCESS_KEY_ID}
        secretAccessKey: {name: cnpg-backup-creds, key: ACCESS_SECRET_KEY}
      wal: {compression: gzip}
    retentionPolicy: {{ .Values.postgres.backups.retentionPolicy | quote }}
  {{- end }}
