# Production overrides — Hetzner k3s (ADR-0009 §2).
image:
  # Pin the latest 2.10-alpine digest. The CD workflow's `helm upgrade`
  # step injects the resolved digest via `--set image.digest=<resolved>`;
  # the placeholder below keeps the file shape consistent without
  # claiming a real image hash.
  digest: "sha256:<resolve at deploy time>"
storage:
  size: 5Gi
  storageClass: "hcloud-volumes"
streamInit:
  image:
    digest: "sha256:<resolve at deploy time>"

# Prometheus exporter sidecar — on in prod. Digest pinned to the
# multi-arch image index for natsio/prometheus-nats-exporter:0.15.0,
# resolved via the Docker Hub registry v2 manifest endpoint (see PR body
# for the exact lookup command). Manifesto: deterministic builds.
metricsExporter:
  enabled: true
  image:
    digest: "sha256:1f6787754b8b083f271adea4bb699b9c9e21279c89d903f1710f7647c604f145"

# DLQ stream — on in prod (scaling-readiness per ADR-0049).
dlq:
  enabled: true

# Alerts — on in prod. Requires a PrometheusRule-watching operator
# in-cluster. If the operator isn't yet installed, the CR sits
# unconsumed (no error); flip to false until it lands if that's noisy.
alerts:
  enabled: true
