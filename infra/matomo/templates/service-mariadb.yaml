apiVersion: v1
kind: Service
metadata:
  name: {{ include "matomo.mariadb.fullname" . }}
  labels: {{- include "matomo.labels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
spec:
  type: ClusterIP
  # Headless so the StatefulSet's stable DNS name resolves to the pod.
  clusterIP: None
  ports:
    - {name: mysql, port: {{ .Values.mariadb.service.port }}, targetPort: mysql, protocol: TCP}
  selector:
    {{- include "matomo.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mariadb
