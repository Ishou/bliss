name: Build and Push Image

# Builds the WordSparrow service container images and publishes them to
# GHCR. As of Wave G PR (this commit) the workflow is a matrix job that
# fans out over the {grid, game} bounded contexts:
#   - ghcr.io/${owner}/bliss/wordsparrow-api        (grid/api/Dockerfile)
#   - ghcr.io/${owner}/bliss/wordsparrow-game-api   (game/api/Dockerfile)
#   - ghcr.io/${owner}/bliss/wordsparrow-worker     (grid/worker/Dockerfile)
# Pull requests build-only (verifies each Dockerfile still works on every
# PR touching the relevant context); pushes to main also tag and push the
# digest. Each matrix row uploads its own digest artifact named
# `image-digest-<context>` so the downstream deploy workflow can address
# them independently.
#
# Lives ALONGSIDE .github/workflows/deploy-api.yml during the ADR-0009
# migration. Both workflows coexist until ADR-0009 §8 step 7 cutover
# tears Fly down — at which point deploy-api.yml is removed and the
# future deploy workflow consumes this job's artifacts.
#
# Images are immutable per the MANIFESTO ("Container images pinned to
# digest. Builds are deterministic."): the resolved sha256 digest is
# both written to $GITHUB_STEP_SUMMARY and uploaded as a workflow
# artifact so the downstream Helm chart values pin to digest, never tag.
#
# ONE-TIME HUMAN BOOTSTRAP (per package): the first push to main creates
# each GHCR package as PRIVATE. The maintainer must then go to
# https://github.com/users/Ishou/packages/container/bliss%2F<image>/settings
# and flip "Package visibility" to PUBLIC so the cluster can pull
# anonymously without an imagePullSecret. This is a manual step
# GitHub does not expose to Actions; it runs once per package.
# Packages that need the flip:
#   - bliss/wordsparrow-api      (already public)
#   - bliss/wordsparrow-game-api (NEW — first main push will create it)
#   - bliss/wordsparrow-worker   (NEW — first main push will create it)

on:
  push:
    branches: [main]
    # Mirror the union of every Dockerfile build context: any input the
    # COPY layers consume must trigger a rebuild, otherwise published
    # images silently drift from main. The build-and-push-action's own
    # change detection narrows the actual work — non-affected matrix
    # rows still run but hit the cache and exit fast.
    paths:
      - 'grid/api/**'
      - 'grid/domain/**'
      - 'grid/application/**'
      - 'grid/infrastructure/**'
      - 'grid/worker/**'
      - 'game/api/**'
      - 'game/domain/**'
      - 'game/application/**'
      - 'game/infrastructure/**'
      - 'gradle/**'
      - 'gradlew'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/build-and-push-image.yml'
  pull_request:
    paths:
      - 'grid/api/**'
      - 'grid/domain/**'
      - 'grid/application/**'
      - 'grid/infrastructure/**'
      - 'grid/worker/**'
      - 'game/api/**'
      - 'game/domain/**'
      - 'game/application/**'
      - 'game/infrastructure/**'
      - 'gradle/**'
      - 'gradlew'
      - 'settings.gradle.kts'
      - 'build.gradle.kts'
      - '.github/workflows/build-and-push-image.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: build (${{ matrix.context }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      # fail-fast: false so a green grid build isn't masked by a red
      # game build (and vice versa) — devs see both signals at once,
      # mirroring api-chart-lint.yml's matrix posture.
      fail-fast: false
      matrix:
        include:
          - context: grid
            dockerfile: grid/api/Dockerfile
            image-name: wordsparrow-api
            digest-artifact: image-digest-grid
          # Wave G: game-api joins the matrix. ADR-0018 §3 — the service
          # is in-memory v1, no DB; the chart at game/api/deploy/chart/
          # carries no CNPG resources, only Deployment/Service/Ingress.
          - context: game
            dockerfile: game/api/Dockerfile
            image-name: wordsparrow-game-api
            digest-artifact: image-digest-game
          # ADR-0042: :grid:worker daily-puzzle pre-generation CLI shipped as a
          # CronJob (grid/api/deploy/chart/templates/cronjob-ensure-dailies.yaml).
          # Separate image so the worker can be tagged + rolled independently
          # of the api Deployment.
          - context: grid-worker
            dockerfile: grid/worker/Dockerfile
            image-name: wordsparrow-worker
            digest-artifact: image-digest-grid-worker
    permissions:
      contents: read
      packages: write
      # `actions: write` is required for the GHA build cache exporter
      # (`cache-to: type=gha,mode=max`) to upload cache blobs; `read`
      # alone fails the cache-write step. `id-token`+`attestations`
      # are needed by build-push-action when it emits SLSA provenance
      # and SBOM attestations on the main-branch push path below.
      actions: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Multi-arch foundation; v1 only emits linux/amd64 but having
        # QEMU wired now means the multi-arch follow-up is a one-line
        # `platforms:` change rather than a workflow rewrite.
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip on PRs from forks: GITHUB_TOKEN there is read-only and
        # the login would fail noisily. Forked PRs still get the
        # build-only path below (push: false, load: true).
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bliss/${{ matrix.image-name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          # Each Dockerfile is multi-stage and COPIes gradlew, gradle/,
          # settings.gradle.kts, and {grid,game}/{domain,...}/ — so the
          # context MUST be the repo root, not the per-context dir.
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          # PRs build-only and load the image into the runner's local
          # Docker so a later step could smoke-test it; main pushes
          # tag and publish to GHCR.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Per-matrix-row cache scope so grid + game don't trample each
          # other's layer cache. Default scope is the workflow ref,
          # which would interleave the two sets of layers and degrade
          # hit rate.
          cache-from: type=gha,scope=${{ matrix.context }}
          cache-to: type=gha,mode=max,scope=${{ matrix.context }}
          # Provenance/SBOM attestations turn the build output into a
          # manifest list. The `docker` exporter used by `load: true`
          # (PR builds) does NOT support manifest lists and fails with
          # "docker exporter does not currently support exporting
          # manifest lists" — see run 24953819809. Restrict attestations
          # to the main-branch push path, which uses the registry
          # exporter and is the only artifact we actually consume.
          provenance: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          sbom: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Record image digest in summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "**${{ matrix.context }} image:** \`ghcr.io/${{ github.repository_owner }}/bliss/${{ matrix.image-name }}@${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Stage digest for downstream CD workflow
        # The k8s CD workflow (deploy-api-k8s.yml) is chained via a
        # `workflow_run` trigger. Job-level `outputs:` are NOT readable
        # across workflows from a `workflow_run` consumer (GitHub only
        # exposes them to dependent jobs in the same run via `needs`).
        # Uploading the digest as an artifact here is the supported
        # cross-workflow handoff: the consumer downloads it with
        # actions/download-artifact's `run-id` + `github-token` form.
        # Each matrix row uploads its own artifact (image-digest-grid,
        # image-digest-game) so the deploy matrix can address them
        # independently. See ADR-0009 §8 step 5.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p artifact
          printf '%s' "${{ steps.build.outputs.digest }}" > artifact/digest.txt

      - name: Upload digest artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.digest-artifact }}
          path: artifact/digest.txt
          if-no-files-found: error
          retention-days: 7
