{{/*
Let's Encrypt production ClusterIssuer.

The WordSparrow chart annotates Ingresses with
  cert-manager.io/cluster-issuer: letsencrypt-prod
(grid/api/deploy/chart/values-prod.yaml). The name MUST match.

HTTP01 solver via ingress-nginx — the ingress controller installed by
this same release. No DNS01 / no Cloudflare API needed for issuance.
*/}}
{{- if .Values.clusterIssuer.letsencrypt.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "platform.labels" . | nindent 4 }}
  annotations:
    # Run after the cert-manager subchart's CRDs have been registered
    # with the API. Without this hook the umbrella `helm install` race
    # is "no matches for kind ClusterIssuer in version cert-manager.io/v1"
    # because the parent template renders alongside the subchart's
    # CRD manifest and Kubernetes hasn't picked up the new kind yet.
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    # Idempotent across reinstalls: the previous ClusterIssuer is
    # removed just before the hook re-creates it, so a fresh `helm
    # install` after `helm uninstall` does not collide on the name.
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ required "clusterIssuer.letsencrypt.email is required when letsencrypt.enabled=true (pass --set clusterIssuer.letsencrypt.email=<your-email>)" .Values.clusterIssuer.letsencrypt.email | quote }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
{{- end }}
