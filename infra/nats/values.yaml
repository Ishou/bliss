image:
  # nats:2.10-alpine. Pinned by digest in values-prod.yaml.
  repository: nats
  tag: "2.10-alpine"
  digest: ""
  pullPolicy: IfNotPresent

streamInit:
  image:
    # natsio/nats-box bundles the nats CLI used to bootstrap the stream.
    repository: natsio/nats-box
    tag: "0.19.5"
    digest: ""

# prometheus-nats-exporter sidecar — scrapes /varz, /connz, /jsz from the
# NATS monitor port (8222) and exposes Prometheus-format metrics on 7777.
# Disabled by default; values-prod.yaml turns it on. Digest pin is
# resolved at deploy time (CD workflow injects --set metricsExporter.image.digest=...).
metricsExporter:
  enabled: false
  image:
    repository: natsio/prometheus-nats-exporter
    tag: "0.15.0"
    digest: ""
  port: 7777
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 100m, memory: 64Mi }

# JetStream stream storage. 1Gi covers ~10M small events at alpha volume.
storage:
  size: 1Gi
  # Empty -> cluster default. Prod sets "hcloud-volumes" per ADR-0010.
  storageClass: ""

# Server config — JetStream enabled, file storage on the PVC, no auth in v1.
config:
  port: 4222
  monitorPort: 8222
  jetstreamMaxMemory: "256M"
  jetstreamMaxFile: "1G"

# Stream definition applied at startup via the bootstrap Job.
stream:
  name: WORDSPARROW_USER_EVENTS
  subjects: ["wordsparrow.user.>"]
  maxAge: "168h"   # 7 days
  storage: file
  replicas: 1
  discardPolicy: old

# Dead-letter stream for messages that exhaust their consumer's MaxDeliver
# retry budget (ADR-0049 scaling-readiness requirement). Disabled by default
# so the existing single-stream install stays unaffected; values-prod.yaml
# flips this on. Subject naming: wordsparrow.dlq.<orig-subject> — distinct
# from the primary stream's wordsparrow.user.> tree so JetStream doesn't
# reject the second stream for subject-tree overlap.
dlq:
  enabled: false
  name: WORDSPARROW_USER_EVENTS_DLQ
  subjects: ["wordsparrow.dlq.>"]
  # 30 days — enough to triage after an alert fires; alerts in infra/observability/alerts/.
  maxAge: "720h"
  storage: file
  replicas: 1
  discardPolicy: old

# Alerts live in infra/observability/alerts/ (SigNoz, not PrometheusRule — ADR-0027).

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits: { cpu: 500m, memory: 384Mi }

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: { drop: [ALL] }
