{{/*
No Secret manifest is rendered. ADR-0009 §10: secrets are bootstrapped
out-of-band via `kubectl create secret` (recipe in docs/deploy.md);
chart values are repo-committed and "secrets never in code" forbids
embedding secret material. This file carries the ServiceAccount the
deployment references; it is named for the secrets-bootstrap boundary
it documents.
*/}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "wordsparrow-api.serviceAccountName" . }}
  labels: {{- include "wordsparrow-api.labels" . | nindent 4 }}
{{- end }}
