# Shared defaults for the observability umbrella chart.
# Per-env files override what differs (values-prod.yaml). Each subchart's
# values are nested under its dependency name (Helm convention).

signoz:
  enabled: true

  # Cluster identifier surfaced on every ingested span/metric/log. Lets
  # the SigNoz UI tag data by deployment when we eventually have multiple
  # (staging/prod). One value today.
  global:
    clusterName: "wordsparrow-prod"

  # Right-sized for the cx33 worker. SigNoz's defaults assume larger
  # nodes; we cut back where the workload tolerates it. Expect to revisit
  # once we have real telemetry to justify bumps.
  # ZooKeeper is nested under clickhouse (signoz.clickhouse.zookeeper),
  # not at the SigNoz top level — first-iteration override at
  # signoz.zookeeper.* was silently ignored.
  #
  # Raised 2026-05-12 after the SigNoz stack hit its limits in prod;
  # ClickHouse + Zookeeper were the bottleneck. Followup: cut SigNoz
  # retention via the UI (Settings → General → Data retention) from
  # 7d/30d/3d to 3d/14d/3d.
  clickhouse:
    replicaCount: 1
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 200m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 3Gi

    # Low-RAM tuning per ClickHouse docs (operations/tips):
    # required for stable operation under 16 GB RAM. Our 3Gi limit
    # is well into that range. Renders into the CHI's
    # `spec.configuration.settings` block (server-level XML), as
    # the SigNoz subchart's `clickhouse.settings` is wired straight
    # into the CHI by clickhouse/templates/clickhouse-instance/
    # clickhouse-instance.yaml (merged with `defaultSettings`).
    # Server-config settings only. Profile-scoped settings
    # (max_block_size, max_threads, etc.) go in profiles.default below.
    # Ref: https://clickhouse.com/docs/en/operations/tips
    settings:
      # Default mark_cache_size is 5 GiB — larger than our entire
      # container limit. 500 MB is plenty for our workload (single
      # shard, narrow MergeTree, low query concurrency).
      mark_cache_size: 524288000  # 500 MB (bytes)
      # Cap ClickHouse's self-imposed memory budget at 70% of the
      # cgroup so kernel page cache + non-server allocations
      # (background merges, queries) have headroom.
      max_server_memory_usage_to_ram_ratio: "0.7"
      # Fewer background merge threads. Default scales with cores;
      # at 2 CPU limit we don't benefit from more than 4.
      background_pool_size: 4
      # Parallel-load data parts on startup. Default is 8; observability
      # worker has 4 vCPU which can sustain 16 cold-start threads
      # comfortably (the burst is brief — parts are mmap'd, not crunched).
      # Cuts cold-start part attachment time roughly proportionally for
      # tables with many small parts.
      max_part_loading_threads: 16
      # NB: max_block_size is a profile setting, not server config.
      # Moved to profiles.default below (ClickHouse rejects it at this
      # scope with UNKNOWN_ELEMENT_IN_CONFIG, code 137).

    # User-profile overrides. Lighter logging so the verbose
    # log-table writes (next block) don't have anything to write.
    # Subchart renders this into CHI `spec.configuration.profiles`
    # (merged with `defaultProfiles`).
    profiles:
      default:
        # Smaller blocks reduce per-query peak memory. 8192 is the
        # ClickHouse default but we set it explicitly so a future
        # subchart bump can't silently raise it. Profile-scoped:
        # ClickHouse rejects this at server-config scope.
        max_block_size: 8192
        log_query_threads: 0
        log_queries_min_type: QUERY_FINISH

    # Disable verbose ClickHouse-internal log tables (sub-16 GB
    # tuning per the ClickHouse tips doc). These are CH's OWN
    # monitoring tables (system.asynchronous_metric_log,
    # system.metric_log, system.query_thread_log,
    # system.query_views_log) — NOT the SigNoz user-facing
    # telemetry storage. Disabling just stops CH from writing its
    # own monitoring rows; we never query them. The subchart
    # always ships the operator ConfigMap with `replace="1"`
    # entries that turn these on; we layer a higher-priority
    # config.d file via `files:` that sets `remove="1"` to drop
    # the elements at server start.
    # Subchart renders this into CHI `spec.configuration.files`.
    files:
      config.d/zz-disable-verbose-logs.xml: |
        <clickhouse>
          <asynchronous_metric_log remove="1"/>
          <metric_log remove="1"/>
          <query_thread_log remove="1"/>
          <query_views_log remove="1"/>
        </clickhouse>

    zookeeper:
      replicaCount: 1
      # Bitnami flipped their public Docker Hub policy in 2024-08
      # to "latest only" and moved every older tag from `bitnami/*`
      # to `bitnamilegacy/*`. The SigNoz subchart's pin
      # (`bitnami/zookeeper:3.7.1`) now 404s. Override the
      # repository to `bitnamilegacy/zookeeper`; the tag is the
      # same and SigNoz documents 3.7.1 as the supported ZK
      # version (its own comment warns against changing it).
      # Revisit if/when SigNoz upstream bumps the pin.
      image:
        repository: bitnamilegacy/zookeeper
      # Bitnami's chart default is heapSize: 1024 (MB) which
      # silently exceeded our 768Mi container limit, causing the
      # JVM to OOM-loop at ~700 MB. Apache ZK guide: heap <= 75%
      # of container memory (= 576 MB at 768Mi). 512 MB is generous
      # for our workload (single ZK, one ClickHouse, small ZNode
      # set, low write rate) and leaves comfortable headroom for
      # heap + non-heap (compressed class space, code cache,
      # metaspace). Renders as ZOO_HEAP_SIZE env on the ZK
      # StatefulSet (Bitnami chart's documented contract).
      heapSize: 512
      # Initial 256Mi limit OOMKilled the pod during JVM startup
      # (Bitnami's ZK 3.7.1 image runs OpenJDK 17, baseline ~200 MB
      # before any ZNodes). 512Mi gives the JVM headroom for the
      # heap + non-heap (compressed class space, code cache,
      # metaspace) without paging.
      # Raised 2026-05-12: request was 199% of original (~512Mi
      # actual), limit was 99% used (OOM imminent). Bumped to
      # 384Mi/768Mi to restore headroom. CPU left alone — measured
      # usage is ~0.06 cores, well below the 200m limit.
      resources:
        requests:
          cpu: 50m
          memory: 384Mi
        limits:
          cpu: 200m
          memory: 768Mi

  queryService:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  frontend:
    # Disable the chart's default Ingress — we manage two aliased
    # ingresses (errors.wordsparrow.io + dashboard.wordsparrow.io) in
    # templates/ingress-signoz-ui.yaml so they share the htpasswd
    # auth-secret + cert-manager annotations consistently.
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  alertmanager:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  otelCollector:
    # PII scrubbing per ADR-0027 §8 — drop `?email=` / `?token=` /
    # `?session=` query parameters; redact Authorization + Cookie
    # request headers; never capture request bodies. Implemented as
    # OTel transform processors. The exact processor config lives
    # under .Values.signoz.otelCollector.config.processors and is
    # set by the SigNoz subchart's defaults; we override below to
    # add our scrubbing pipeline.
    #
    # Left empty in v1 — applied as a follow-up once we have real
    # telemetry to inform the redaction list. PR-E ships the agent;
    # PR-D ships the backend; PII config is small enough to land
    # inline once we know what's there to scrub.
    config: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# Image pre-pull DaemonSet — keeps the SigNoz/ClickHouse/Zookeeper image
# set warm in containerd's cache on every observability-labeled node so a
# pod reschedule (helm upgrade, node drain, evict) doesn't pay the 30-60s
# image-pull penalty on top of ClickHouse's own startup. Templated in
# templates/image-prepuller-daemonset.yaml.
imagePrepuller:
  enabled: false  # opt-in: prod turns it on
  pauseImage: registry.k8s.io/pause:3.10
  # Image refs to keep warm in containerd cache on every observability
  # node. Discover the current pins by rendering the chart and grepping
  # for `image:` in the SigNoz subchart's StatefulSets/Deployments and
  # the Altinity CHI; populate values-prod.yaml with what's actually
  # deployed. Defaults file ships an empty list — the DaemonSet is
  # disabled here anyway, so the empty list is inert.
  # Bumping the SigNoz subchart version is a separate PR — update the
  # values-prod.yaml list when you do.
  images: []

# oauth2-proxy — cookie-issuing wrapper around `admin-htpasswd` so
# SigNoz's SPA XHR/WS don't trigger basic-auth re-prompts on every
# request. Standalone htpasswd mode (no OIDC). Single session cookie
# scoped to `.wordsparrow.io`, valid for 7 days. See
# templates/oauth2-proxy.yaml for the full deployment.
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.6.0

# Ingress hosts. Two ingresses target the same SigNoz frontend Service:
# `errors.wordsparrow.io` (Sentry-style "what blew up" entry point) and
# `dashboard.wordsparrow.io` (the same UI's metrics + traces views are
# the primary use). Both gated by the same `admin-htpasswd` Secret per
# ADR-0028.
ingress:
  enabled: true
  className: nginx
  hosts:
    - errors.wordsparrow.io
    - dashboard.wordsparrow.io
  tlsSecretName: signoz-tls
  # Hetzner floating IP — same value the rest of the charts use
  # (matomo, grid/api, game/api). When the FIP rotates, update every
  # chart's values-prod.yaml in the same PR.
  floatingIp: "116.202.180.82"
  # SigNoz UI Service backend. SigNoz 0.122 consolidated what used to
  # be a separate `<release>-signoz-frontend` Service (port 3301) into
  # the main `<release>-signoz` Service exposing port 8080. Empty
  # `serviceName` would default to the legacy name and 503 because
  # that Service no longer exists in 0.122. Pin explicitly.
  serviceName: observability-signoz
  servicePort: 8080
  # The htpasswd-gated Secret is bootstrapped out-of-band by
  # scripts/bootstrap-admin-htpasswd.sh (ADR-0028 §2). Name match
  # required; `admin-htpasswd` is the documented value.
  authSecretName: admin-htpasswd

  # Public OTLP/HTTP ingest endpoint at otlp.wordsparrow.io for the
  # browser OTel SDK (PR-F.2). Disabled in this defaults file; enable
  # in values-prod.yaml. ADR-0033 documents the trade-offs (public
  # endpoint risk, mitigations, alternatives).
  otlpPublic:
    enabled: false
    host: ""
    # Origins accepted as `Origin:` header (browser CORS + nginx
    # allow-list). Both apex and www included so visitors arriving via
    # either don't have their traces silently dropped.
    allowedOrigins:
      - https://wordsparrow.io
      - https://www.wordsparrow.io
    # Sustained per-IP request rate. nginx-ingress's default unit is
    # requests/second. With the browser sampler at 10% (PR-F.2), 5
    # rps/IP supports ~50 actual user requests/sec/IP without dropping.
    limitRps: 5
    # Burst headroom multiplier — final burst window is
    # `limitRps * limitBurstMultiplier`.
    limitBurstMultiplier: 10
    # Service name + port of the SigNoz-bundled OTel collector's HTTP
    # receiver (default config exposes 4318 via the collector Service).
    # Same release prefix the gRPC endpoint uses in app charts'
    # OTEL_EXPORTER_OTLP_ENDPOINT.
    collectorService: "observability-signoz-otel-collector"
    collectorPort: 4318

# SigNoz k8s-infra subchart (see Chart.yaml). Disabled in defaults so
# local installs (e.g. `make dev`) don't spin a DaemonSet on every node;
# enabled in values-prod.yaml with the prod cluster name + collector
# target. The subchart's own defaults cover most knobs (kubeletstats +
# hostmetrics + k8s_cluster receivers all on by default); we override
# only the cluster identity and the in-cluster OTLP target.
k8s-infra:
  enabled: false
  # The chart deploys both an otel-agent DaemonSet (host/pod metrics)
  # and an otel-deployment singleton (cluster-state metrics). Both
  # forward to the same OTLP endpoint — see values-prod.yaml override.
