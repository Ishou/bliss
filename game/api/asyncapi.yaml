# Game bounded-context WebSocket contract.
#
# Hand-written AsyncAPI 2.6 per ADR-0003 §5 (source of truth, not generated
# from handler annotations). Wire conventions per ADR-0003 §6: UUID v7 ids,
# ISO-8601 instants with offset, camelCase, RFC 7807 errors, string enums.
# Single-value inline `type`/`kind` discriminators (e.g. `enum: [joinLobby]`)
# are exempt from x-enum-varnames: the constant name is trivially derivable and
# modelina emits it without the hint. Named multi-value enums carry the hint.
#
# AsyncAPI 2.6 (not 3.x): it is the version Spectral's
# `@asyncapi/spectral-ruleset` is stable on, and 3.x reshapes operations
# (channel-as-resource) in ways that complicate codegen here.
asyncapi: 2.6.0
info:
  title: Bliss Game WebSocket API
  version: 0.1.0
  description: |
    Real-time lobby + game events for the game/ bounded context.
    Resolves ADR-0006 §5's WebSocket defer. A REST control plane
    (game/api/openapi.yaml) is planned but not yet merged. Decision rationale
    in ADR-0018; ADR-0019 records the AsyncAPI 2.6 exception to ADR-0003 §5.

    Every frame is a JSON object with a top-level `type` discriminator
    (e.g. `"type": "cellUpdate"`). TypeScript and Kotlin codegen dispatch on
    that field; do NOT rely on positional or schema-shape inference.

    Conflict policy on `cellUpdate` is last-write-wins, server-stamped.
    The server rebroadcasts `cellUpdated` with its own `writtenAt` so all
    clients converge on identical state regardless of latency.

    Reconnect: a client may close and reopen the WebSocket within ~30s while
    keeping its slot — the server identifies the player by `sessionId`.

    Changelog (still 0.1.0 — pre-release wire latitude):
    - `GameDefinitionCell` now carries `clues: array of GameDefinitionClue`
      (1..2 items) instead of a single flat `clueId`/`text`/`arrow` triple.
      Mirrors grid's stacked-clue idiom (the mots-fléchés corner cell with
      both an across and a down clue at one position) — the upstream wire
      emits one such cell per clue at the same position, and the game
      bounded context now bundles them into a single cell with a list of
      clues. Resolves the limitation flagged in PR #132's review.
    - Added four server→client presence-state events backing the
      multiplayer-highlights redesign (PR #226 frontend): `typing`,
      `idle`, `connectionLost`, `cursorBumped`. All four are ephemeral
      (carry no domain meaning, not persisted, dropped on
      WAITING/COMPLETED transitions like `presenceUpdated`).
      `typing`/`idle` are boolean state-edge events the server emits on
      each transition so a single message shape covers both directions.
      `connectionLost` is distinct from `playerLeft`: a graceful
      disconnect with a server-side grace window — clients SHOULD
      grey-out the roster pill for ~2s and only remove the slot if
      `playerLeft` follows. `cursorBumped` is the server-authoritative
      cursor relocation when an answer that contained a peer's cursor
      is validated; clients apply it unconditionally (last-write-wins).
  contact: { name: Bliss maintainers, url: https://github.com/Ishou/bliss, email: noreply@bliss.example }
  license: { name: FSL-1.1-MIT, url: https://github.com/Ishou/bliss/blob/main/LICENSE }

tags:
  - { name: lobby, description: Pre-game lobby membership and configuration. }
  - { name: game,  description: In-progress game-state synchronisation. }

servers:
  production:
    url: game.wordsparrow.io
    protocol: wss
    description: Placeholder host; canonical URL stabilizes when the game-api Helm chart lands (ADR-0018).
  local:
    url: localhost:7778
    protocol: ws
    description: Local dev server (Ktor `embeddedServer`). Paired with grid-api's 7777 in `make dev`; prod pins PORT=8081 via Helm.

defaultContentType: application/json

channels:
  /v1/lobbies/{lobbyId}/ws:
    description: |
      One WebSocket per (browser tab × lobby). The client opens the socket
      after fetching the lobby via REST (`GET /v1/lobbies/{lobbyId}`) and
      sends `joinLobby` as its first frame. The server replies with a
      `lobbyState` snapshot, then streams incremental events.
    parameters:
      lobbyId:
        description: 8-char base58 nanoid identifying the lobby.
        schema: { $ref: '#/components/schemas/LobbyId' }
    publish:
      operationId: clientToServer
      summary: Frames sent by a connected player to the server.
      description: |
        Every client frame carries a `type` discriminator. Owner-only
        messages (`setGridConfig`, `startGame`) are rejected with an
        `error` frame when sent by a non-owner.
      tags:
        - { name: lobby }
        - { name: game }
      message:
        oneOf:
          - { $ref: '#/components/messages/JoinLobby' }
          - { $ref: '#/components/messages/RenameSelf' }
          - { $ref: '#/components/messages/SetGridConfig' }
          - { $ref: '#/components/messages/StartGame' }
          - { $ref: '#/components/messages/CellUpdate' }
          - { $ref: '#/components/messages/CellFocus' }
          - { $ref: '#/components/messages/LeaveLobby' }
    subscribe:
      operationId: serverToClient
      summary: Frames broadcast by the server to subscribed players.
      description: |
        `lobbyState` fires once on join and on reconnect; the rest are
        incremental deltas. Clients SHOULD treat any unknown `type` as
        forward-compatible no-ops, not errors.
      tags:
        - { name: lobby }
        - { name: game }
      message:
        oneOf:
          - { $ref: '#/components/messages/LobbyState' }
          - { $ref: '#/components/messages/PlayerJoined' }
          - { $ref: '#/components/messages/PlayerLeft' }
          - { $ref: '#/components/messages/PlayerRenamed' }
          - { $ref: '#/components/messages/GameStarted' }
          - { $ref: '#/components/messages/CellUpdated' }
          - { $ref: '#/components/messages/PresenceUpdated' }
          - { $ref: '#/components/messages/Typing' }
          - { $ref: '#/components/messages/Idle' }
          - { $ref: '#/components/messages/ConnectionLost' }
          - { $ref: '#/components/messages/CursorBumped' }
          - { $ref: '#/components/messages/WordLocked' }
          - { $ref: '#/components/messages/GameSolved' }
          - { $ref: '#/components/messages/Error' }

components:
  messages:
    JoinLobby:      { name: joinLobby,      title: Join lobby,                         summary: First frame after the WebSocket opens; claims a slot.,                                              payload: { $ref: '#/components/schemas/JoinLobbyPayload' } }
    RenameSelf:     { name: renameSelf,     title: Rename self,                        summary: Update the sender's pseudonym.,                                                                    payload: { $ref: '#/components/schemas/RenameSelfPayload' } }
    SetGridConfig:  { name: setGridConfig,  title: Set grid config (owner only),       summary: Owner picks the grid dimensions while WAITING.,                                                    payload: { $ref: '#/components/schemas/SetGridConfigPayload' }, description: Rejected with `error` when sent by a non-owner or outside WAITING. }
    StartGame:      { name: startGame,      title: Start game (owner only),            summary: Owner transitions the lobby to IN_PROGRESS.,                                                       payload: { $ref: '#/components/schemas/StartGamePayload' },     description: Rejected with `error` when sent by a non-owner or outside WAITING. }
    CellUpdate:     { name: cellUpdate,     title: Client cell write,                  summary: Player typed (or cleared) a letter into a cell.,                                                   payload: { $ref: '#/components/schemas/CellUpdatePayload' } }
    CellFocus:      { name: cellFocus,      title: Client cell focus,                  summary: Player moved (or cleared) their cursor.,                                                           payload: { $ref: '#/components/schemas/CellFocusPayload' },     description: Pure presence signal; lets peers render the sender's cursor + active word. Carries zero domain meaning. Clients SHOULD throttle to ~5 Hz (200 ms debounce). }
    LeaveLobby:     { name: leaveLobby,     title: Leave lobby,                        summary: Voluntary disconnect; frees the slot immediately.,                                                 payload: { $ref: '#/components/schemas/LeaveLobbyPayload' } }
    LobbyState:     { name: lobbyState,     title: Lobby snapshot,                     summary: Full lobby state; fires on join and on reconnect.,                                                 payload: { $ref: '#/components/schemas/LobbyStatePayload' } }
    PlayerJoined:   { name: playerJoined,   title: Player joined,                                                                                                                                  payload: { $ref: '#/components/schemas/PlayerJoinedPayload' } }
    PlayerLeft:     { name: playerLeft,     title: Player left,                                                                                                                                    payload: { $ref: '#/components/schemas/PlayerLeftPayload' } }
    PlayerRenamed:  { name: playerRenamed,  title: Player renamed,                                                                                                                                 payload: { $ref: '#/components/schemas/PlayerRenamedPayload' } }
    GameStarted:    { name: gameStarted,    title: Game started,                       summary: Server fetched a puzzle and transitioned to IN_PROGRESS.,                                          payload: { $ref: '#/components/schemas/GameStartedPayload' } }
    CellUpdated:    { name: cellUpdated,    title: Canonical cell update,              summary: Server-stamped broadcast of an accepted `cellUpdate`.,                                             payload: { $ref: '#/components/schemas/CellUpdatedPayload' },   description: Last-write-wins per ADR-0018; clients apply unconditionally. }
    PresenceUpdated: { name: presenceUpdated, title: Peer presence update,              summary: Broadcast of a peer's `cellFocus`; ephemeral cursor position.,                                     payload: { $ref: '#/components/schemas/PresenceUpdatedPayload' }, description: Ephemeral; carries no domain meaning and is not persisted. Cleared on `WAITING`/`COMPLETED` transitions. }
    Typing:         { name: typing,         title: Peer typing state edge,             summary: Server-emitted boolean transition — peer started or stopped receiving keystrokes.,                payload: { $ref: '#/components/schemas/TypingPayload' },          description: "Ephemeral. Server tracks each session's last `cellUpdate` and emits the rising edge (typing=true) on the first keystroke after a quiet gap, the falling edge (typing=false) after ~1.5s of input idle. Rate-limited server-side; clients SHOULD treat it as a hint, not a guarantee." }
    Idle:           { name: idle,           title: Peer idle state edge,               summary: Server-emitted boolean transition — peer crossed the 30s no-input threshold or returned to activity.,  payload: { $ref: '#/components/schemas/IdlePayload' },            description: "Ephemeral. Server timer per session; emits the rising edge (idle=true) after ~30s of no `cellFocus`/`cellUpdate`, the falling edge (idle=false) on the next activity. Independent of `connectionLost`." }
    ConnectionLost: { name: connectionLost, title: Peer disconnected (graceful),       summary: Peer's WebSocket closed; the slot is held during a server-side grace window before a playerLeft follows.,        payload: { $ref: '#/components/schemas/ConnectionLostPayload' },  description: Ephemeral. Distinct from `playerLeft` — clients SHOULD grey-out the roster pill on this event and only remove the slot when (or if) `playerLeft` arrives. If the same `sessionId` reconnects within the grace window, the server emits `presenceUpdated` (or no event) instead of `playerLeft`. }
    CursorBumped:   { name: cursorBumped,   title: Server-authoritative cursor relocation, summary: Peer's cursor was on a now-validated answer; server moves it to the next clue.,                  payload: { $ref: '#/components/schemas/CursorBumpedPayload' },    description: Ephemeral. Emitted when an answer-validation flow locks cells that contained a peer's cursor; clients apply unconditionally (last-write-wins) and re-render the named session's cursor at the bumped position. }
    WordLocked:     { name: wordLocked,     title: Word validated and locked,          summary: Server-authoritative lock for cells whose containing word was just completed correctly., payload: { $ref: '#/components/schemas/WordLockedPayload' },      description: "Emitted when the last letter of a word is filled and every cell in that word matches the canonical solution. Locked positions are server-enforced — subsequent `cellUpdate` frames targeting any of them are silently ignored (no `cellUpdated` rebroadcast). Locks are monotonically additive within a game session and are surfaced on snapshot via `lobbyState.game.lockedPositions`. Incorrect completions emit no event (intentional: wrong answers are indistinguishable from in-progress ones)." }
    GameSolved:     { name: gameSolved,     title: Game solved,                        summary: All cells match the canonical solution; lobby is COMPLETED.,                                       payload: { $ref: '#/components/schemas/GameSolvedPayload' } }
    Error:          { name: error,          title: Error frame,                        summary: RFC 7807 problem document for a rejected client frame.,                                            payload: { $ref: '#/components/schemas/ErrorPayload' },         description: Mirrors the REST error envelope. Closing the socket is at the server's discretion. }

  schemas:
    LobbyId:
      type: string
      minLength: 8
      maxLength: 8
      pattern: '^[1-9A-HJ-NP-Za-km-z]{8}$'
      description: 8-char base58 nanoid (URL-safe; no 0/O/I/l). UUID v7 exception per ADR-0020.
      example: 7gQ2xK9p
    SessionId:
      type: string
      format: uuid
      description: UUID v7 string per ADR-0003 §6. Generated client-side on first visit and persisted in `localStorage`.
      example: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b
    Pseudonym:
      type: string
      minLength: 1
      maxLength: 32
      description: Player display name. Not unique within a lobby.
      example: Joueur 1234
    Instant:
      type: string
      format: date-time
      description: ISO-8601 instant with timezone offset (ADR-0003 §6).
      example: '2026-05-02T15:30:00Z'
    LobbyLifecycleState:
      type: string
      enum: [WAITING, IN_PROGRESS, COMPLETED]
      x-enum-varnames: [WAITING, IN_PROGRESS, COMPLETED]
      description: Lobby lifecycle (ADR-0018).
    GridConfig:
      type: object
      required: [width, height]
      description: Dimensions chosen by the lobby owner before start.
      properties:
        width:  { type: integer, minimum: 5, maximum: 15, description: Number of columns., example: 7 }
        height: { type: integer, minimum: 5, maximum: 15, description: Number of rows.,    example: 7 }
    Letter:
      type: string
      minLength: 1
      maxLength: 1
      pattern: '^[A-Z]$'
      nullable: true
      description: Single uppercase A-Z, or `null` to clear the cell. `null` and absence are distinct.
      example: P
    CellEntry:
      type: object
      required: [sessionId, row, column, letter, writtenAt]
      description: |
        A single placed letter in the canonical entries list. Used both by
        `gameSolved.finalEntries` (every solved cell) and by
        `lobbyState.game.entries` (every cell typed so far on a snapshot
        delivered to a reconnecting / late-joining client). `letter` is
        always non-null here — cleared cells are simply absent from the
        list. `sessionId` and `writtenAt` mirror the per-cell `cellUpdated`
        event so a future per-author UI tint can colour each entry.
      properties:
        sessionId: { $ref: '#/components/schemas/SessionId' }
        row:       { type: integer, minimum: 0, example: 0 }
        column:    { type: integer, minimum: 0, example: 3 }
        letter:    { type: string, minLength: 1, maxLength: 1, pattern: '^[A-Z]$', description: Always non-null. Cleared cells are absent from the list., example: P }
        writtenAt: { $ref: '#/components/schemas/Instant' }
    PresenceEntry:
      type: object
      required: [sessionId, row, column, direction]
      description: |
        Ephemeral cursor position of one currently-connected player. Carried
        by `lobbyState.game.presence` so a refreshing / late-joining client
        sees peer cursors immediately. `row`, `column`, `direction` are all
        nullable — `null` means the player has no cell focused (e.g. just
        joined, or clicked off the grid). Absence from the list means the
        player is not connected; absence and `null` are distinct per
        ADR-0003 §6. Carries no domain meaning; not persisted.
      properties:
        sessionId: { $ref: '#/components/schemas/SessionId' }
        row:       { type: integer, minimum: 0, nullable: true, description: Zero-indexed row of the focused cell; `null` when no cell is focused. }
        column:    { type: integer, minimum: 0, nullable: true, description: Zero-indexed column of the focused cell; `null` when no cell is focused. }
        direction: { $ref: '#/components/schemas/GameClueDirection', nullable: true, description: Direction the player is currently solving; `null` when no cell is focused. Lets peers tint the whole word, not just the cell. }
    Player:
      type: object
      required: [sessionId, pseudonym, joinedAt]
      description: A player currently holding a slot in the lobby.
      properties:
        sessionId: { $ref: '#/components/schemas/SessionId' }
        pseudonym: { $ref: '#/components/schemas/Pseudonym' }
        joinedAt:  { $ref: '#/components/schemas/Instant' }
    GamePuzzle:
      type: object
      description: |
        Game-context projection of a puzzle. Carries all fields a client
        needs to render and play. Owned by game/ — not a $ref into grid/
        (ADR-0001 §1 forbids cross-context file dependencies). The server
        fetches from grid/ on startGame and forwards the document verbatim.
      required: [id, title, language, width, height, cells, clues, hintsAllowed, createdAt]
      properties:
        id:           { type: string, format: uuid, description: UUID v7 puzzle identifier., example: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6c }
        title:        { type: string, minLength: 1, maxLength: 200, example: Petite grille du mardi }
        language:     { type: string, pattern: '^[A-Za-z]{2,3}(-[A-Za-z0-9]{2,8})*$', description: BCP-47 tag., example: fr }
        width:        { type: integer, minimum: 1, maximum: 50, description: Number of columns., example: 5 }
        height:       { type: integer, minimum: 1, maximum: 50, description: Number of rows., example: 5 }
        cells:        { type: array, items: { $ref: '#/components/schemas/GameCell' }, description: Cells in row-major order; look up by position.row/position.column. }
        clues:        { type: array, items: { $ref: '#/components/schemas/GameClue' } }
        hintsAllowed: { type: integer, minimum: 0, description: "Hint budget for this puzzle. Mirrors Puzzle.hintsAllowed in grid/api/openapi.yaml; forwarded verbatim from grid/ on startGame.", example: 3 }
        createdAt:    { $ref: '#/components/schemas/Instant' }
    GameCell:
      type: object
      required: [kind, position]
      description: Grid cell. `kind` discriminates letter/definition/block.
      discriminator: kind
      properties:
        kind:     { $ref: '#/components/schemas/GameCellKind' }
        position: { $ref: '#/components/schemas/GamePosition' }
      oneOf:
        - { $ref: '#/components/schemas/GameLetterCell' }
        - { $ref: '#/components/schemas/GameDefinitionCell' }
        - { $ref: '#/components/schemas/GameBlockCell' }
    GameCellKind:
      type: string
      enum: [letter, definition, block]
      x-enum-varnames: [LETTER, DEFINITION, BLOCK]
    GameLetterCell:
      type: object
      required: [kind, position]
      description: |
        Player-fillable answer cell. Solution is server-private; not carried
        on snapshot or update messages. Player input flows in via `cellUpdate`
        and is rebroadcast as `cellUpdated`. Mirrors the OpenAPI definition.
      properties:
        kind:     { type: string, enum: [letter] }
        position: { $ref: '#/components/schemas/GamePosition' }
    GameDefinitionCell:
      type: object
      required: [kind, position, clues]
      description: |
        Mots-fléchés definition cell. Carries 1 clue (the common case) or 2
        clues (the corner-cell idiom: an across clue and a down clue stacked
        at the same position). Mirrors the upstream grid wire shape, where
        stacked clues are emitted as one wire `DefinitionCell` per clue at
        the same position; the game bounded context groups them into a
        single cell whose `clues` list preserves wire order.
      properties:
        kind:     { type: string, enum: [definition] }
        position: { $ref: '#/components/schemas/GamePosition' }
        clues:
          type: array
          minItems: 1
          maxItems: 2
          items: { $ref: '#/components/schemas/GameDefinitionClue' }
    GameDefinitionClue:
      type: object
      required: [id, text, arrow]
      description: A single clue carried by a `GameDefinitionCell`.
      properties:
        id:    { type: string, format: uuid }
        text:  { type: string, minLength: 1, maxLength: 500, example: Capitale de la France }
        arrow: { $ref: '#/components/schemas/GameArrow' }
    GameBlockCell:
      type: object
      required: [kind, position]
      properties:
        kind:     { type: string, enum: [block] }
        position: { $ref: '#/components/schemas/GamePosition' }
    GameArrow:
      type: string
      enum: [right, down, down-right, right-down]
      x-enum-varnames: [RIGHT, DOWN, DOWN_RIGHT, RIGHT_DOWN]
      description: Arrow direction on a mots-fléchés definition cell.
    GamePosition:
      type: object
      required: [row, column]
      description: Zero-indexed grid coordinate.
      properties:
        row:    { type: integer, minimum: 0, description: Zero-indexed row, top to bottom. }
        column: { type: integer, minimum: 0, description: Zero-indexed column, left to right. }
    GameClue:
      type: object
      required: [id, direction, start, length, text]
      properties:
        id:        { type: string, format: uuid }
        direction: { $ref: '#/components/schemas/GameClueDirection' }
        start:     { $ref: '#/components/schemas/GamePosition' }
        length:    { type: integer, minimum: 1, maximum: 50, description: Number of letter cells in the answer. }
        text:      { type: string, minLength: 1, maxLength: 500 }
    GameClueDirection:
      type: string
      enum: [across, down]
      x-enum-varnames: [ACROSS, DOWN]
      description: Direction a clue's answer is written.
    GameSession:
      type: object
      required: [puzzle, entries, lockedPositions, startedAt, completedAt]
      description: |
        Active game embedded in `lobbyState` while IN_PROGRESS or COMPLETED.
        `entries` carries every letter typed so far (server-authoritative,
        last-write-wins per ADR-0018) so a reconnecting or late-joining
        client receives the current grid state in its first frame instead
        of an empty grid. Cleared cells are absent from the list. The
        server emits entries sorted by row then column for stable rendering.
        `lockedPositions` mirrors the cumulative set of cells whose
        containing word was validated correct (see `wordLocked`); it lets a
        late-joining or reconnecting client render already-locked cells
        immediately, before any incremental events arrive. Always emitted
        (empty list when no word has been locked yet). `presence` is the
        ephemeral cursor map for currently-connected players; it is
        optional and absent (or empty) outside `IN_PROGRESS`, and is
        cleared on `WAITING`/`COMPLETED` transitions.
      properties:
        puzzle:      { $ref: '#/components/schemas/GamePuzzle' }
        entries:
          type: array
          items: { $ref: '#/components/schemas/CellEntry' }
          description: Every cell typed so far. Empty list when no player has typed yet.
        lockedPositions:
          type: array
          items: { $ref: '#/components/schemas/GamePosition' }
          description: |
            Cumulative set of cells the server has locked. Order is row,
            then column (stable for diff-friendly snapshots). Empty list
            when no word has been validated yet.
        startedAt:   { $ref: '#/components/schemas/Instant' }
        completedAt: { $ref: '#/components/schemas/Instant', nullable: true, description: Set once the lobby reaches COMPLETED. }
        presence:
          type: array
          items: { $ref: '#/components/schemas/PresenceEntry' }
          description: |
            Ephemeral cursor positions of currently-connected players. Optional;
            absent or empty outside IN_PROGRESS. Cleared on WAITING/COMPLETED
            transitions. Not persisted; lives only in `SessionManager`'s
            in-memory map (single-replica posture per ADR-0018 §3).
    # ----- Client → server payloads -----
    JoinLobbyPayload:
      type: object
      required: [type, sessionId, pseudonym]
      properties:
        type:      { type: string, enum: [joinLobby] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        pseudonym: { $ref: '#/components/schemas/Pseudonym' }
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[A-HJKM-NP-Z2-9]{6}$'
          description: |
            Six-char Crockford-style join code (ADR-0027). Required for new
            joiners — server rejects with `wrong-code` (403) on missing or
            mismatched value. Optional / ignored for already-joined sessions:
            the reconnect branch is keyed by `sessionId` and never reads this
            field, so a refresh / tab-recovery flow does not need to
            re-supply it.
          example: A2B3C4
      example: { type: joinLobby, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, pseudonym: Joueur 1234, code: A2B3C4 }
    RenameSelfPayload:
      type: object
      required: [type, newPseudonym]
      properties:
        type:         { type: string, enum: [renameSelf] }
        newPseudonym: { $ref: '#/components/schemas/Pseudonym' }
      example: { type: renameSelf, newPseudonym: Alice }
    SetGridConfigPayload:
      type: object
      required: [type, width, height]
      description: Owner-only. Server rejects with `error` otherwise.
      properties:
        type:   { type: string, enum: [setGridConfig] }
        width:  { type: integer, minimum: 5, maximum: 15 }
        height: { type: integer, minimum: 5, maximum: 15 }
      example: { type: setGridConfig, width: 7, height: 7 }
    StartGamePayload:
      type: object
      required: [type]
      description: Owner-only. Server rejects with `error` otherwise.
      properties:
        type: { type: string, enum: [startGame] }
      example: { type: startGame }
    CellUpdatePayload:
      type: object
      required: [type, row, column, letter]
      description: Client-initiated cell write. `letter` is `null` to clear. Server rebroadcasts as `cellUpdated` with a `writtenAt` stamp.
      properties:
        type:   { type: string, enum: [cellUpdate] }
        row:    { type: integer, minimum: 0 }
        column: { type: integer, minimum: 0 }
        letter: { $ref: '#/components/schemas/Letter' }
      example: { type: cellUpdate, row: 0, column: 3, letter: P }
    CellFocusPayload:
      type: object
      required: [type, row, column, direction]
      description: |
        Client cursor signal. Carries no domain meaning — peers use it only
        to render the sender's cursor and active-word tint. Clients SHOULD
        throttle to ~5 Hz (200 ms debounce). All three position fields are
        nullable; `null` means no cell focused (e.g. user clicked off the
        grid). Per ADR-0003 §6, absence and `null` are distinct.
      properties:
        type:      { type: string, enum: [cellFocus] }
        row:       { type: integer, minimum: 0, nullable: true, description: Zero-indexed row of the focused cell; `null` when no cell is focused. }
        column:    { type: integer, minimum: 0, nullable: true, description: Zero-indexed column of the focused cell; `null` when no cell is focused. }
        direction: { $ref: '#/components/schemas/GameClueDirection', nullable: true, description: Direction the player is currently solving; `null` when no cell is focused. Lets peers tint the whole word, not just the cell. }
      example: { type: cellFocus, row: 0, column: 3, direction: across }
    LeaveLobbyPayload:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [leaveLobby] }
      example: { type: leaveLobby }

    # ----- Server → client payloads -----
    LobbyStatePayload:
      type: object
      required: [type, players, ownerSessionId, state, gridConfig, code, game]
      description: Snapshot fired on join, on reconnect, and on owner-driven lobby field changes (`setGridConfig`).
      properties:
        type:           { type: string, enum: [lobbyState] }
        players:        { type: array, maxItems: 8, items: { $ref: '#/components/schemas/Player' } }
        ownerSessionId: { $ref: '#/components/schemas/SessionId' }
        state:          { $ref: '#/components/schemas/LobbyLifecycleState' }
        gridConfig:     { $ref: '#/components/schemas/GridConfig' }
        code:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^[A-HJKM-NP-Z2-9]{6}$'
          description: Six-char Crockford-style join code (ADR-0027). Always present on the snapshot so future server-side mutations propagate to clients via the same channel as every other lobby field.
          example: A2B3C4
        game:           { $ref: '#/components/schemas/GameSession', nullable: true }
      example:
        type: lobbyState
        players: [{ sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, pseudonym: Joueur 1234, joinedAt: '2026-05-02T15:30:00Z' }]
        ownerSessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b
        state: IN_PROGRESS
        gridConfig: { width: 7, height: 7 }
        code: A2B3C4
        game:
          puzzle: { id: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6c, title: Petite grille du mardi, language: fr, width: 5, height: 5, cells: [], clues: [], hintsAllowed: 3, createdAt: '2026-04-24T15:30:00Z' }
          entries:
            - { sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 0, column: 3, letter: P, writtenAt: '2026-05-02T15:35:42Z' }
            - { sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 0, column: 4, letter: A, writtenAt: '2026-05-02T15:35:43Z' }
          lockedPositions: []
          startedAt: '2026-05-02T15:35:00Z'
          completedAt: null
    PlayerJoinedPayload:
      type: object
      required: [type, sessionId, pseudonym, joinedAt]
      properties:
        type:      { type: string, enum: [playerJoined] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        pseudonym: { $ref: '#/components/schemas/Pseudonym' }
        joinedAt:  { $ref: '#/components/schemas/Instant' }
      example: { type: playerJoined, sessionId: 0190e3b2-1c45-7d2e-9a3f-c0d1e2f3a4b5, pseudonym: Bob, joinedAt: '2026-05-02T15:31:12Z' }
    PlayerLeftPayload:
      type: object
      required: [type, sessionId]
      properties:
        type:      { type: string, enum: [playerLeft] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
      example: { type: playerLeft, sessionId: 0190e3b2-1c45-7d2e-9a3f-c0d1e2f3a4b5 }
    PlayerRenamedPayload:
      type: object
      required: [type, sessionId, newPseudonym]
      properties:
        type:         { type: string, enum: [playerRenamed] }
        sessionId:    { $ref: '#/components/schemas/SessionId' }
        newPseudonym: { $ref: '#/components/schemas/Pseudonym' }
      example: { type: playerRenamed, sessionId: 0190e3b2-1c45-7d2e-9a3f-c0d1e2f3a4b5, newPseudonym: Alice }
    GameStartedPayload:
      type: object
      required: [type, puzzle, startedAt]
      description: Sent once when the owner clicks Start. `puzzle` is the document the server fetched from grid/ verbatim; clients render directly from it.
      properties:
        type:      { type: string, enum: [gameStarted] }
        puzzle:    { $ref: '#/components/schemas/GamePuzzle' }
        startedAt: { $ref: '#/components/schemas/Instant' }
      example: { type: gameStarted, startedAt: '2026-05-02T15:35:00Z', puzzle: { id: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6c, title: Petite grille du mardi, language: fr, width: 5, height: 5, cells: [], clues: [], hintsAllowed: 3, createdAt: '2026-04-24T15:30:00Z' } }
    CellUpdatedPayload:
      type: object
      required: [type, sessionId, row, column, letter, writtenAt]
      description: Canonical broadcast for an accepted `cellUpdate`. Server stamps `writtenAt`; clients use it to break ties.
      properties:
        type:      { type: string, enum: [cellUpdated] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        row:       { type: integer, minimum: 0 }
        column:    { type: integer, minimum: 0 }
        letter:    { $ref: '#/components/schemas/Letter' }
        writtenAt: { $ref: '#/components/schemas/Instant' }
      example: { type: cellUpdated, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 0, column: 3, letter: P, writtenAt: '2026-05-02T15:35:42Z' }
    PresenceUpdatedPayload:
      type: object
      required: [type, sessionId, row, column, direction]
      description: |
        Server broadcast of a peer's `cellFocus`. Ephemeral — carries no
        domain meaning, is not persisted, and is dropped on lobby
        WAITING/COMPLETED transitions. Clients render this as a cursor
        marker + active-word tint for the named `sessionId`.
      properties:
        type:      { type: string, enum: [presenceUpdated] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        row:       { type: integer, minimum: 0, nullable: true, description: Zero-indexed row of the focused cell; `null` when the peer has no cell focused. }
        column:    { type: integer, minimum: 0, nullable: true, description: Zero-indexed column of the focused cell; `null` when the peer has no cell focused. }
        direction: { $ref: '#/components/schemas/GameClueDirection', nullable: true, description: Direction the peer is currently solving; `null` when no cell is focused. }
      example: { type: presenceUpdated, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 0, column: 3, direction: across }
    TypingPayload:
      type: object
      required: [type, sessionId, typing]
      description: |
        Boolean state edge — peer started (`typing: true`) or stopped
        (`typing: false`) receiving keystrokes. Server tracks per-session
        last-keystroke timestamps and emits the edge events; clients SHOULD
        treat the dot as a hint, not a guarantee, since rate-limiting and
        network reordering can drop the trailing `false` edge. Carries no
        domain meaning; not persisted.
      properties:
        type:      { type: string, enum: [typing] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        typing:    { type: boolean, description: True when the peer began typing; false on the trailing idle edge. }
      example: { type: typing, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, typing: true }
    IdlePayload:
      type: object
      required: [type, sessionId, idle]
      description: |
        Boolean state edge — peer crossed the 30s inactivity threshold
        (`idle: true`) or returned to activity (`idle: false`). The
        threshold is server-side; clients render the transition (e.g.
        desaturated badge / roster pill) without re-deriving timeouts.
        Independent of `connectionLost`: a connected-but-idle peer is
        still subscribed to the lobby. Ephemeral; not persisted.
      properties:
        type:      { type: string, enum: [idle] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        idle:      { type: boolean, description: True when the peer crossed the inactivity threshold; false on the next activity. }
      example: { type: idle, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, idle: true }
    ConnectionLostPayload:
      type: object
      required: [type, sessionId]
      description: |
        Graceful disconnect signal. Distinct from `playerLeft`: the slot
        is held during a server-side grace window (currently ~30s).
        Clients SHOULD grey-out the roster pill on receipt and remove
        the slot only when (or if) `playerLeft` follows. If the same
        `sessionId` reconnects within the grace window, the server may
        emit a fresh `presenceUpdated` instead of `playerLeft`; clients
        SHOULD restore the pill on activity for that session.
      properties:
        type:      { type: string, enum: [connectionLost] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
      example: { type: connectionLost, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b }
    CursorBumpedPayload:
      type: object
      required: [type, sessionId, row, column, direction]
      description: |
        Server-authoritative cursor relocation. Emitted when an
        answer-validation flow locks cells that contained a peer's
        cursor — the server moves the named session's cursor to the
        next clue's first letter cell so the peer is not stranded on a
        sage cell. Clients apply unconditionally (last-write-wins) and
        re-render the cursor at the bumped position. The frame mirrors
        a `presenceUpdated` shape but is non-nullable on row/column/
        direction (a bump always has a target).
      properties:
        type:      { type: string, enum: [cursorBumped] }
        sessionId: { $ref: '#/components/schemas/SessionId' }
        row:       { type: integer, minimum: 0, description: Zero-indexed row of the bumped-to cell. }
        column:    { type: integer, minimum: 0, description: Zero-indexed column of the bumped-to cell. }
        direction: { $ref: '#/components/schemas/GameClueDirection', description: Solving direction at the bumped-to cell. }
      example: { type: cursorBumped, sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 2, column: 0, direction: down }
    WordLockedPayload:
      type: object
      required: [type, positions, lockedAt]
      description: |
        Server broadcast: every position in `positions` is now locked. The
        positions belong to one or more words whose last letter was just
        filled and whose every letter matched the canonical solution. The
        server stops accepting `cellUpdate` writes targeting these cells
        (silent no-op — no `cellUpdated` rebroadcast). Locks are
        monotonically additive within a game session and are surfaced on
        `lobbyState.game.lockedPositions` for late-joiners. Two words may
        lock simultaneously when the just-filled cell is a crossing — the
        server merges their positions into a single frame.
      properties:
        type:      { type: string, enum: [wordLocked] }
        positions:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/GamePosition' }
          description: One or more cells whose containing word was just validated correct. Order is row then column.
        lockedAt:  { $ref: '#/components/schemas/Instant' }
      example:
        type: wordLocked
        positions:
          - { row: 0, column: 1 }
          - { row: 0, column: 2 }
          - { row: 0, column: 3 }
        lockedAt: '2026-05-02T15:36:10Z'
    GameSolvedPayload:
      type: object
      required: [type, durationMs, finalEntries]
      description: All cells match the canonical solution; lobby is COMPLETED.
      properties:
        type:         { type: string, enum: [gameSolved] }
        durationMs:   { type: integer, minimum: 0, description: Authoritative duration from `gameStarted` to solve., example: 184250 }
        finalEntries: { type: array, items: { $ref: '#/components/schemas/CellEntry' }, description: Every solved cell. Convenience for the end-game UI. }
      example:
        type: gameSolved
        durationMs: 184250
        finalEntries:
          - { sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 0, column: 3, letter: P, writtenAt: '2026-05-02T15:35:42Z' }
          - { sessionId: 0190e3a4-7a2c-7c9e-8f1a-9b2d3e4f5a6b, row: 0, column: 4, letter: A, writtenAt: '2026-05-02T15:35:43Z' }
    ErrorPayload:
      type: object
      required: [type, errorType, title]
      description: |
        RFC 7807-shaped error frame. The on-the-wire field is `errorType`
        (not `type`) so it does not collide with the discriminator; the
        `type` discriminator value is `error`.
      properties:
        type:      { type: string, enum: [error] }
        errorType:
          type: string
          format: uri
          description: |
            Stable URI per error class (RFC 7807 `type`).
            Known values emitted over WebSocket:
            `https://bliss.example/errors/lobby-full`,
            `https://bliss.example/errors/invalid-pseudonym`,
            `https://bliss.example/errors/lobby-not-found`,
            `https://bliss.example/errors/not-owner`,
            `https://bliss.example/errors/invalid-state`,
            `https://bliss.example/errors/player-not-in-lobby`,
            `https://bliss.example/errors/wrong-code` (ADR-0027 — new joiner
              missing / mismatched the lobby's code; reconnects bypass),
            `https://bliss.example/errors/invalid-argument`,
            `https://bliss.example/errors/protocol` (generic protocol violations).
          example: 'https://bliss.example/errors/lobby-full'
        title:     { type: string, description: Short, human-readable summary., example: Lobby is full }
        detail:    { type: string, description: Occurrence-specific explanation. }
        status:    { type: integer, minimum: 100, maximum: 599, description: HTTP-style status code, mirrored for parity with REST. }
      example: { type: error, errorType: 'https://bliss.example/errors/lobby-full', title: Lobby is full, detail: This lobby already has 8 players., status: 409 }
