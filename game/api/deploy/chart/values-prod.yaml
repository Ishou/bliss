# Production overrides — Hetzner k3s cluster (ADR-0009 §2).
# replicaCount is intentionally NOT overridden here. The deployment
# template hard-codes replicas: 1 per ADR-0018 §3 (in-memory state).

# Pin the K8s resource name to the release name so the CD workflow's
# `kubectl rollout status deployment/wordsparrow-game-api` line resolves
# without per-context name arithmetic. Without this, helm's default
# fullname is `<release>-<chart>` = `wordsparrow-game-api-bliss-game-api`
# (since the release name doesn't contain the chart name `bliss-game-api`).
fullnameOverride: "wordsparrow-game-api"

image:
  # Fail-fast guard: helm aborts if digest is empty (see _helpers.tpl).
  requireDigest: true
  # Set by the CD workflow per push (ADR-0009 §8 step 5). Format "sha256:...".
  digest: ""
database:
  # CNPG cluster lives in the sibling `bliss-game-api-pg` Helm release
  # (chart `game/api/deploy/db-chart/`, deployed first by the workflow).
  # ADR-0039 cutover + chart-split: bounded-context separation extends to
  # storage AND to deploy-time lifecycle so an api deploy can never destroy
  # the cluster.
  enabled: true
ingress:
  host: "game.wordsparrow.io"
  tlsSecretName: "bliss-game-api-tls"
  # Issuer + external-dns provider installed by cluster bring-up (ADR-0009 §3).
  # WebSocket-specific annotations (proxy-read-timeout, http/1.1) live
  # inline in templates/ingress.yaml — they are not env-specific.
  #
  # `external-dns.alpha.kubernetes.io/target` pins the public Hetzner
  # floating IP (ADR-0012) instead of letting external-dns read the
  # ClusterIP from `status.loadBalancer.ingress[*].ip` — the
  # ingress-nginx Service's ClusterIP would land in Cloudflare as a
  # reserved-range A record (Cloudflare flags it "DNS only - reserved
  # IP"), which Let's Encrypt can't reach for HTTP-01 validation. The
  # grid Ingress avoids this by historical luck (its A record was
  # written before this misconfig surfaced); pinning is the explicit
  # cure.
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: "game.wordsparrow.io"
    external-dns.alpha.kubernetes.io/target: "116.202.180.82"
    # Per-IP rate limiting at the ingress (leaky-bucket). REST is light
    # (lobby create/get); WebSockets are long-lived so `limit-connections`
    # is sized to allow several browser tabs but cap abuse. Tunable.
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "30"
# Bootstrapped via `kubectl create secret generic bliss-game-api-env ...` (ADR-0009 §10).
envFromSecret: "bliss-game-api-env"
