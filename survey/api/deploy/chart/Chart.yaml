# (chart `bliss-survey-api-pg`, release `wordsparrow-survey-api-pg`) —
# different lifecycle from the api Deployment (long-lived infra vs rolling
# app). See ADR-0056 for the survey context, ADR-0039 amendment 2026-05-13
# for the chart-split rationale.
dependencies: []
