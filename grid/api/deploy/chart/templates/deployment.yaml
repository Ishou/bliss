apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordsparrow-api.fullname" . }}
  labels: {{- include "wordsparrow-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "wordsparrow-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "wordsparrow-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "wordsparrow-api.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if gt (int .Values.replicaCount) 1 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "wordsparrow-api.selectorLabels" . | nindent 14 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: {{- include "wordsparrow-api.selectorLabels" . | nindent 20 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "wordsparrow-api.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - {name: http, containerPort: {{ .Values.service.port }}, protocol: TCP}
          env:
            # DATABASE_URL is sourced directly from CNPG's
            # auto-generated `<cluster>-app` Secret (key: `uri`).
            # CNPG creates that Secret on initdb with the password it
            # generates itself. The chart no longer owns the bootstrap
            # credentials (see postgres-cluster.yaml's `bootstrap.initdb`
            # block for the removal rationale). No operator step between
            # install and pod-start is required.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordsparrow-api.pgClusterName" . }}-app
                  key: uri
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFromSecret }}
          envFrom:
            # Operator-supplied envs (Matomo analytics — optional, the
            # adapter falls back to a noop when MATOMO_URL/SITE_ID/
            # ID_SALT are missing). DATABASE_URL is no longer expected
            # in this Secret; the chart's env entry above takes
            # precedence even if a stale operator-managed
            # DATABASE_URL is still present (Kubernetes pod spec:
            # explicit `env` wins over `envFrom` for the same name).
            - secretRef: {name: {{ . }}}
          {{- end }}
          # startupProbe: gate for CSV cold-start (~30-60 s on 250m CPU); liveness/readiness only fire after this passes
          {{- with .Values.probes.startup }}
          startupProbe:
            httpGet: {path: {{ .path }}, port: http}
            periodSeconds: {{ .periodSeconds | default 5 }}
            failureThreshold: {{ .failureThreshold | default 30 }}
          {{- end }}
          livenessProbe:
            httpGet: {path: {{ .Values.probes.liveness.path }}, port: http}
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: {{ .Values.probes.readiness.path }}, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          # readOnlyRootFilesystem requires a writable /tmp (JVM PerfData etc).
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - {name: tmp, emptyDir: {}}
