name: Deploy Frontend

# Implements ADR-0004 §3 (GitHub Actions → Cloudflare Pages, Direct Upload).
#
# - push to main      -> production deploy (bliss.pages.dev)
# - pull_request      -> preview deploy at <branch>.<project>.pages.dev.
#                        The preview URL is in the action's job log;
#                        wrangler-action (unlike the legacy pages-action
#                        it replaced) does not auto-post a PR comment.
#
# Drafts are skipped to match the ADR-0001 §6a workflow's behavior and
# avoid burning Pages build slots on work-in-progress branches.
#
# Path filter: only run when something this workflow can actually affect
# changed (frontend source, IaC, or the workflow itself). Keeps docs-only
# PRs off the deploy critical path. CLAUDE.md "CI target: under 5 minutes"
# is met today by avoiding work, not by parallelizing it harder.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'terraform/**'
      - '.github/workflows/deploy-frontend.yml'

# A second push to the same branch cancels the in-flight deploy of that
# branch — the newer commit wins. `cancel-in-progress` is safe here
# because Cloudflare's deploy is idempotent on the directory contents.
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # Reserved for the optional follow-up that posts the preview URL as
  # a PR comment via `actions/github-script` (wrangler-action no
  # longer auto-posts the way the legacy pages-action did). Drop this
  # if/when that follow-up is decided against.
  pull-requests: write
  # Required by Cloudflare's deploy action(s) when GitHub OIDC is
  # enabled on the runner; harmless when it is not.
  deployments: write

jobs:
  deploy:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        # pnpm/action-setup v4.0.0
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: '11.0.9'
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium for prerender
        # The seo:postbuild step (chained into build / build:preview)
        # uses Playwright's chromium to render each indexable route to
        # static HTML. Browser binaries aren't part of the npm package,
        # so install just chromium with its OS deps before the build.
        # See ADR-0035.
        working-directory: frontend
        run: pnpm exec playwright install chromium --with-deps

      - name: Build frontend
        # PR previews use build:preview (loads .env.preview → VITE_USE_MOCK_API=true)
        # so MSW intercepts Grid API calls instead of hitting production.
        # Push to main uses the standard build (no mock).
        #
        # Run from the frontend directory rather than `pnpm --filter frontend`
        # at the repo root: pnpm 11's pre-command install-check requires a
        # package.json or `pnpm-workspace.yaml` declaring `packages:` at the
        # cwd. The repo isn't a monorepo, so cd-ing in is simpler than
        # adding a root workspace manifest.
        working-directory: frontend
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm build:preview
          else
            pnpm build
          fi

      - name: Post-build SEO assertions
        working-directory: frontend
        run: pnpm test:post-build

      - name: Publish to Cloudflare Pages
        # cloudflare/wrangler-action v3.15.0 — replacement for the
        # deprecated cloudflare/pages-action. The legacy action's
        # bundled deps included `@miniflare/watcher@2.14.4` (Miniflare
        # v2, EOL upstream), surfacing as `npm warn deprecated` on every
        # deploy run and a long-tail supply-chain risk if Cloudflare's
        # API contract shifted under the frozen action. wrangler-action
        # ships current wrangler + Miniflare 4 and is the explicitly-
        # supported deploy path going forward.
        #
        # Trade-off taken: the legacy action posted preview URLs as PR
        # comments automatically. wrangler-action doesn't. The preview
        # URL is still visible in the job log + on the Cloudflare Pages
        # dashboard; if reviewers miss it, a follow-up step using
        # `actions/github-script` can re-wire it from the CLI output.
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          # head_ref is set on PR triggers, ref_name on push. Pages routes
          # production by matching against its configured production
          # branch (main); any other branch becomes a preview.
          command: pages deploy frontend/dist --project-name=bliss --branch=${{ github.head_ref || github.ref_name }}
