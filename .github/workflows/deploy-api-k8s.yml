name: Deploy API (k8s)

# Implements ADR-0009 §8 step 5: continuous delivery of the WordSparrow
# services to the Hetzner k3s cluster (FSN1, 1 CP + 1 worker, ADR-0009 §2).
#
# As of Wave G PR (this commit) the workflow is a matrix that fans out
# over the {grid, game} bounded contexts:
#   - wordsparrow-api      → grid/api/deploy/chart, api.wordsparrow.io
#   - wordsparrow-game-api → game/api/deploy/chart, game.wordsparrow.io
#
# Triggered by `Build and Push Image` (build-and-push-image.yml) on every
# successful main push: each matrix row of the build workflow uploads
# `image-digest-<context>` as an artifact; this workflow downloads the
# matching one and runs `helm upgrade --install <release-name> <chart-path>`
# with `--set image.digest=<sha256>` so each chart's `image.requireDigest`
# guard is satisfied. `workflow_dispatch` is wired for manual rollback /
# redeploy: pass the bounded context + desired digest as inputs.
#
# Runs ALONGSIDE the existing Fly deploy at .github/workflows/deploy-api.yml
# until ADR-0009 §8 step 7 cutover removes Fly.
#
# Images are immutable per the MANIFESTO ("Container images pinned to
# digest. Builds are deterministic."): no `:latest`, no floating tags
# reach the cluster. The chart fails fast (helm `fail`) when no digest
# is supplied, so a degraded artifact path here surfaces as a build
# failure, not a silent untagged deploy.
#
# Failure handling: `--atomic` was dropped on purpose so diagnostics can
# capture the broken pods/events before rollback. The
# "Capture failure diagnostics" + "Rollback failed release" steps
# replicate `--atomic`'s rollback semantics while keeping the manifesto's
# "one-click rollback" promise intact.
#
# PREREQUISITES (one-time human bootstrap, see docs/deploy.md):
#   - The Hetzner k8s cluster + platform operators (cert-manager,
#     ingress-nginx, external-dns, CNPG, hcloud-csi) are bootstrapped
#     via `infra/platform/` per ADR-0009 §3 (PR56).
#   - The `KUBECONFIG_PROD` repository secret holds the cluster's
#     kubeconfig with the rewritten public IP.
#   - Per-context env secrets exist in the `wordsparrow` namespace:
#       - `wordsparrow-api-env` (grid)            (ADR-0009 §10)
#       - `bliss-game-api-env` (game)             (ADR-0018, see chart values)
#   - The GHCR packages are PUBLIC (one-time visibility flip per
#     build-and-push-image.yml's header):
#       - bliss/wordsparrow-api      (already public)
#       - bliss/wordsparrow-game-api (NEW — must be flipped after first push)

on:
  workflow_run:
    # Must match the upstream workflow's `name:` field exactly.
    workflows: ["Build and Push Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      context:
        description: 'Bounded context to deploy.'
        required: true
        type: choice
        options:
          - grid
          - game
        default: grid
      digest:
        description: 'Image digest to deploy, format "sha256:..." (manual rollback / redeploy).'
        required: true
        type: string

concurrency:
  # Serialize prod deploys: a second push mid-deploy queues rather than
  # cancels (cancel-in-progress: false). Mid-flight `helm upgrade`
  # cancellation can leave the release in a `pending-upgrade` state
  # that requires manual `helm rollback`, which violates the one-click
  # rollback rule. The matrix runs grid + game in parallel within a
  # single workflow run; the concurrency group serializes runs against
  # each other, not jobs within one run.
  group: deploy-api-k8s-prod
  cancel-in-progress: false

permissions:
  # Least-privilege per CLAUDE.md "Security". `actions: read` is
  # required for actions/download-artifact's cross-workflow form
  # (downloading from another workflow run via `run-id`).
  contents: read
  actions: read

jobs:
  deploy:
    name: deploy (${{ matrix.context }})
    # workflow_run path: only proceed on successful upstream push builds.
    # workflow_dispatch path: only the row matching `inputs.context` runs;
    # the other row is skipped via this if guard so a manual rollback to
    # one service doesn't accidentally redeploy the other with the same
    # digest (which would also be wrong because the digests are distinct).
    if: >-
      ${{ (github.event_name == 'workflow_run' &&
           github.event.workflow_run.conclusion == 'success' &&
           github.event.workflow_run.event == 'push') ||
          (github.event_name == 'workflow_dispatch' &&
           inputs.context == matrix.context) }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      # fail-fast: false so a green grid deploy isn't masked by a red
      # game deploy (and vice versa). Matches build-and-push-image.yml.
      fail-fast: false
      matrix:
        include:
          - context: grid
            release-name: wordsparrow-api
            chart-path: grid/api/deploy/chart/
            values-file: grid/api/deploy/chart/values-prod.yaml
            digest-artifact: image-digest-grid
            health-url: https://api.wordsparrow.io/v1/health
          - context: game
            release-name: wordsparrow-game-api
            chart-path: game/api/deploy/chart/
            values-file: game/api/deploy/chart/values-prod.yaml
            digest-artifact: image-digest-game
            health-url: https://game.wordsparrow.io/v1/health
    environment:
      # Per-context environment so each appears separately in the GitHub
      # Environments UI and required-reviewer rules can be applied
      # independently (e.g. only require approval for grid deploys).
      name: prod-${{ matrix.context }}
      url: ${{ matrix.health-url }}

    steps:
      - name: Checkout repository
        # actions/checkout v4.3.1 — same SHA as helm-lint.yml.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Set up Helm
        # azure/setup-helm v4.3.1 — same SHA as helm-lint.yml.
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.16.3

      - name: Download digest artifact (workflow_run)
        # Cross-workflow artifact download: the build workflow uploaded
        # `image-digest-<context>` in the run identified by `workflow_run.id`.
        if: github.event_name == 'workflow_run'
        # actions/download-artifact v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ matrix.digest-artifact }}
          path: artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digest
        id: digest
        env:
          DISPATCH_DIGEST: ${{ inputs.digest }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            digest="$DISPATCH_DIGEST"
          else
            digest="$(cat artifact/digest.txt)"
          fi
          if [ -z "$digest" ]; then
            echo "::error::resolved digest is empty"
            exit 1
          fi
          case "$digest" in
            sha256:*) ;;
            *)
              echo "::error::digest must start with 'sha256:'; got '$digest'"
              exit 1
              ;;
          esac
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "Resolved digest: $digest"

      - name: Configure kubeconfig
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_DATA:-}" ]; then
            echo "::error::KUBECONFIG_PROD secret is not set; see docs/deploy.md"
            exit 1
          fi
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade --install
        id: helm
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
          RELEASE: ${{ matrix.release-name }}
          CHART: ${{ matrix.chart-path }}
          VALUES: ${{ matrix.values-file }}
        # `--atomic` was dropped on purpose: when a release fails,
        # `--atomic` rolls back BEFORE the diagnostics step can run, so
        # the broken pods (and their logs / events) are gone by the time
        # we'd otherwise capture them. We keep `--wait --timeout 5m` so
        # the step still surfaces the failure as a non-zero exit, but
        # leave the pending-upgrade release in place.
        run: |
          set -euo pipefail
          helm upgrade --install "$RELEASE" "$CHART" \
            -n wordsparrow --create-namespace \
            -f "$VALUES" \
            --set image.digest="$DIGEST" \
            --wait --timeout 5m

      - name: Capture failure diagnostics
        # Only runs when the helm step failed. `set +e` so we don't
        # short-circuit on missing resources. Output is grouped so the
        # GHA log UI surfaces collapsible sections.
        if: failure() && steps.helm.conclusion == 'failure'
        env:
          RELEASE: ${{ matrix.release-name }}
        run: |
          set +e
          echo "::group::helm history (last 5 revisions)"
          helm history "$RELEASE" -n wordsparrow --max 5
          echo "::endgroup::"

          echo "::group::helm status"
          helm status "$RELEASE" -n wordsparrow --show-resources
          echo "::endgroup::"

          echo "::group::pod summary"
          kubectl get pods -n wordsparrow -l app.kubernetes.io/instance="$RELEASE" -o wide
          echo "::endgroup::"

          echo "::group::pod descriptions (events + probe failures)"
          kubectl describe pods -n wordsparrow \
            -l app.kubernetes.io/instance="$RELEASE"
          echo "::endgroup::"

          # Logs from current AND previous container — CrashLoopBackOff
          # rotates the active container, leaving its in-process logs
          # empty; --previous pulls the last-crash output where the
          # actual exception lives.
          echo "::group::pod logs (current + previous, last 500 lines)"
          for pod in $(kubectl get pods -n wordsparrow \
            -l app.kubernetes.io/instance="$RELEASE" -o name); do
            echo "=== $pod (current) ==="
            kubectl logs -n wordsparrow "$pod" --all-containers --tail=500
            echo "=== $pod (previous) ==="
            kubectl logs -n wordsparrow "$pod" --all-containers --tail=500 --previous
          done
          echo "::endgroup::"

          echo "::group::namespace events (last 50, oldest first)"
          kubectl get events -n wordsparrow \
            --sort-by=.lastTimestamp | tail -50
          echo "::endgroup::"

      - name: Rollback failed release
        # Replicates `--atomic`'s rollback now that diagnostics are
        # captured. Picks the prior good revision from `helm history`
        # and rolls back synchronously. If there is no prior revision
        # (very first install), we uninstall instead so the namespace
        # doesn't keep a permanently-failed release lying around.
        if: failure() && steps.helm.conclusion == 'failure'
        env:
          RELEASE: ${{ matrix.release-name }}
        run: |
          set -euo pipefail
          history_json=$(helm history "$RELEASE" \
            -n wordsparrow -o json 2>/dev/null || echo '[]')
          prev_rev=$(echo "$history_json" | \
            jq -r '[.[] | select(.status=="deployed" or .status=="superseded")] | sort_by(.revision) | last | .revision // empty')
          if [ -n "$prev_rev" ]; then
            echo "Rolling back to revision $prev_rev"
            helm rollback "$RELEASE" "$prev_rev" \
              -n wordsparrow --wait --timeout 2m
          else
            echo "No prior good revision; uninstalling failed release"
            helm uninstall "$RELEASE" -n wordsparrow --wait --timeout 2m
          fi

      - name: Verify rollout
        env:
          RELEASE: ${{ matrix.release-name }}
        # `fullnameOverride` in each chart's values-prod.yaml pins the
        # deployment name to the release name, so this resolves
        # `deployment/wordsparrow-api` and `deployment/wordsparrow-game-api`.
        run: |
          set -euo pipefail
          kubectl -n wordsparrow rollout status deployment/"$RELEASE" --timeout=2m
          kubectl -n wordsparrow get pods -l app.kubernetes.io/instance="$RELEASE" -o wide

      - name: Smoke test /v1/health
        env:
          HEALTH_URL: ${{ matrix.health-url }}
        # External smoke test against the public ingress. cert-manager
        # + external-dns must already have the cert + DNS in place.
        # Five attempts at 10s apart absorbs DNS / cache propagation
        # jitter without masking a real outage — total budget 50s.
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if curl -sf -m 5 "$HEALTH_URL"; then
              echo "healthy"
              exit 0
            fi
            sleep 10
          done
          echo "::error::$HEALTH_URL did not return 200 after 50s"
          exit 1
