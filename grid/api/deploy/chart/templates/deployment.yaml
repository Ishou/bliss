apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordsparrow-api.fullname" . }}
  labels: {{- include "wordsparrow-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "wordsparrow-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "wordsparrow-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "wordsparrow-api.serviceAccountName" . }}
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if gt (int .Values.replicaCount) 1 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels: {{- include "wordsparrow-api.selectorLabels" . | nindent 14 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels: {{- include "wordsparrow-api.selectorLabels" . | nindent 20 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "wordsparrow-api.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext: {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - {name: http, containerPort: {{ .Values.service.port }}, protocol: TCP}
          {{- with .Values.env }}
          env: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.envFromSecret }}
          envFrom:
            - secretRef: {name: {{ . }}}
          {{- end }}
          # startupProbe: gate for CSV cold-start (~30-60 s on 250m CPU); liveness/readiness only fire after this passes
          {{- with .Values.probes.startup }}
          startupProbe:
            httpGet: {path: {{ .path }}, port: http}
            periodSeconds: {{ .periodSeconds | default 5 }}
            failureThreshold: {{ .failureThreshold | default 30 }}
          {{- end }}
          livenessProbe:
            httpGet: {path: {{ .Values.probes.liveness.path }}, port: http}
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: {path: {{ .Values.probes.readiness.path }}, port: http}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
          # readOnlyRootFilesystem requires a writable /tmp (JVM PerfData etc).
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - {name: tmp, emptyDir: {}}
