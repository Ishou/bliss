# iter10: same hyperparams as iter9 (rank 32, batch 4, 600 iters)
# but trained on 583-pair corpus including 400 Claude-authored synthetic
# CC0 clues. Isolates the data-volume effect.
model: "mlx-community/c4ai-command-r-08-2024-4bit"
data: "data/lora"
adapter_path: "models/lora-clue-v3"
fine_tune_type: lora
num_layers: 16
batch_size: 4
iters: 600
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 50
save_every: 100
seed: 20260504
train: true
test: false

lora_parameters:
  rank: 32
  dropout: 0.0
  scale: 20.0
