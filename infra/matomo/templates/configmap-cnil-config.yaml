{{/*
ConfigMap with the CNIL-exempt configuration fragment. Mounted into the
Matomo pod at /var/www/html/config/common.config.ini.php — Matomo's
bootstrap loads it on every request and merges it on top of
config.ini.php (which holds DB credentials and is rendered by Matomo
itself on first install).

If any setting here is loosened, the CNIL audience-measurement
exemption is lost and a consent banner becomes legally required.
ADR-0025 §2 lists the load-bearing settings.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "matomo.fullname" . }}-cnil
  labels: {{- include "matomo.labels" . | nindent 4 }}
data:
  common.config.ini.php: |
    ; Generated by the matomo Helm chart. Edits here are tracked in Git.
    ; ADR-0025 §2 — load-bearing for CNIL exemption.

    [General]
    ; IP anonymization at {{ .Values.cnilExempt.ipAnonymizationMaskBytes }} byte(s).
    ; CNIL deliberation 2020-091 requires at least the last byte; 2 bytes
    ; is the recommended floor for the exemption.
    anonymize_ip_mask_length = {{ .Values.cnilExempt.ipAnonymizationMaskBytes }}

    ; Honour the browser DoNotTrack header.
    do_not_track = {{ if .Values.cnilExempt.doNotTrack }}1{{ else }}0{{ end }}

    ; No browser fingerprinting via plugin detection.
    enable_browser_archiving_triggering = 0

    ; Country-only geolocation (no city-level data).
    enable_geoip_city_lookup = {{ if .Values.cnilExempt.geolocationCountryOnly }}0{{ else }}1{{ end }}

    ; Disable cross-site / cross-domain visitor identification.
    enable_first_party_cookies = 0

    ; Force the JS tracker to operate in cookieless mode regardless of
    ; what individual sites set. Belt-and-braces with the JS-side
    ; `_paq.push(['disableCookies'])` from the frontend tracker.
    enable_processing_unique_visitors_day = 1
    enable_processing_unique_visitors_week = 1
    enable_processing_unique_visitors_month = 1
    enable_processing_unique_visitors_year = 1
    enable_processing_unique_visitors_range = 1

    [Tracker]
    ; Visitor IDs reset daily — no persistent cross-day identifier.
    ; Combined with cookieless tracking, this gives the rotated-hash
    ; behaviour ADR-0025 §3 describes.
    use_third_party_id_cookie = 0
    enable_fingerprinting_across_websites = 0

    [Deletelogs]
    ; Visitor-level data retention: 13 months (CNIL audience-measurement
    ; guidance). Aggregate reports are kept indefinitely.
    delete_logs_enable = 1
    delete_logs_schedule_lowest_interval = 7
    delete_logs_older_than = 395
