# iter9 config: rank 32 (vs default 8), batch 4 (vs iter8's 2),
# corpus filtered to lemma-len ≥ 4 (curated CSV's L2/L3 chemical-symbol
# entries dropped).
model: "mlx-community/c4ai-command-r-08-2024-4bit"
data: "data/lora"
adapter_path: "models/lora-clue-v2"
fine_tune_type: lora
num_layers: 16
batch_size: 4
iters: 600
learning_rate: 1e-5
steps_per_report: 10
steps_per_eval: 50
save_every: 100
seed: 20260504
train: true
test: false

lora_parameters:
  rank: 32
  dropout: 0.0
  scale: 20.0
