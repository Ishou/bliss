# iter12: DPO on top of iter10's SFT adapter (rank 32, 583-pair corpus).
# Uses 180 mined preference pairs from iter3-iter9 (chosen=higher-rated,
# rejected=lower-rated for the same lemma).
#
# Why DPO: SFT (iter10) only learns from positive examples. DPO directly
# teaches "prefer this clue over that one for the same lemma" — the right
# tool for the persistent failure modes (stem-leak, self-reference,
# wrong-meaning) where we have explicit (good, bad) pairs.
model: "mlx-community/c4ai-command-r-08-2024-4bit"
data: "data/lora_dpo"
adapter_path: "models/lora-clue-v5"
train_type: lora
train_mode: dpo
num_layers: 16
batch_size: 2
iters: 200            # small dataset (180 train); short run avoids over-fit
learning_rate: 1e-6   # DPO needs MUCH lower LR than SFT (typical 1e-6 to 5e-7)
steps_per_report: 5
steps_per_eval: 25
save_every: 50
seed: 20260504
train: true

# DPO-specific
beta: 0.1                         # standard DPO regularizer
dpo_cpo_loss_type: sigmoid        # canonical DPO loss

# Continue from iter10's SFT adapter — DPO refines preference, doesn't replace SFT
resume_adapter_file: "models/lora-clue-v3/adapters.safetensors"

lora_parameters:
  rank: 32
  dropout: 0.0
  scale: 20.0
