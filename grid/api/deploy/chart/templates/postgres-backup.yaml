{{- if .Values.postgres.backups.enabled -}}
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: {{ printf "%s-scheduled" (include "wordsparrow-api.pgClusterName" .) }}
  labels:
    {{- include "wordsparrow-api.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.postgres.backups.schedule | quote }}
  backupOwnerReference: self
  cluster:
    name: {{ include "wordsparrow-api.pgClusterName" . }}
{{- end }}
