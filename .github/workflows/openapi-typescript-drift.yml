name: OpenAPI TypeScript Drift

# Implements ADR-0003 §8.2: regenerate the TypeScript client from
# `grid/api/openapi.yaml` and fail the build if the committed
# `frontend/src/infrastructure/api/grid/types.ts` differs from the regen
# output. Guarantees the committed generated code is always in sync with the
# spec — no drift slips through review.
#
# Contributors regenerate locally with `pnpm --filter frontend api:generate`
# (or `frontend/scripts/generate-api-client.sh`) after every spec change. See
# `CONTRIBUTING.md` ("OpenAPI") for the workflow.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    name: regen-and-diff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up pnpm
        # pnpm/action-setup v4.0.0
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: '10.33.0'
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Regenerate TypeScript client
        working-directory: frontend
        run: pnpm api:generate

      - name: Verify committed types match the spec
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- frontend/src/infrastructure/api/grid/types.ts; then
            echo "::error::frontend/src/infrastructure/api/grid/types.ts is out of sync with grid/api/openapi.yaml."
            echo "::error::Fix: run 'pnpm --filter frontend api:generate' (or 'frontend/scripts/generate-api-client.sh') and commit the updated file."
            exit 1
          fi
