name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build for analysis
        # --no-daemon is required: gradle/actions/setup-gradle starts a
        # daemon that lives outside CodeQL's tracer process tree, so when
        # ./gradlew reuses the daemon the kotlinc/javac invocations happen
        # un-traced and CodeQL reports "this run didn't build any of it".
        # Forcing daemon-less mode keeps the compilers in-process.
        run: ./gradlew assemble --no-daemon --parallel --build-cache --stacktrace -x test

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
