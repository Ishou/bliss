{{/*
CNPG backup ObjectStore for Hetzner Object Storage (ADR-0010 §5).

Intentionally COMMENTED OUT for v1. CloudNativePG's `ObjectStore` CRD
landed with the CNPG-i / Barman Cloud plugin split (CNPG ~v1.26+); the
0.22.1 operator chart pinned in Chart.yaml predates that split, so the
right shape here is still the inline `.spec.backup.barmanObjectStore`
on the WordSparrow Cluster CR — already wired in
grid/api/deploy/chart/templates/postgres-cluster.yaml.

This file exists as the documented home for the future cluster-scoped
ObjectStore once the operator chart picks up the plugin. The operator-
config workstream owns the activation PR.

apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: bliss-cnpg-backups
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  configuration:
    destinationPath: s3://bliss-cnpg-backups/
    endpointURL: https://fsn1.your-objectstorage.com
    s3Credentials:
      accessKeyId:
        name: hcloud-os-credentials
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: hcloud-os-credentials
        key: SECRET_ACCESS_KEY
    wal:
      compression: gzip
*/}}
