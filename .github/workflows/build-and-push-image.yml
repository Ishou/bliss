name: Build and Push Image

# Builds the WordSparrow API container image (grid/api/Dockerfile) and
# publishes it to GHCR at ghcr.io/${owner}/bliss/wordsparrow-api. Pull
# requests build-only (verifies the Dockerfile still works on every PR
# touching grid/api/); pushes to main also tag and push the digest.
#
# Lives ALONGSIDE .github/workflows/deploy-api.yml during the ADR-0009
# migration. Both workflows coexist until ADR-0009 §8 step 7 cutover
# tears Fly down — at which point deploy-api.yml is removed and the
# future deploy workflow consumes this job's `digest` output via
# `needs: build`.
#
# Images are immutable per the MANIFESTO ("Container images pinned to
# digest. Builds are deterministic."): the resolved sha256 digest is
# both written to $GITHUB_STEP_SUMMARY and exported as a workflow
# output so downstream Helm chart values can pin to digest, never tag.
#
# ONE-TIME HUMAN BOOTSTRAP (same shape as the Hetzner OS state-bucket
# bootstrap from PR48): the first push to main creates the GHCR
# package as PRIVATE. The maintainer must then go to
# https://github.com/users/Ishou/packages/container/bliss%2Fwordsparrow-api/settings
# and flip "Package visibility" to PUBLIC so the future cluster can
# pull anonymously without an imagePullSecret. This is a manual step
# GitHub does not expose to Actions; it runs once per package.

on:
  push:
    branches: [main]
    paths:
      - 'grid/api/**'
      - '.github/workflows/build-and-push-image.yml'
  pull_request:
    paths:
      - 'grid/api/**'
      - '.github/workflows/build-and-push-image.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      # Required for future cosign/SLSA provenance attestations once
      # build-push-action emits them via the OIDC token exchange.
      id-token: write

    outputs:
      # Future deploy workflow consumes via `needs: build.outputs.digest`
      # to pin the Helm release to an immutable image.
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        # Multi-arch foundation; v1 only emits linux/amd64 but having
        # QEMU wired now means the multi-arch follow-up is a one-line
        # `platforms:` change rather than a workflow rewrite.
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip on PRs from forks: GITHUB_TOKEN there is read-only and
        # the login would fail noisily. Forked PRs still get the
        # build-only path below (push: false, load: true).
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/bliss/wordsparrow-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          # Dockerfile is multi-stage and COPIes gradlew, gradle/,
          # settings.gradle.kts, and grid/{domain,infrastructure,api}/
          # — so context MUST be the repo root, not grid/api/.
          context: .
          file: grid/api/Dockerfile
          platforms: linux/amd64
          # PRs build-only and load the image into the runner's local
          # Docker so a later step could smoke-test it; main pushes
          # tag and publish to GHCR.
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Record image digest in summary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "**Image:** \`ghcr.io/${{ github.repository_owner }}/bliss/wordsparrow-api@${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
