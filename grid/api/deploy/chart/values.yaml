# Shared defaults. Per-env files override what differs.
image:
  # GHCR image built by the sibling image-build pipeline.
  repository: ghcr.io/ishou/bliss/wordsparrow-api
  # Required by manifesto ("pin to digest"). Empty -> tag fallback. Format "sha256:...".
  digest: ""
  # Pull reference when digest is empty (local-only divergence).
  tag: "main"
  pullPolicy: IfNotPresent
  # Manifesto: container images pinned to digest. Local dev tolerates a
  # mutable tag; prod must not. Overridden to true in values-prod.yaml so
  # `helm install/upgrade` aborts when CD forgot to inject the digest.
  requireDigest: false
# Replica count. Override per env (prod=2, local=1).
replicaCount: 1
# Pod resources. Empty default — env files set requests/limits.
resources: {}
service:
  type: ClusterIP
  # Prod listens on 8080. Local-dev default in Main.kt is 7777; the chart
  # pins PORT=8080 explicitly via the `env:` block below so prod is stable
  # regardless of in-app default changes.
  port: 8080
ingress:
  enabled: true
  className: nginx
  # REQUIRED per env (api.wordsparrow.io prod, wordsparrow.local local).
  host: ""
  # TLS Secret name created by cert-manager from the ingress annotation.
  tlsSecretName: ""
  # Env files set cert-manager and external-dns annotations here.
  annotations: {}
postgres:
  cluster:
    # CNPG Cluster instances. Prod=3 (HA, ADR-0009 §3); local=1.
    instances: 1
    # PostgreSQL image — pinned by tag AND digest. Tag carries the
    # human-readable version, digest enforces byte-identical pulls per
    # MANIFESTO ("container images pinned to digest").
    #
    # Major upgrade 17 → 18 (step 2 of 2; step 1 was 16 → 17.8 in
    # PR #350 / ADR-0036). cnpg 1.28's admission webhook
    # (`vcluster.cnpg.io`) enforces single-major-step in-place
    # upgrades, which is why this is split.
    #
    # On `helm upgrade`, cnpg detects the major-version delta on the
    # live `Cluster` and schedules a
    # `<cluster>-primary-major-upgrade` Job: the entire cluster
    # (primary + replicas) goes offline for the duration of
    # `pg_upgrade`, then comes back on PG 18.1. PITR does NOT cross
    # the major boundary — take a fresh base backup post-upgrade.
    #
    # Distro continuity: bookworm → bookworm (cnpg requires same OS
    # base for in-place upgrades). The trixie line is the future
    # default (cnpg 1.29+); deferring that transition to its own PR.
    imageName: "ghcr.io/cloudnative-pg/postgresql:18.1-system-bookworm@sha256:61654dc3b1aa2191e083288caf332e60daa342817a64a285283e69e31f1c854d"
    storage:
      size: 10Gi
      # Empty = cluster default. Prod "hcloud-volumes"; local "local-path".
      storageClass: ""
    bootstrap: {database: wordsparrow, owner: wordsparrow}
  backups:
    # Off by default. Prod turns this on; local stays off.
    enabled: false
    # S3-compatible bucket. ADR-0010 §1: "<project>-cnpg-backups".
    bucket: ""
    # S3 endpoint URL. Hetzner OS FSN1 in prod (ADR-0010 §2).
    endpoint: ""
    # Daily 02:00 UTC scheduled backup.
    schedule: "0 2 * * *"
    # CNPG retention policy notation (e.g. "30d").
    retentionPolicy: "30d"
serviceAccount:
  create: true
  # Empty -> templated as <fullname>.
  name: ""
podSecurityContext: {runAsNonRoot: true, fsGroup: 1000}
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities: {drop: [ALL]}
probes:
  # Health endpoint — grid/api/src/main/kotlin/com/bliss/grid/api/routes/HealthRoute.kt:18.
  liveness: {path: "/v1/health"}
  readiness: {path: "/v1/health"}
  # 30 × 5 s = 150 s startup budget for CSV load + position-letter index build on 250m-CPU pod; default 35 s probe budget triggers false rollback
  startup:
    path: "/v1/health"
    periodSeconds: 5
    failureThreshold: 30
# Inline env vars. Prefer envFromSecret for anything sensitive.
# OpenJDK default MaxRAMPercentage=25 → ~256 MB on 1Gi; 75% → ~768 MB heap for position-letter index
env:
  # `-javaagent:/app/otel.jar` activates the OpenTelemetry Java agent
  # baked into the runtime image (Dockerfile §"Stage 2"). Agent reads
  # OTEL_* env vars below for endpoint + service identity, then auto-
  # instruments Ktor + JDBC + Ktor HTTP client + WebSockets. ADR-0027.
  - name: JAVA_TOOL_OPTIONS
    value: "-javaagent:/app/otel.jar -XX:MaxRAMPercentage=75.0"
  # Pin prod port. Main.kt's DEFAULT_PORT is 7777 (local-dev convenience);
  # this keeps prod on 8080 regardless of in-app default changes.
  - name: PORT
    value: "8080"
  # OpenTelemetry agent configuration (ADR-0027). Endpoint defaults to
  # the in-cluster SigNoz collector Service. Local installs that don't
  # have observability/* deployed will see harmless connection-refused
  # warnings in agent logs; the app itself is unaffected.
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://observability-signoz-otel-collector.observability:4317"
  - name: OTEL_EXPORTER_OTLP_PROTOCOL
    value: "grpc"
  - name: OTEL_SERVICE_NAME
    value: "grid-api"
  # `service.name` is canonical for the SigNoz UI; `bounded_context`
  # mirrors the Logback MDC field already on every structured log line
  # (ADR-0007 §7) so traces and logs join cleanly.
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "bounded_context=grid"
  # 100% sampling at launch volume — the agent's overhead at this
  # rate is single-digit ms per request, well within budget. Tune
  # down (e.g. 0.1 = 10%) once traffic ramps and a representative
  # sample suffices.
  - name: OTEL_TRACES_SAMPLER
    value: "parentbased_traceidratio"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "1.0"
# Name of a Kubernetes Secret to envFrom into the pod. ADR-0009 §10:
# bootstrapped via `kubectl create secret`, never committed.
envFromSecret: ""
# Data-retention CronJobs (ADR-0025 §5, docs/privacy/retention-schedule.md).
retention:
  hintUsage:
    # Off by default — local-dev keeps everything. Prod enables.
    enabled: false
    # Cron expression. Daily 03:30 UTC, after the 02:00 CNPG backup.
    schedule: "30 3 * * *"
    # Days from `updated_at` to keep rows.
    days: 90
    image:
      repository: postgres
      tag: "16-alpine"
      digest: ""
      # When true, helm install/upgrade fails fast if digest is empty (mirrors main image guard).
      requireDigest: false
# Daily puzzle pre-generation CronJob (ADR-0042). Runs the :grid:worker
# `--ensure-dailies` CLI; `templates/cronjob-ensure-dailies.yaml` owns
# the rendering. Off by default so local-dev installs don't try to pull
# an image that may not exist on a contributor laptop; prod enables.
ensureDailies:
  enabled: false
  # 03:00 UTC — between low-traffic hours and the European morning playtime, after the 02:00 CNPG backup.
  schedule: "0 3 * * *"
  # 90 minutes covers ADR-0042's ~70-minute worst case (7 days × ~10 min each) with headroom.
  activeDeadlineSeconds: 5400
  # Worker is short-lived per run but the bitmask-CSP solver is CPU-bound; mirrors the api's prod request shape.
  resources:
    requests: {cpu: 250m, memory: 512Mi}
    limits: {cpu: 1000m, memory: 1Gi}
  # Worker image. Built independently of the api image (separate Dockerfile / matrix row, follow-up); pin to digest in prod.
  image:
    repository: ghcr.io/ishou/bliss/wordsparrow-worker
    tag: "main"
    digest: ""
    pullPolicy: IfNotPresent
    requireDigest: false
  # Inline env vars beyond DATABASE_URL (which is wired from the CNPG `<cluster>-app` Secret in the template).
  env:
    - name: JAVA_TOOL_OPTIONS
      value: "-XX:MaxRAMPercentage=75.0"
    - name: OTEL_SERVICE_NAME
      value: "grid-worker"
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "bounded_context=grid"
